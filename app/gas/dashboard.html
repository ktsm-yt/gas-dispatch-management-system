    /* Date Navigation - Compact */

      background: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      padding: 6px var(--spacing-md);
      display: flex;
      align-items: center;
      gap: 16px;

      display: flex;
      align-items: center;
      gap: 6px;
    }

      flex: 1;
      display: flex;
      justify-content: center;
    }

  <script>
    // Callback: 配置モーダルが閉じられたときに呼ばれる
    function onAssignmentModalClose(jobId, job, assignments) {
      if (!jobId || !dashboardData) return;

      // dashboardDataの該当案件を更新
      const idx = dashboardData.jobs.findIndex(j => j.job_id === jobId);
      if (idx >= 0) {
        const validAssignments = (assignments || []).filter(a => a.status !== 'CANCELLED');
        // 一意なスタッフIDでカウント（サーバー側と同じロジック）
        const uniqueStaffIds = new Set(validAssignments.map(a => a.staff_id));

        // 変更検知: 配置データが実際に変わった場合のみブロードキャスト
        const oldAssignments = JSON.stringify(dashboardData.jobs[idx].assignments || []);
        const newAssignments = JSON.stringify(assignments || []);
        const changed = oldAssignments !== newAssignments;

        dashboardData.jobs[idx].assigned_count = uniqueStaffIds.size;
        dashboardData.jobs[idx].staff_names = validAssignments.map(a => a.staff_name || '');
        // 配置データも更新（競合チェック用キャッシュに反映）
        dashboardData.jobs[idx].assignments = assignments || [];

        // 統計を再計算して再描画（日次キャッシュも更新される）
        recalculateStats();
        renderDashboard();

        // 競合チェック用キャッシュを再構築（配置変更を即座に反映）
        buildDayAssignmentsCache();

        // 日次キャッシュも更新
        saveToCachedDate(dashboardData.date, dashboardData);
        if (changed) {
          broadcastDashboardUpdate();
        }
      }
    }

    // State
    let currentDate = null;  // サーバー時間で初期化
    let dashboardData = null;
    let lastMaxUpdatedAt = null;

    // フィルター状態
    let statusFilter = 'all';

    // 日付別メモリキャッシュ（最大5日分、高速アクセス用）
    const dateMemoryCache = new Map();
    const MAX_MEMORY_CACHE_SIZE = 5;

    // キャッシュキー生成
    function getDashboardCacheKey(dateStr) {
      return PageCache.makeKey('dashboard', dateStr);
    }

    // Time slot labels
    const TIME_SLOT_LABELS = {
      jotou: '上棟',
      shuujitsu: '終日',
      am: 'AM',
      pm: 'PM',
      yakin: '夜勤',
      mitei: '未定'
    };

    const TIME_SLOT_ORDER = ['jotou', 'shuujitsu', 'am', 'pm', 'yakin', 'mitei'];

    /**
     * 住所を市区町村レベルに切り詰める
     */
    function truncateAddress(address) {
      if (!address) return '';
      const match = address.match(/.+?[都道府県].+?[市区町村郡]/);
      if (match) return match[0];
      return address.length > 10 ? address.slice(0, 10) + '…' : address;
    }

    // Work category to tag class
    const WORK_CATEGORY_TAG = {
      'jotou': 'tag-jotou',
      'keisagyo': 'tag-keisagyo',
      'niage': 'tag-niage'
    };

    // Work category to Japanese label
    const WORK_CATEGORY_LABEL = {
      'jotou': '上棟',
      'keisagyo': '軽作業',
      'niage': '搬入'
    };

    // Pay unit labels and tag classes
    const PAY_UNIT_TAG = {
      'basic': { label: '基本', cls: 'tag-pay-basic' },
      'halfday': { label: 'ハーフ', cls: 'tag-pay-halfday' },
      'fullday': { label: '終日', cls: 'tag-pay-fullday' },
      'night': { label: '夜勤', cls: 'tag-pay-night' },
      'tobi': { label: '上棟鳶', cls: 'tag-pay-tobi' },
      'age': { label: '上棟荷揚げ', cls: 'tag-pay-age' },
      'tobiage': { label: '上棟鳶揚げ', cls: 'tag-pay-tobiage' }
    };

    // BroadcastChannel for cross-tab sync
    let dashboardChannel = null;

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      initNavBar('dashboard', 'ダッシュボード');
      renderColumns();
      initializeWithServerDate();
      setupEventListeners();
      initBroadcastChannel();
      // Note: Customer autocomplete is now handled by the shared job_modal_js component
    });

    // フィルター適用
    function applyFilters() {
      if (!dashboardData) return;
      renderDashboard();
    }

    // ステータスでフィルタリング
    function filterByStatus(jobs) {
      if (statusFilter === 'all') return jobs;
      return jobs.filter(job => job.status === statusFilter);
    }

    function initializeWithServerDate() {
      // URLパラメータ → 埋め込み日付 → フォールバック の優先順位で日付を取得（RPC不要）
      const urlParams = new URLSearchParams(window.location.search);
      const dateParam = urlParams.get('date');

      if (dateParam && /^\d{4}-\d{2}-\d{2}$/.test(dateParam)) {
        // URLパラメータから日付を取得
        currentDate = new Date(dateParam + 'T00:00:00');
      } else if (window.__SERVER_DATE__) {
        // テンプレート埋め込みの日付を使用
        currentDate = new Date(window.__SERVER_DATE__ + 'T00:00:00');
      } else {
        // フォールバック: クライアント時間
        console.warn('Server date not available, using client time');
        currentDate = new Date();
      }
      loadDashboard();
      // 配置モーダルの初回表示高速化: 全スタッフを先読み
      if (typeof prefetchGlobalStaffCache === 'function') {
        prefetchGlobalStaffCache(true); // 強制リフレッシュで古いキャッシュを残さない
      }
      startPolling();
      initVisibilityRefresh();
    }

    function setupEventListeners() {
      // Status filter
      document.getElementById('status-filter').addEventListener('change', (e) => {
        statusFilter = e.target.value;
        applyFilters();
      });

      // Date navigation
      document.getElementById('prev-day').addEventListener('click', () => {
        changeDate(-1);
      });

      document.getElementById('next-day').addEventListener('click', () => {
        changeDate(1);
      });

      document.getElementById('today-btn').addEventListener('click', () => {
        // クライアント側でAsia/Tokyo日付を取得（深夜跨ぎ対応、RPC不要）
        const todayStr = new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Tokyo' });
        currentDate = new Date(todayStr + 'T00:00:00');
        loadDashboard();
      });

      // カレンダー日付選択
      document.getElementById('date-picker').addEventListener('change', (e) => {
        if (e.target.value) {
          currentDate = new Date(e.target.value + 'T00:00:00');
          loadDashboard();
        }
      });

      document.getElementById('add-job-btn').addEventListener('click', () => {
        openJobModalForDashboard(null);
      });
    }

    function changeDate(delta) {
      currentDate.setDate(currentDate.getDate() + delta);
      loadDashboard();
    }

    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function formatDisplayDate(date) {
      const days = ['日', '月', '火', '水', '木', '金', '土'];
      const y = date.getFullYear();
      const m = date.getMonth() + 1;
      const d = date.getDate();
      const w = days[date.getDay()];
      return `${y}年${m}月${d}日(${w})`;
    }

    function renderColumns() {
      const container = document.getElementById('dashboard-columns');
      container.innerHTML = TIME_SLOT_ORDER.map(slot => `
        <div class="column" data-slot="${slot}">
          <div class="column-header">
            <span class="column-title">${TIME_SLOT_LABELS[slot]}</span>
            <div class="column-count">
              <div>
                <span class="total" id="col-total-${slot}">-</span>
                <span class="total-label">件</span>
              </div>
              <div>
                <span class="member-fraction" id="col-member-${slot}">-/-</span>
                <span class="total-label">名</span>
              </div>
              <span class="shortage" id="col-shortage-${slot}">-</span>
            </div>
          </div>
          <div class="column-cards" id="col-cards-${slot}">
            <div class="loading"><div class="spinner"></div>読み込み中...</div>
          </div>
        </div>
      `).join('');
    }

    function loadDashboard() {
      const dateStr = formatDate(currentDate);
      const cacheKey = getDashboardCacheKey(dateStr);
      document.getElementById('current-date').textContent = formatDisplayDate(currentDate);

      // 1. メモリキャッシュ確認（最速）
      const memoryCached = dateMemoryCache.get(cacheKey);
      if (memoryCached) {
        dashboardData = memoryCached;
        window.dashboardData = dashboardData;  // 配置モーダル用に公開
        lastMaxUpdatedAt = dashboardData?.maxUpdatedAt || null;
        buildDayAssignmentsCache(); // キャッシュ復元時も競合チェック用キャッシュを再構築
        renderDashboard();
        // TTL超過ならバックグラウンド更新
        const sessionCached = PageCache.get(cacheKey);
        if (!sessionCached || sessionCached.age > PageCache.DEFAULT_TTL) {
          refreshDashboardInBackground(dateStr);
        }
        return;
      }

      // 2. sessionStorageキャッシュ確認（Stale-While-Revalidate: 常に即表示）
      const sessionCached = PageCache.get(cacheKey);
      if (sessionCached) {
        dateMemoryCache.set(cacheKey, sessionCached.data);
        dashboardData = sessionCached.data;
        window.dashboardData = dashboardData;  // 配置モーダル用に公開
        lastMaxUpdatedAt = dashboardData?.maxUpdatedAt || null;
        buildDayAssignmentsCache(); // キャッシュ復元時も競合チェック用キャッシュを再構築
        renderDashboard();
        // TTL超過ならバックグラウンド更新
        if (sessionCached.age > PageCache.DEFAULT_TTL) {
          refreshDashboardInBackground(dateStr);
        }
        return;
      }

      // 3. キャッシュなし: ローディング表示してRPC
      TIME_SLOT_ORDER.forEach(slot => {
        document.getElementById(`col-cards-${slot}`).innerHTML =
          '<div class="loading"><div class="spinner"></div>読み込み中...</div>';
      });

      google.script.run
        .withSuccessHandler(handleDashboardData)
        .withFailureHandler(handleError)
        .getDashboard(dateStr);
    }

    // バックグラウンドでデータを更新
    function refreshDashboardInBackground(dateStr) {
      google.script.run
        .withSuccessHandler(handleDashboardDataSilent)
        .withFailureHandler(() => {})  // サイレント
        .getDashboard(dateStr);
    }

    // バックグラウンド更新用（差分があれば更新）
    function handleDashboardDataSilent(response) {
      if (!response.ok) return;

      const newData = response.data;
      const currentDateStr = formatDate(currentDate);

      // 現在表示中の日付と一致する場合のみ更新
      if (newData.date !== currentDateStr) {
        // 別の日付のデータ → キャッシュだけ更新
        saveToCachedDate(newData.date, newData);
        return;
      }

      // maxUpdatedAtベースで差分判定（巨大データのJSON.stringifyコストを回避）
      const jobsChanged = (dashboardData?.maxUpdatedAt || null) !== (newData.maxUpdatedAt || null);
      const flagsChanged = dashboardData?.hasFullAssignments !== newData.hasFullAssignments;
      if (jobsChanged || flagsChanged) {
        dashboardData = newData;
        window.dashboardData = dashboardData;  // 配置モーダル用に公開
        lastMaxUpdatedAt = newData.maxUpdatedAt || null;
        saveToCachedDate(newData.date, newData);
        // 日次配置キャッシュを構築（APIから新鮮なデータが来た時のみ）
        buildDayAssignmentsCache();
        if (jobsChanged) {
          renderDashboard();
        }
      } else if (!window.dashboardDayAssignmentsCache || window.dashboardDayAssignmentsCache.date !== newData.date) {
        // データは同じだがキャッシュがない場合は構築
        dashboardData = newData;
        window.dashboardData = dashboardData;  // 配置モーダル用に公開
        lastMaxUpdatedAt = newData.maxUpdatedAt || null;
        buildDayAssignmentsCache();
      }
    }

    // キャッシュに保存（メモリ + sessionStorage）
    function saveToCachedDate(dateStr, data) {
      const cacheKey = getDashboardCacheKey(dateStr);

      // メモリキャッシュに保存
      dateMemoryCache.set(cacheKey, data);
      // 最大件数を超えたら古いものを削除
      if (dateMemoryCache.size > MAX_MEMORY_CACHE_SIZE) {
        const oldestKey = dateMemoryCache.keys().next().value;
        dateMemoryCache.delete(oldestKey);
      }

      // sessionStorageキャッシュに保存（ページ遷移間で保持）
      PageCache.set(cacheKey, data);
    }

    // キャッシュを無効化
    function invalidateDashboardCache() {
      dateMemoryCache.clear();
      PageCache.clearByPrefix('dashboard');
    }

    function handleDashboardData(response) {
      if (!response.ok) {
        showToast(response.error?.message || 'データの取得に失敗しました', true);
        return;
      }

      const newData = response.data;
      const currentDateStr = formatDate(currentDate);

      // キャッシュに保存
      saveToCachedDate(newData.date, newData);

      // 現在表示中の日付と一致する場合のみ表示更新
      if (newData.date !== currentDateStr) {
        return;
      }

      dashboardData = newData;
      window.dashboardData = dashboardData;  // 配置モーダル用に公開
      lastMaxUpdatedAt = newData.maxUpdatedAt || null;

      // 日次配置キャッシュを構築（APIから新鮮なデータが来た時のみ）
      buildDayAssignmentsCache();

      renderDashboard();
    }

    // ダッシュボードを描画
    function renderDashboard() {
      const stats = dashboardData.stats;
      document.getElementById('stats-total').textContent = stats.total;
      document.getElementById('stats-assigned').textContent = stats.assigned;
      document.getElementById('stats-pending').textContent = stats.pending;

      // Update columns (card view)
      TIME_SLOT_ORDER.forEach(slot => {
        const slotStats = stats.byTimeSlot[slot];
        document.getElementById(`col-total-${slot}`).textContent = slotStats.total;
        document.getElementById(`col-member-${slot}`).textContent = `${slotStats.assigned}/${slotStats.required}`;

        const shortageEl = document.getElementById(`col-shortage-${slot}`);
        const shortage = slotStats.shortage;  // required - assigned
        if (shortage > 0) {
          // 不足（必要 > 配置済み）
          shortageEl.textContent = `${shortage}名不足`;
          shortageEl.className = 'shortage negative';
        } else if (shortage < 0) {
          // 余裕（配置済み > 必要）
          shortageEl.textContent = `+${Math.abs(shortage)}名余裕`;
          shortageEl.className = 'shortage positive';
        } else {
          shortageEl.textContent = '過不足なし';
          shortageEl.className = 'shortage neutral';
        }

        // Render cards (ステータスフィルター適用)
        const allJobs = dashboardData.jobs.filter(j => j.time_slot === slot);
        const jobs = filterByStatus(allJobs);
        renderCards(slot, jobs);
      });
    }

    function renderCards(slot, jobs) {
      // 開始時間順にソート（空は末尾）
      jobs.sort((a, b) => {
        const ta = a.start_time || '';
        const tb = b.start_time || '';
        if (!ta && !tb) return 0;
        if (!ta) return 1;
        if (!tb) return -1;
        return ta < tb ? -1 : ta > tb ? 1 : 0;
      });

      const container = document.getElementById(`col-cards-${slot}`);

      if (jobs.length === 0) {
        container.innerHTML = '<div class="empty-state">案件なし</div>';
        return;
      }

      container.innerHTML = jobs.map(job => {
        const tagClass = WORK_CATEGORY_TAG[job.work_category] || '';
        const workCategoryLabel = WORK_CATEGORY_LABEL[job.work_category] || '';
        const hasShortage = job.assigned_count < job.required_count;
        const cardClass = hasShortage ? 'job-card has-shortage' : 'job-card';
        const safeJobId = escapeHtml(job.job_id || '');
        const safeCustomerName = escapeHtml(job.customer_name || '-');
        const safeSiteName = escapeHtml(job.site_name || '');
        const safeStartTime = escapeHtml(job.start_time || '');
        const safeSiteAddress = truncateAddress(job.site_address || '');
        const payUnitInfo = PAY_UNIT_TAG[job.pay_unit];
        const staffChips = (job.assignments || [])
          .filter(a => a.status !== 'CANCELLED')
          .map(a => a.staff_nickname || (a.staff_name || '').slice(0, 4))
          .filter(n => n)
          .map(n => `<span class="staff-chip">${escapeHtml(n)}</span>`)
          .join('');

        return `
          <div class="${cardClass}" data-job-id="${safeJobId}" onclick="openJobAssignmentsForDashboard(this.dataset.jobId)">
            <div class="job-card-header">
              ${workCategoryLabel ? `<span class="tag ${tagClass}">${workCategoryLabel}</span>` : ''}
              ${payUnitInfo ? `<span class="tag ${payUnitInfo.cls}">${payUnitInfo.label}</span>` : ''}
              ${job.status === 'hold' ? '<span class="status-badge status-hold">保留</span>' : ''}
              <span class="customer-name">${safeCustomerName}</span>
              <span class="staff-count ${hasShortage ? 'shortage' : ''}">${job.assigned_count}/${job.required_count}</span>
            </div>
            <button class="card-edit-btn" data-job-id="${safeJobId}" onclick="event.stopPropagation(); openJobModalForDashboard(this.dataset.jobId)" title="案件編集">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </button>
            <div class="job-card-footer">
              <span class="site-name">${safeSiteName}</span>
              <span class="start-time">${safeStartTime}</span>
            </div>
            ${safeSiteAddress ? `<div class="site-address-line">${escapeHtml(safeSiteAddress)}</div>` : ''}
            ${staffChips ? `<div class="staff-names">${staffChips}</div>` : ''}
          </div>
        `;
      }).join('');
    }

    /**
     * 差分更新：案件を1件だけ更新してカラムを再描画
     * @param {Object} savedJob - 保存された案件データ
     * @param {Object[]} savedSlots - 保存された枠データ
     * @param {boolean} isNew - 新規作成かどうか
     */
    function updateJobInDashboard(savedJob, savedSlots, isNew) {
      if (!dashboardData) return;

      // 日付が異なる場合は全体リロード
      const savedDate = savedJob.work_date instanceof Date
        ? Utilities.formatDate(savedJob.work_date, 'Asia/Tokyo', 'yyyy-MM-dd')
        : savedJob.work_date;
      if (savedDate !== dashboardData.date) {
        loadDashboard();
        return;
      }

      // 顧客名を取得
      const customerName = document.getElementById('customer-search').value || '';

      // 更新用のジョブオブジェクト作成
      const updatedJob = {
        job_id: savedJob.job_id,
        customer_id: savedJob.customer_id,
        customer_name: customerName,
        site_name: savedJob.site_name || '',
        site_address: savedJob.site_address || '',
        work_date: savedJob.work_date || dashboardData.date,
        time_slot: savedJob.time_slot,
        start_time: savedJob.start_time || '',
        work_category: savedJob.work_category,
        work_detail: savedJob.work_detail || '',
        work_detail_other_text: savedJob.work_detail_other_text || '',
        required_count: savedJob.required_count,
        pay_unit: savedJob.pay_unit || '',
        assigned_count: 0,
        status: savedJob.status,
        supervisor_name: savedJob.supervisor_name || '',
        order_number: savedJob.order_number || '',
        branch_office: savedJob.branch_office || '',
        property_code: savedJob.property_code || '',
        construction_div: savedJob.construction_div || '',
        notes: savedJob.notes || '',
        staff_names: [],
        assignments: [],  // 配置キャッシュ用（新規は空）
        slots: savedSlots || [],  // 保存された枠データを使用
        updated_at: savedJob.updated_at
      };

      // 再描画が必要なカラム
      const slotsToRender = new Set();

      if (isNew) {
        // 新規追加
        dashboardData.jobs.push(updatedJob);
        slotsToRender.add(updatedJob.time_slot);
      } else {
        // 既存を更新
        const index = dashboardData.jobs.findIndex(j => j.job_id === savedJob.job_id);
        if (index >= 0) {
          const oldJob = dashboardData.jobs[index];
          const oldSlot = oldJob.time_slot;
          slotsToRender.add(oldSlot);
          slotsToRender.add(updatedJob.time_slot);
          // 配置データを保持（競合チェック用キャッシュに必要）、枠データは新しいものを使用
          updatedJob.assignments = oldJob.assignments || [];
          updatedJob.slots = savedSlots || [];
          updatedJob.assigned_count = oldJob.assigned_count || 0;
          updatedJob.staff_names = oldJob.staff_names || [];
          dashboardData.jobs[index] = updatedJob;
        }
      }

      // 統計を再計算
      recalculateStats();

      // 影響するカラムだけ再描画
      slotsToRender.forEach(slot => {
        const allJobs = dashboardData.jobs.filter(j => j.time_slot === slot);
        const jobs = filterByStatus(allJobs);
        renderCards(slot, jobs);

        // カラムヘッダーの統計更新
        const slotStats = dashboardData.stats.byTimeSlot[slot];
        document.getElementById(`col-total-${slot}`).textContent = slotStats.total;
        document.getElementById(`col-member-${slot}`).textContent = `${slotStats.assigned}/${slotStats.required}`;

        const shortageEl = document.getElementById(`col-shortage-${slot}`);
        const shortage = slotStats.shortage;  // required - assigned
        if (shortage > 0) {
          // 不足（必要 > 配置済み）
          shortageEl.textContent = `${shortage}名不足`;
          shortageEl.className = 'shortage negative';
        } else if (shortage < 0) {
          // 余裕（配置済み > 必要）
          shortageEl.textContent = `+${Math.abs(shortage)}名余裕`;
          shortageEl.className = 'shortage positive';
        } else {
          shortageEl.textContent = '過不足なし';
          shortageEl.className = 'shortage neutral';
        }
      });

      // 全体統計更新
      document.getElementById('stats-total').textContent = dashboardData.stats.total;
      document.getElementById('stats-assigned').textContent = dashboardData.stats.assigned;
      document.getElementById('stats-pending').textContent = dashboardData.stats.pending;

      // キャッシュも更新
      saveToCachedDate(dashboardData.date, dashboardData);
      broadcastDashboardUpdate();
    }

    /**
     * 日次配置キャッシュを構築（配置モーダルの競合チェック用）
     * dashboardData.jobs から競合チェックに必要な形式でキャッシュを作成し、
     * window オブジェクトに保存してモーダルからアクセス可能にする
     */
    function buildDayAssignmentsCache() {
      if (!dashboardData || !dashboardData.jobs) {
        return;
      }

      const dayAssignments = [];
      let jobsWithAssignments = 0;
      for (const job of dashboardData.jobs) {
        if (job.status === 'cancelled') continue;
        if (!job.assignments) continue;
        jobsWithAssignments++;

        for (const a of job.assignments) {
          if (a.status === 'CANCELLED') continue;

          dayAssignments.push({
            assignment_id: a.assignment_id,
            job_id: job.job_id,
            staff_id: a.staff_id,
            status: a.status,
            work_date: dashboardData.date,
            time_slot: job.time_slot,
            start_time: job.start_time || '',
            site_name: job.site_name || ''
          });
        }
      }

      // グローバルにキャッシュを公開（配置モーダルから参照）
      window.dashboardDayAssignmentsCache = {
        date: dashboardData.date,
        assignments: dayAssignments,
        timestamp: Date.now()
      };
    }

    /**
     * 統計情報を再計算
     */
    function recalculateStats() {
      const jobs = dashboardData.jobs;
      const byTimeSlot = {
        jotou: { total: 0, required: 0, assigned: 0, shortage: 0 },
        shuujitsu: { total: 0, required: 0, assigned: 0, shortage: 0 },
        am: { total: 0, required: 0, assigned: 0, shortage: 0 },
        pm: { total: 0, required: 0, assigned: 0, shortage: 0 },
        yakin: { total: 0, required: 0, assigned: 0, shortage: 0 },
        mitei: { total: 0, required: 0, assigned: 0, shortage: 0 }
      };

      let total = 0, assigned = 0, pending = 0;

      for (const job of jobs) {
        total++;
        if (job.status === 'assigned') {
          assigned++;
        } else if (job.status === 'pending') {
          pending++;
        }

        const slot = job.time_slot;
        if (byTimeSlot[slot]) {
          byTimeSlot[slot].total++;
          byTimeSlot[slot].required += Number(job.required_count) || 0;
          byTimeSlot[slot].assigned += Number(job.assigned_count) || 0;
        }
      }

      // shortage = required - assigned
      // 正: 不足, 負: 余裕, 0: ちょうど
      for (const slot of Object.keys(byTimeSlot)) {
        byTimeSlot[slot].shortage = byTimeSlot[slot].required - byTimeSlot[slot].assigned;
      }

      dashboardData.stats = { total, assigned, pending, byTimeSlot };
    }

    // ========== Job Modal Callbacks ==========
    // These callbacks integrate the shared job_modal component with dashboard-specific logic

    /**
     * Callback: 案件モーダルで保存が完了したとき
     * @param {Object} job - 保存された案件データ
     * @param {Object[]} slots - 保存された枠データ
     * @param {boolean} isNew - 新規作成かどうか
     */
    function onJobModalSave(job, slots, isNew) {
      updateJobInDashboard(job, slots, isNew);
    }

    /**
     * Callback: 案件モーダルで削除が実行されたとき
     * @param {string} jobId - 削除された案件ID
     * @param {Object} job - 削除された案件データ
     * @param {boolean} isConfirmed - サーバー確認済みかどうか
     */
    function onJobModalDelete(jobId, job, isConfirmed) {
      if (!isConfirmed && dashboardData) {
        // 楽観的更新: UIを即座に更新（ブロードキャストはサーバー確認後）
        dashboardData.jobs = dashboardData.jobs.filter(j => j.job_id !== jobId);
        recalculateStats();
        renderDashboard();
        saveToCachedDate(dashboardData.date, dashboardData);
      }
      if (isConfirmed) {
        // サーバー確認済み: 他タブに通知（削除失敗時の不整合を防ぐ）
        broadcastDashboardUpdate();
      }
    }

    /**
     * Callback: 案件削除がサーバーで失敗したとき
     * @param {string} jobId - 削除に失敗した案件ID
     */
    function onJobModalDeleteFailed(jobId) {
      // 削除失敗時は再読み込み
      loadDashboard();
    }

    /**
     * Dashboard用のopenJobModal wrapper
     * 共通コンポーネントのopenJobModalにダッシュボード固有のオプションを渡す
     */
    function openJobModalForDashboard(jobId) {
      // キャッシュから案件データを取得（スロット含む）
      const cachedJob = jobId && dashboardData.jobs
        ? dashboardData.jobs.find(j => j.job_id === jobId)
        : null;

      openJobModal(jobId, {
        defaultDate: formatDate(currentDate),
        showSaveNext: !jobId,  // 新規作成時のみ「保存して次へ」を表示
        cachedJob: cachedJob   // キャッシュデータを渡す（スロット即座表示）
      });
    }

    /**
     * Dashboard用のopenJobAssignments wrapper
     * キャッシュデータを渡して配置モーダルを即座表示
     */
    function openJobAssignmentsForDashboard(jobId) {
      // キャッシュから案件データを取得（assignments, slots含む）
      const jobData = jobId && dashboardData && dashboardData.jobs
        ? dashboardData.jobs.find(j => j.job_id === jobId)
        : null;

      // fillAssignmentModalFromCacheが期待する構造に変換
      const cachedJob = jobData ? {
        job: jobData,
        assignments: jobData.assignments || [],
        slots: jobData.slots || [],
        slotStatus: null,  // ダッシュボードにはslotStatusがないのでnull
        allStaff: []       // スタッフ一覧はバックグラウンドで取得
      } : null;

      openJobAssignments(jobId, {
        cachedJob: cachedJob  // キャッシュデータを渡す（即座表示）
      });
    }

    function handleError(error) {
      console.error('Error:', error);
      showToast(error.message || 'エラーが発生しました', true);
    }

    function showToast(message, typeOrIsError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      // Support both boolean (isError) and string (type) formats
      const isError = typeOrIsError === true || typeOrIsError === 'error';
      toast.className = 'toast show' + (isError ? ' error' : '');
      setTimeout(() => {
        toast.className = 'toast';
      }, 3000);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // ========== B: タブフォーカス時のリフレッシュ ==========
    let lastRefreshTime = 0;
    const REFRESH_THROTTLE_MS = 5000; // 5秒スロットリング

    function initVisibilityRefresh() {
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState !== 'visible') return;

        // モーダルが開いている場合はスキップ
        const modalOpen = document.getElementById('assignment-modal')?.style.display !== 'none'
                       || document.getElementById('job-modal')?.style.display !== 'none';
        if (modalOpen) return;

        // スロットリング
        const now = Date.now();
        if (now - lastRefreshTime < REFRESH_THROTTLE_MS) return;
        lastRefreshTime = now;

        refreshDashboardInBackground(formatDate(currentDate));
      });
    }

    // ========== C: BroadcastChannel クロスタブ同期 ==========
    function initBroadcastChannel() {
      dashboardChannel = BroadcastSync.init('dashboard_sync', handleBroadcastMessage);
    }

    function handleBroadcastMessage(event) {
      const msg = event.data;
      if (!msg || msg.type !== 'DASHBOARD_UPDATED') return;

      const { date, dashboardData: newData, maxUpdatedAt } = msg.data;

      // 現在表示中の日付と一致する場合のみ処理
      if (date !== formatDate(currentDate)) return;

      // モーダルが開いている場合はスキップ
      const modalOpen = document.getElementById('assignment-modal')?.style.display !== 'none'
                     || document.getElementById('job-modal')?.style.display !== 'none';
      if (modalOpen) return;

      // データを置換して再描画
      dashboardData = newData;
      window.dashboardData = dashboardData;
      renderDashboard();
      buildDayAssignmentsCache();
      saveToCachedDate(date, newData);

      // ポーリングの重複検知を防止
      if (maxUpdatedAt) {
        lastMaxUpdatedAt = maxUpdatedAt;
      }
    }

    function broadcastDashboardUpdate() {
      if (!dashboardChannel || !dashboardData) return;
      BroadcastSync.broadcast(dashboardChannel, 'DASHBOARD_UPDATED', {
        date: dashboardData.date, dashboardData: dashboardData, maxUpdatedAt: lastMaxUpdatedAt
      });

      // 請求タブにも配置変更を通知
      var invoiceChannel = BroadcastSync.init('invoice_sync', function() {});
      BroadcastSync.broadcast(invoiceChannel, 'ASSIGNMENT_CHANGED', {});
      if (invoiceChannel) invoiceChannel.close();
    }

    // Polling for updates
    function startPolling() {
      setInterval(checkForUpdates, 30000); // 30 seconds
    }

    function checkForUpdates() {
      const dateStr = formatDate(currentDate);

      google.script.run
        .withSuccessHandler((response) => {
          if (response.ok) {
            const latestMaxUpdatedAt = response.data.maxUpdatedAt || null;
            if (latestMaxUpdatedAt !== lastMaxUpdatedAt) {
              // モーダルが開いている間は更新をスキップ（モーダル内で更新されるため）
              const modalOpen = document.getElementById('assignment-modal')?.style.display !== 'none'
                             || document.getElementById('job-modal')?.style.display !== 'none';
              if (!modalOpen) {
                refreshDashboardInBackground(dateStr);
              }
            }
            lastMaxUpdatedAt = latestMaxUpdatedAt;
          }
        })
        .getDashboardMeta(dateStr);
    }
  </script>
</body>
</html>
