<!-- Assignment Modal JavaScript - Shared Component -->
<!-- Usage: <?!= include('assignment_modal_js'); ?> -->
<!-- Requires: escapeHtml(), showToast() functions to be defined by host page -->
<!-- Provides: openJobAssignments(), closeAssignmentModal() -->
<!-- Callback: onAssignmentModalClose(jobId, job, assignments) - define in host page to handle updates -->

<script>
// ========== Job Cache ==========
// 最近開いた案件のキャッシュ（即座に表示するため）
let assignmentJobCache = {};
const ASSIGNMENT_CACHE_MAX_SIZE = 10;  // 最大10件
const ASSIGNMENT_CACHE_EXPIRE_MS = 5 * 60 * 1000;  // 5分
const STAFF_SEARCH_DEBOUNCE_MS = 120;

// ========== Global Staff Cache ==========
// スタッフマスタのグローバルキャッシュ（全案件で共有）
let globalStaffCache = {
  staff: [],
  timestamp: 0
};
let globalStaffFetchInFlight = false;
let globalStaffFetchWaiters = [];
let staffSearchDebounceTimer = null;
let staffListRenderRafId = null;
let dayConflictIndexCache = {
  date: null,
  bySignature: new Map()
};
const GLOBAL_STAFF_CACHE_KEY = 'staff_cache';
const GLOBAL_STAFF_CACHE_VERSION = 2; // v2: 全スタッフ(未フィルタ)を保持

/**
 * グローバルスタッフキャッシュを取得
 * @returns {Array|null} キャッシュされたスタッフ配列、または null
 */
function getGlobalStaffCache() {
  // メモリキャッシュを最優先チェック
  if (globalStaffCache.staff.length > 0) {
    return globalStaffCache.staff;
  }

  // メモリになければlocalStorageから復元（タブ間共有）
  try {
    const stored = localStorage.getItem(GLOBAL_STAFF_CACHE_KEY);
    if (stored) {
      const parsed = JSON.parse(stored);
      const isValidPayload = parsed &&
        parsed.version === GLOBAL_STAFF_CACHE_VERSION &&
        parsed.scope === 'all' &&
        Array.isArray(parsed.staff);
      if (isValidPayload) {
        globalStaffCache.staff = parsed.staff;
        globalStaffCache.timestamp = parsed.timestamp || Date.now();
        return parsed.staff;
      }
      localStorage.removeItem(GLOBAL_STAFF_CACHE_KEY);
    }
  } catch (e) { /* localStorage unavailable */ }

  return null;
}

/**
 * グローバルスタッフキャッシュを保存
 * @param {Array} staff - スタッフ配列
 */
function saveGlobalStaffCache(staff) {
  globalStaffCache.staff = staff;
  globalStaffCache.timestamp = Date.now();

  // localStorageにも保存（タブ間共有）
  try {
    localStorage.setItem(GLOBAL_STAFF_CACHE_KEY, JSON.stringify({
      version: GLOBAL_STAFF_CACHE_VERSION,
      scope: 'all',
      staff,
      timestamp: globalStaffCache.timestamp
    }));
  } catch (e) { /* localStorage unavailable or quota exceeded */ }
}

/**
 * 全スタッフをサーバーから取得してグローバルキャッシュ更新（in-flight重複抑止）
 * @param {Object} [options]
 * @param {Function} [options.onSuccess] - (staff: Array, usedCache: boolean) => void
 * @param {Function} [options.onFailure] - (error: any) => void
 * @param {boolean} [options.force=false] - trueならキャッシュを無視して取得
 */
function fetchGlobalStaff(options = {}) {
  const { onSuccess, onFailure, force = false } = options;

  if (!force) {
    const cached = getGlobalStaffCache();
    if (cached && cached.length > 0) {
      if (typeof onSuccess === 'function') onSuccess(cached, true);
      return;
    }
  }

  if (globalStaffFetchInFlight) {
    globalStaffFetchWaiters.push({ onSuccess, onFailure });
    return;
  }

  globalStaffFetchInFlight = true;
  globalStaffFetchWaiters.push({ onSuccess, onFailure });
  google.script.run
    .withSuccessHandler(function(response) {
      globalStaffFetchInFlight = false;
      const waiters = globalStaffFetchWaiters;
      globalStaffFetchWaiters = [];

      if (!response?.ok) {
        waiters.forEach(w => {
          if (typeof w.onFailure === 'function') {
            w.onFailure(response?.error || new Error('スタッフの取得に失敗しました'));
          }
        });
        return;
      }

      const freshStaff = response.data?.staff || [];
      saveGlobalStaffCache(freshStaff);
      waiters.forEach(w => {
        if (typeof w.onSuccess === 'function') {
          w.onSuccess(freshStaff, false);
        }
      });
    })
    .withFailureHandler(function(error) {
      globalStaffFetchInFlight = false;
      const waiters = globalStaffFetchWaiters;
      globalStaffFetchWaiters = [];
      waiters.forEach(w => {
        if (typeof w.onFailure === 'function') {
          w.onFailure(error);
        }
      });
    })
    .getAvailableStaff({ excludeAssigned: false });
}

/**
 * ダッシュボード表示中に全スタッフを先読みしておく
 * @param {boolean} [force=false]
 */
function prefetchGlobalStaffCache(force = false) {
  fetchGlobalStaff({ force });
}

function resetDayConflictIndexCache(date = null) {
  dayConflictIndexCache.date = date;
  dayConflictIndexCache.bySignature = new Map();
}

function getJobTimeSignature(job) {
  return `${job?.time_slot || ''}|${job?.start_time || ''}`;
}

// ========== Dashboard Cache Access ==========
/**
 * ダッシュボードのキャッシュから案件データを取得
 * @param {string} jobId
 * @returns {Object|null} { job, assignments, slots, slotStatus } または null
 */
function getJobFromDashboardCache(jobId) {
  // window.dashboardData はダッシュボードページから公開されるグローバル変数
  const cache = window.dashboardData;
  if (!cache || !cache.jobs) {
    return null;
  }

  // hasFullAssignments フラグで新しいキャッシュかどうか判定
  // 古いキャッシュ（デプロイ前のセッション）では assignments が不完全
  if (!cache.hasFullAssignments) {
    return null;  // 古いキャッシュ → RPCにフォールバック
  }

  const job = cache.jobs.find(j => j.job_id === jobId);
  if (!job) {
    return null;
  }

  // assignments が配列であることを確認
  if (!Array.isArray(job.assignments)) {
    return null;
  }

  // slotStatusをフロントエンドで計算
  const slotStatus = calculateSlotStatus(job.slots || [], job.assignments);

  return {
    job: {
      job_id: job.job_id,
      customer_id: job.customer_id,
      customer_name: job.customer_name,
      site_name: job.site_name,
      site_address: job.site_address || '',
      time_slot: job.time_slot,
      start_time: job.start_time || '',
      work_category: job.work_category,
      work_detail: job.work_detail || '',
      required_count: job.required_count,
      status: job.status,
      supervisor_name: job.supervisor_name || '',
      supervisor_phone: job.supervisor_phone || '',
      notes: job.notes || '',
      work_date: cache.date,  // ダッシュボードの日付
      updated_at: job.updated_at
    },
    assignments: job.assignments,
    slots: job.slots || [],
    slotStatus: slotStatus
  };
}

/**
 * スロットステータスをフロントエンドで計算
 * @param {Array} slots - スロット配列
 * @param {Array} assignments - 配置配列
 * @returns {Object} { slotStatuses: Array, total: Object }
 */
function calculateSlotStatus(slots, assignments) {
  if (!slots || slots.length === 0) {
    return null;
  }

  // アクティブな配置のみ
  const activeAssignments = assignments.filter(a => a.status !== 'CANCELLED');

  // スロットごとの配置数をカウント
  const assignmentsBySlot = {};
  for (const a of activeAssignments) {
    if (a.slot_id) {
      assignmentsBySlot[a.slot_id] = (assignmentsBySlot[a.slot_id] || 0) + 1;
    }
  }

  let totalRequired = 0;
  let totalAssigned = 0;

  const slotStatuses = slots.map(slot => {
    const required = Number(slot.slot_count) || 0;
    const assigned = assignmentsBySlot[slot.slot_id] || 0;
    totalRequired += required;
    totalAssigned += assigned;

    return {
      slot_id: slot.slot_id,
      slot_name: slot.slot_name,
      slot_count: required,
      slot_pay_unit: slot.slot_pay_unit,
      assigned: assigned,
      remaining: Math.max(0, required - assigned),
      shortage: required - assigned  // 正:不足、負:超過、0:充足
    };
  });

  return {
    slotStatuses: slotStatuses,
    total: {
      required: totalRequired,
      assigned: totalAssigned,
      remaining: Math.max(0, totalRequired - totalAssigned)
    }
  };
}

/**
 * キャッシュから案件データを取得
 * @param {string} jobId
 * @returns {Object|null} キャッシュされたデータ、または null
 */
function getAssignmentJobFromCache(jobId) {
  const cached = assignmentJobCache[jobId];
  if (!cached) return null;

  // expireチェック
  const age = Date.now() - cached.timestamp;
  if (age > ASSIGNMENT_CACHE_EXPIRE_MS) {
    delete assignmentJobCache[jobId];
    return null;
  }

  return cached.data;
}

/**
 * キャッシュに案件データを保存
 * @param {string} jobId
 * @param {Object} data - {job, assignments, slots, slotStatus, allStaffRaw}
 */
function saveAssignmentJobToCache(jobId, data) {
  // キャッシュサイズ制限（古いものから削除）
  const keys = Object.keys(assignmentJobCache);
  if (keys.length >= ASSIGNMENT_CACHE_MAX_SIZE) {
    // 最も古いエントリを削除
    let oldestKey = keys[0];
    let oldestTime = assignmentJobCache[oldestKey].timestamp;
    keys.forEach(key => {
      if (assignmentJobCache[key].timestamp < oldestTime) {
        oldestKey = key;
        oldestTime = assignmentJobCache[key].timestamp;
      }
    });
    delete assignmentJobCache[oldestKey];
  }

  assignmentJobCache[jobId] = {
    data: data,
    timestamp: Date.now()
  };
}

// ========== Modal State ==========
let assignmentModalState = {
  jobId: null,
  job: null,
  assignments: [],        // サーバーからの現在の配置データ
  slots: [],              // 案件の枠データ
  slotStatus: null,       // 枠ごとの充足状況
  allStaffRaw: [],        // 全スタッフ（未フィルタ）
  allStaff: [],           // 現在案件向けにフィルタ済みスタッフ
  filteredStaff: [],
  transportAreas: [],
  jobUpdatedAt: null,
  selectedStaffIds: [],   // 選択中のスタッフID（追加/更新対象）
  selectedStaffSet: new Set(),  // selectedStaffIdsのSet版（O(1)ルックアップ用）
  stagedDeletes: [],      // 削除予定の配置ID
  stagedDeletesSet: new Set(),  // stagedDeletesのSet版（O(1)ルックアップ用）
  isSaving: false,
  isLoadingJob: false,    // 案件データ読み込み中かどうか
  isLoadingStaff: false,  // スタッフデータ読み込み中かどうか
  assignmentsLoaded: false,  // 配置データがロード済みかどうか
  // 日次配置キャッシュ（競合チェック用）
  dayAssignments: [],         // その日の全配置（他案件含む）
  dayAssignmentsLoaded: false,
  dayAssignmentsDate: null,   // キャッシュ対象の日付
  // パフォーマンス最適化キャッシュ
  conflictMap: null,          // Map<staff_id, conflict> 競合スタッフ先計算Map
  assignmentMapCache: null    // Map<staff_id, assignment> 配置ルックアップ用
};

/**
 * 案件のNG顧客設定でスタッフを絞り込む
 * @param {Array} staffList
 * @param {Object|null} job
 * @returns {Array}
 */
function filterStaffByJob(staffList, job) {
  if (!Array.isArray(staffList) || staffList.length === 0) return [];
  const customerId = job?.customer_id;
  if (!customerId) return staffList;

  return staffList.filter(staff => {
    if (!staff.ng_customers) return true;
    const ngCustomers = String(staff.ng_customers)
      .split(',')
      .map(c => c.trim())
      .filter(Boolean);
    return !ngCustomers.includes(customerId);
  });
}

/**
 * モーダル内スタッフ状態を更新（raw保持 + 案件フィルタ適用）
 * @param {Array} rawStaffList
 */
function setModalStaff(rawStaffList) {
  assignmentModalState.allStaffRaw = Array.isArray(rawStaffList) ? rawStaffList : [];
  assignmentModalState.allStaff = filterStaffByJob(assignmentModalState.allStaffRaw, assignmentModalState.job);
  populateSkillFilter();
}

/**
 * 現在案件条件でスタッフを再フィルタし、スタッフリストを再描画
 */
function refreshModalStaffFilter() {
  assignmentModalState.allStaff = filterStaffByJob(assignmentModalState.allStaffRaw, assignmentModalState.job);
  populateSkillFilter();
  // フィルタ結果が変わった可能性があるため再描画
  if (assignmentModalState.assignmentsLoaded) {
    filterStaffList();
  }
}

/**
 * スタッフ情報を取得（フィルタ済み優先、配置済みスタッフはraw参照）
 * @param {string} staffId
 * @returns {Object|null}
 */
function getStaffById(staffId) {
  return assignmentModalState.allStaff.find(s => s.staff_id === staffId)
    || assignmentModalState.allStaffRaw.find(s => s.staff_id === staffId)
    || null;
}

  'scaffold': '足場材',

  'sk': 'SK',

  'furniture': '家具',

  'tobi': '鳶',

 * @param {string} workDetail - work_detail値
 * @returns {string} 表示ラベル（空文字の場合もあり）
 */

  if (!workDetail) return '';
  if (workDetail === 'other' && otherText) return otherText;
  return WORK_DETAIL_LABELS[workDetail] || workDetail;
}

// ========== Modal UI Reset ==========
/**
 * モーダルのUI要素を全てリセット（ローディング状態に）
 * 新しいフィールド追加時はここに追記すること
 */
function resetAssignmentModalUI() {
  if (staffSearchDebounceTimer) {
    clearTimeout(staffSearchDebounceTimer);
    staffSearchDebounceTimer = null;
  }
  if (staffListRenderRafId) {
    cancelAnimationFrame(staffListRenderRafId);
    staffListRenderRafId = null;
  }

  // ヘッダー情報
  document.getElementById('modal-customer-name').textContent = '';
  document.getElementById('modal-job-name').textContent = '読み込み中...';
  document.getElementById('modal-job-date').textContent = '-';
  document.getElementById('modal-job-time').textContent = '-';
  document.getElementById('modal-job-start-time').textContent = '';
  document.getElementById('modal-job-start-time').style.display = 'none';
  const typeTag = document.getElementById('modal-job-type-tag');
  if (typeTag) { typeTag.style.display = 'none'; typeTag.textContent = ''; }
  const addrEl = document.getElementById('modal-site-address');
  if (addrEl) addrEl.textContent = '';
  const workContentEl = document.getElementById('modal-work-content');
  if (workContentEl) workContentEl.textContent = '';

  // 統計バッジ
  document.getElementById('modal-required').textContent = '0';
  document.getElementById('modal-assigned').textContent = '0';
  document.getElementById('modal-shortage-badge').style.display = 'none';
  document.getElementById('modal-shortage').textContent = '0';

  // 請求書警告バナー
  hideInvoiceExistsBanner();

  // スタッフリスト
  const staffListEl = document.getElementById('staff-list');
  staffListEl.innerHTML = '<div class="loading-spinner">読み込み中...</div>';
  staffListEl.scrollTop = 0;
  document.getElementById('selected-count').textContent = '';

  // 枠選択
  const slotSelectRow = document.getElementById('slot-select-row');
  if (slotSelectRow) slotSelectRow.style.display = 'none';
  const slotSelect = document.getElementById('form-slot-id');
  if (slotSelect) {
    slotSelect.innerHTML = '<option value="">（枠を選択）</option>';
    slotSelect.value = '';
  }
  const slotHint = document.getElementById('slot-status-hint');
  if (slotHint) slotHint.textContent = '';

  // フィルター・検索
  document.getElementById('staff-search').value = '';
  document.getElementById('staff-skill-filter').value = '';
  document.getElementById('staff-type-filter').value = '';

  // 配置フォーム
  document.getElementById('form-invoice-unit').value = 'basic';
  document.getElementById('form-transport-area').value = '';
  document.getElementById('form-transport-amount').value = '';
  document.getElementById('form-transport-station').value = '';
  document.getElementById('form-transport-has-bus').checked = false;
  document.getElementById('form-assignment-role').value = '';
  document.getElementById('form-is-leader').checked = false;
}

/**
 * モーダルの状態を全てリセット
 * @param {string} jobId - 新しく開く案件ID
 */
function resetAssignmentModalState(jobId) {
  assignmentModalState.jobId = jobId;
  assignmentModalState.job = null;
  assignmentModalState.assignments = [];
  assignmentModalState.slots = [];
  assignmentModalState.slotStatus = null;
  assignmentModalState.allStaffRaw = [];
  assignmentModalState.allStaff = [];
  assignmentModalState.filteredStaff = [];
  assignmentModalState.jobUpdatedAt = null;
  assignmentModalState.selectedStaffIds = [];
  assignmentModalState.selectedStaffSet = new Set();
  assignmentModalState.stagedDeletes = [];
  assignmentModalState.stagedDeletesSet = new Set();
  assignmentModalState.isSaving = false;
  assignmentModalState.isLoadingJob = false;
  assignmentModalState.isLoadingStaff = false;
  assignmentModalState.assignmentsLoaded = false;
  // 日次キャッシュは保持（同日ならリードワンスで再利用）
  // 日付が異なる場合は handleAssignmentData 内の日付チェックで自動的に再ロード
  resetDayConflictIndexCache(null);
  // パフォーマンス最適化キャッシュをリセット
  assignmentModalState.conflictMap = null;
  assignmentModalState.assignmentMapCache = null;
  // transportAreas はキャッシュとして保持
}

// ========== Modal Functions ==========
/**
 * 配置モーダルを開く
 * @param {string} jobId - 案件ID
 * @param {Object} options - オプション
 * @param {Object} options.cachedJob - キャッシュされた案件データ（assignments, slots含む）
 */
function openJobAssignments(jobId, options = {}) {
  // 1. 状態を完全リセット
  resetAssignmentModalState(jobId);

  // 2. UIを完全リセット（ローディング表示）
  resetAssignmentModalUI();

  // 3. モーダル表示
  document.getElementById('assignment-modal').style.display = 'flex';

  // 4. キャッシュを優先チェック: options.cachedJob > assignmentJobCache
  const cachedData = options.cachedJob || getAssignmentJobFromCache(jobId);
  if (cachedData) {
    fillAssignmentModalFromCache(cachedData);
    // options.cachedJobがあればキャッシュにも保存（次回用）
    if (options.cachedJob) {
      saveAssignmentJobToCache(jobId, options.cachedJob);
    }
  }

  // 5. 保存ボタン状態を更新
  updateSaveButton();

  // 6. データ読み込み（キャッシュがあっても最新データを取得）
  loadAssignmentModalData(jobId, !!cachedData);

  // 7. 交通費エリアマスタ読み込み
  loadTransportAreas();
}

/**
 * キャッシュされたデータでモーダルを埋める（即座に表示）
 * @param {Object} cachedData - {job, assignments, slots, slotStatus, allStaffRaw|allStaff}
 */
function fillAssignmentModalFromCache(cachedData) {
  if (!cachedData) return;

  const { job, assignments, slots, slotStatus } = cachedData;
  const rawStaff = cachedData.allStaffRaw || cachedData.allStaff || [];

  // 状態を更新
  assignmentModalState.job = job;
  assignmentModalState.assignments = assignments || [];
  assignmentModalState.slots = slots || [];
  assignmentModalState.slotStatus = slotStatus || null;
  assignmentModalState.jobUpdatedAt = job.updated_at;
  assignmentModalState.allStaffRaw = Array.isArray(rawStaff) ? rawStaff : [];
  assignmentModalState.allStaff = filterStaffByJob(assignmentModalState.allStaffRaw, job);
  assignmentModalState.assignmentsLoaded = true;
  assignmentModalState.assignmentMapCache = null;
  assignmentModalState.conflictMap = null;

  // ヘッダー更新
  document.getElementById('modal-customer-name').textContent = job.customer_name || '-';
  document.getElementById('modal-job-name').textContent = job.site_name || '-';
  document.getElementById('modal-job-date').textContent = formatAssignmentModalDate(job.work_date);
  document.getElementById('modal-job-time').textContent = formatTimeSlotLabel(job.time_slot);
  updateStartTimeDisplay(job.start_time);
  updateWorkCategoryTag(job.work_category);
  updateSiteAddress(job.site_address);
  updateWorkContent(job.work_detail, job.work_detail_other_text);

  // 枠セレクト更新
  updateSlotSelect();

  // スキルフィルター更新
  populateSkillFilter();

  // 統計更新
  updateModalStats();

  // スタッフリスト描画
  filterStaffList();
}

function closeAssignmentModal() {
  const jobId = assignmentModalState.jobId;
  const job = assignmentModalState.job;
  const assignments = assignmentModalState.assignments;
  const assignmentsLoaded = assignmentModalState.assignmentsLoaded;

  document.getElementById('assignment-modal').style.display = 'none';

  // Call host page callback if defined (only if data was loaded)
  if (typeof onAssignmentModalClose === 'function' && assignmentsLoaded) {
    onAssignmentModalClose(jobId, job, assignments);
  }

  // Reset state (keep transport areas cache)
  assignmentModalState = {
    jobId: null,
    job: null,
    assignments: [],
    slots: [],
    slotStatus: null,
    allStaffRaw: [],
    allStaff: [],
    filteredStaff: [],
    transportAreas: assignmentModalState.transportAreas,
    jobUpdatedAt: null,
    selectedStaffIds: [],
    selectedStaffSet: new Set(),
    stagedDeletes: [],
    stagedDeletesSet: new Set(),
    isSaving: false,
    assignmentsLoaded: false,
    dayAssignments: [],
    dayAssignmentsLoaded: false,
    dayAssignmentsDate: null,
    conflictMap: null,
    assignmentMapCache: null
  };
  resetDayConflictIndexCache(null);
}

function loadAssignmentModalData(jobId, hasCache = false) {
  const currentJobId = jobId;  // クロージャでキャプチャ

  // ローディング状態を設定
  assignmentModalState.isLoadingJob = true;
  assignmentModalState.isLoadingStaff = true;

  // グローバルスタッフキャッシュを先にチェック（即座に表示）
  const cachedStaff = getGlobalStaffCache();
  if (cachedStaff && cachedStaff.length > 0) {
    setModalStaff(cachedStaff);
    assignmentModalState.isLoadingStaff = false;  // キャッシュ済みなのでロード完了扱い
  }

  // Show loading only if no cache (案件キャッシュもスタッフキャッシュもない場合のみ)
  if (!hasCache && !cachedStaff) {
    document.getElementById('staff-list').innerHTML = '<div class="loading-spinner">読み込み中...</div>';
  }

  // ★ダッシュボードキャッシュから案件データを取得（RPC削減）
  const dashboardJobData = getJobFromDashboardCache(jobId);
  if (dashboardJobData) {
    // ダッシュボードキャッシュから即座に表示（getJob RPC不要）
    handleAssignmentData({ ok: true, data: dashboardJobData }, currentJobId);
  } else {
    // ダッシュボードキャッシュがない場合はRPCで取得
    google.script.run
      .withSuccessHandler(function(response) {
        handleAssignmentData(response, currentJobId);
      })
      .withFailureHandler(handleAssignmentModalError)
      .getJob(jobId);
  }

  // スタッフは「全件キャッシュ」を利用（未取得時のみサーバー取得）
  fetchGlobalStaff({
    onSuccess: function(staff, usedCache) {
      handleStaffData({ ok: true, data: { staff } }, currentJobId, usedCache);
    },
    onFailure: function(error) {
      handleStaffData({ ok: false, error: { message: error?.message || String(error) } }, currentJobId, !!cachedStaff);
    }
  });
}

function handleAssignmentData(response, requestJobId) {
  // 古いリクエストの結果を無視
  if (assignmentModalState.jobId !== requestJobId) {
    console.log('Ignoring stale getJob response for:', requestJobId);
    return;
  }

  assignmentModalState.isLoadingJob = false;

  if (!response.ok) {
    showToast(response.error?.message || 'データの取得に失敗しました', 'error');
    return;
  }

  const { job, assignments, slots, slotStatus } = response.data;
  assignmentModalState.job = job;
  assignmentModalState.assignments = assignments || [];
  assignmentModalState.slots = slots || [];
  assignmentModalState.slotStatus = slotStatus || null;
  assignmentModalState.jobUpdatedAt = job.updated_at;
  assignmentModalState.assignmentMapCache = null;  // assignments変更時にキャッシュ無効化
  assignmentModalState.conflictMap = null;
  refreshModalStaffFilter();

  // Update header
  document.getElementById('modal-customer-name').textContent = job.customer_name || '-';
  document.getElementById('modal-job-name').textContent = job.site_name || '-';
  document.getElementById('modal-job-date').textContent = formatAssignmentModalDate(job.work_date);
  document.getElementById('modal-job-time').textContent = formatTimeSlotLabel(job.time_slot);
  updateStartTimeDisplay(job.start_time);
  updateWorkCategoryTag(job.work_category);
  updateSiteAddress(job.site_address);
  updateWorkContent(job.work_detail, job.work_detail_other_text);

  // 枠セレクトを更新
  updateSlotSelect();

  // Update stats
  updateModalStats();

  // 日次配置キャッシュを取得（競合チェック用）
  // 優先順位: 1. ダッシュボードキャッシュ（RPC不要）→ 2. RPC取得
  if (job.work_date && assignmentModalState.dayAssignmentsDate !== job.work_date) {
    if (!loadDayAssignmentsFromDashboardCache(job.work_date)) {
      // ダッシュボードキャッシュがない場合のみRPC
      loadDayAssignmentsForConflictCheck(job.work_date, requestJobId);
    }
  } else if (assignmentModalState.dayAssignmentsLoaded) {
    buildConflictMap();
  }

  // 両方のデータが揃った場合のみ描画
  if (!assignmentModalState.isLoadingStaff) {
    assignmentModalState.assignmentsLoaded = true;
    filterStaffList();

    // キャッシュに保存（次回即座に表示するため）
    saveAssignmentJobToCache(requestJobId, {
      job: assignmentModalState.job,
      assignments: assignmentModalState.assignments,
      slots: assignmentModalState.slots,
      slotStatus: assignmentModalState.slotStatus,
      allStaffRaw: assignmentModalState.allStaffRaw
    });
  }
}

function handleStaffData(response, requestJobId, usedGlobalCache = false) {
  // 古いリクエストの結果を無視
  if (assignmentModalState.jobId !== requestJobId) {
    console.log('Ignoring stale staff response for:', requestJobId);
    return;
  }

  assignmentModalState.isLoadingStaff = false;

  if (!response.ok) {
    // キャッシュを使っていた場合はエラーを無視（キャッシュデータで継続）
    if (usedGlobalCache && assignmentModalState.allStaffRaw.length > 0) {
      console.log('Staff refresh failed, using cached data');
      return;
    }
    document.getElementById('staff-list').innerHTML = '<div class="panel-empty">スタッフの取得に失敗しました</div>';
    return;
  }

  const freshStaff = response.data.staff || [];
  setModalStaff(freshStaff);

  // 両方のデータが揃った場合のみ描画
  if (!assignmentModalState.isLoadingJob && assignmentModalState.job) {
    assignmentModalState.assignmentsLoaded = true;
    filterStaffList();

    // 案件キャッシュに保存（次回即座に表示するため）
    saveAssignmentJobToCache(requestJobId, {
      job: assignmentModalState.job,
      assignments: assignmentModalState.assignments,
      slots: assignmentModalState.slots,
      slotStatus: assignmentModalState.slotStatus,
      allStaffRaw: assignmentModalState.allStaffRaw
    });
  } else if (usedGlobalCache && assignmentModalState.job) {
    // キャッシュ使用後に最新データが来た場合、再描画
    filterStaffList();
  }
}

function handleAssignmentModalError(error) {

// ========== Day Assignments for Conflict Check ==========
/**
 * dashboardData から日次配置キャッシュを再構築（dashboardDayAssignmentsCache欠落時のフォールバック）
 * @param {string} date - 日付（YYYY-MM-DD形式）
 * @returns {boolean} 再構築に成功した場合 true
 */
function rebuildDayAssignmentsCacheFromDashboardData(date) {
  const data = window.dashboardData;
  if (!data || data.date !== date || !Array.isArray(data.jobs) || !data.hasFullAssignments) {
    return false;
  }

  const dayAssignments = [];
  for (const job of data.jobs) {
    if (job.status === 'cancelled') continue;
    if (!Array.isArray(job.assignments)) continue;

    for (const a of job.assignments) {
      if (a.status === 'CANCELLED') continue;
      dayAssignments.push({
        assignment_id: a.assignment_id,
        job_id: job.job_id,
        staff_id: a.staff_id,
        status: a.status,
        work_date: data.date,
        time_slot: job.time_slot,
        start_time: job.start_time || '',
        site_name: job.site_name || ''
      });
    }
  }

  window.dashboardDayAssignmentsCache = {
    date: data.date,
    assignments: dayAssignments,
    timestamp: Date.now()
  };
  return true;
}

/**
 * ダッシュボードキャッシュから日次配置を取得（RPC不要）
 * @param {string} date - 日付（YYYY-MM-DD形式）
 * @returns {boolean} キャッシュが有効で使用された場合 true
 */
function loadDayAssignmentsFromDashboardCache(date) {
  let cache = window.dashboardDayAssignmentsCache;

  // キャッシュがない、または日付が異なる場合は使用しない
  if (!cache || cache.date !== date) {
    if (!rebuildDayAssignmentsCacheFromDashboardData(date)) {
      return false;
    }
    cache = window.dashboardDayAssignmentsCache;
  }

  // キャッシュを使用
  assignmentModalState.dayAssignments = cache.assignments || [];
  assignmentModalState.dayAssignmentsLoaded = true;
  assignmentModalState.dayAssignmentsDate = date;
  resetDayConflictIndexCache(date);
  assignmentModalState.conflictMap = null;  // conflictMap再構築を促す
  if (assignmentModalState.job) {
    buildConflictMap();
  }

  return true;
}

/**
 * 現在のジョブの配置を日次キャッシュに反映（保存後に呼び出し）
 * RPC不要でキャッシュを更新する
 */
function updateDayAssignmentsCacheForCurrentJob() {
  const job = assignmentModalState.job;
  const assignments = assignmentModalState.assignments;
  if (!job || !assignmentModalState.dayAssignmentsLoaded) return;

  // 現在のジョブの配置を除去
  const otherAssignments = assignmentModalState.dayAssignments.filter(
    a => a.job_id !== job.job_id
  );

  // 新しい配置を追加
  const currentJobAssignments = (assignments || [])
    .filter(a => a.status !== 'CANCELLED')
    .map(a => ({
      assignment_id: a.assignment_id,
      job_id: job.job_id,
      staff_id: a.staff_id,
      status: a.status,
      work_date: job.work_date,
      time_slot: job.time_slot,
      start_time: job.start_time || '',
      site_name: job.site_name || ''
    }));

  assignmentModalState.dayAssignments = [...otherAssignments, ...currentJobAssignments];
  resetDayConflictIndexCache(assignmentModalState.dayAssignmentsDate);
  assignmentModalState.conflictMap = null;  // conflictMap再構築を促す
  if (assignmentModalState.job) {
    buildConflictMap();
  }
}

/**
 * その日の全配置を取得（競合チェック用キャッシュ）
 * @param {string} date - 日付（YYYY-MM-DD形式）
 * @param {string} requestJobId - リクエスト時のjobId（古いリクエスト判定用）
 */
function loadDayAssignmentsForConflictCheck(date, requestJobId) {
  google.script.run
    .withSuccessHandler(function(response) {
      // 古いリクエストの結果を無視
      if (assignmentModalState.jobId !== requestJobId) {
        return;
      }

      if (response.ok) {
        assignmentModalState.dayAssignments = response.data.assignments || [];
        assignmentModalState.dayAssignmentsLoaded = true;
        assignmentModalState.dayAssignmentsDate = date;
        resetDayConflictIndexCache(date);
        assignmentModalState.conflictMap = null;  // conflictMap再構築を促す
        if (assignmentModalState.job) {
          buildConflictMap();
        }

        // スタッフリストを再描画して競合警告を表示
        if (assignmentModalState.assignmentsLoaded) {
          filterStaffList();
        }
      }
    })
    .withFailureHandler(function(error) {
      // 失敗しても主機能には影響しない（警告が出ないだけ）
      console.log('getDayAssignmentsForConflictCheck failed:', error);
    })
    .getDayAssignmentsForConflictCheck(date);
}

/**
 * conflictMapを構築（dayAssignments / currentJob 更新時に1回だけ呼ぶ）
 * 同一 time_slot/start_time シグネチャで事前計算したインデックスを再利用
 */
function buildConflictMap() {
  const currentJob = assignmentModalState.job;
  if (!currentJob) {
    assignmentModalState.conflictMap = new Map();
    return;
  }

  const currentDate = assignmentModalState.dayAssignmentsDate || currentJob.work_date || null;
  if (dayConflictIndexCache.date !== currentDate) {
    resetDayConflictIndexCache(currentDate);
  }

  const signature = getJobTimeSignature(currentJob);
  let map = dayConflictIndexCache.bySignature.get(signature);
  if (!map) {
    const signatureJob = {
      time_slot: currentJob.time_slot,
      start_time: currentJob.start_time || ''
    };

    map = new Map();
    for (const a of assignmentModalState.dayAssignments) {
      if (!isTimeSlotConflictWithStartTime(
        signatureJob,
        { time_slot: a.time_slot, start_time: a.start_time }
      )) {
        continue;
      }

      if (!map.has(a.staff_id)) {
        map.set(a.staff_id, []);
      }
      map.get(a.staff_id).push(a);
    }

    dayConflictIndexCache.bySignature.set(signature, map);
  }

  assignmentModalState.conflictMap = map;
}

/**
 * スタッフの競合をチェック（先計算済みconflictMap経由、O(1)ルックアップ）
 * @param {string} staffId - スタッフID
 * @returns {Object|null} 競合情報 { conflictingSite, timeSlot, startTime } または null
 */
function checkStaffConflicts(staffId) {
  // 日次キャッシュがなければチェックスキップ
  if (!assignmentModalState.dayAssignmentsLoaded) {
    return null;
  }

  const currentJob = assignmentModalState.job;
  if (!currentJob) return null;

  // conflictMapがなければ構築
  if (!assignmentModalState.conflictMap) {
    buildConflictMap();
  }

  const currentJobId = currentJob.job_id;
  const candidates = assignmentModalState.conflictMap.get(staffId);
  if (!candidates || candidates.length === 0) {
    return null;
  }

  for (const a of candidates) {
    if (a.job_id === currentJobId) continue;
    return {
      conflictingSite: a.site_name || '（現場名なし）',
      timeSlot: a.time_slot,
      startTime: a.start_time || ''
    };
  }

  return null;
}

/**
 * 時間帯の競合判定（クライアント側、start_time考慮版）
 * AssignmentService._isTimeSlotConflictWithStartTime と同じロジック
 */
function isTimeSlotConflictWithStartTime(job1, job2) {
  const slot1 = job1.time_slot;
  const slot2 = job2.time_slot;
  const start1 = job1.start_time || '';
  const start2 = job2.start_time || '';

  // 終日・上棟は他の全てと重複
  const fullDaySlots = ['shuujitsu', 'jotou'];
  if (fullDaySlots.includes(slot1) || fullDaySlots.includes(slot2)) {
    return true;
  }

  // 夜勤 vs 日勤 → 競合なし
  const daySlots = ['am', 'pm', 'mitei'];
  if ((slot1 === 'yakin' && daySlots.includes(slot2)) ||
      (slot2 === 'yakin' && daySlots.includes(slot1))) {
    return false;
  }

  // 夜勤 vs 夜勤 → 競合
  if (slot1 === 'yakin' && slot2 === 'yakin') {
    if (start1 && start2) {
      return start1 === start2;
    }
    return true;
  }

  // 同じ時間帯（am同士、pm同士、mitei同士）
  if (slot1 === slot2) {
    if (start1 && start2) {
      return start1 === start2;
    }
    return true;
  }

  // 異なる日勤時間帯（am vs pm など）→ 競合なし
  return false;
}

/**
 * スキルフィルターを全スタッフのスキルから動的生成
 */
function populateSkillFilter() {
  const select = document.getElementById('staff-skill-filter');
  if (!select) return;

  const currentValue = select.value;

  // 全スタッフからユニークなスキルを収集
  const skillSet = new Set();
  assignmentModalState.allStaff.forEach(staff => {
    if (staff.skills) {
      staff.skills.split(',').forEach(skill => {
        const trimmed = skill.trim();
        if (trimmed) skillSet.add(trimmed);
      });
    }
  });

  // ソートしてオプション生成
  const skills = Array.from(skillSet).sort((a, b) => a.localeCompare(b, 'ja'));

  select.innerHTML = '<option value="">全スキル</option>';
  skills.forEach(skill => {
    const option = document.createElement('option');
    option.value = skill;
    option.textContent = skill;
    select.appendChild(option);
  });

  // 以前の選択値を復元
  if (currentValue && skills.includes(currentValue)) {
    select.value = currentValue;
  }
}

function updateModalStats() {
  // 1回走査で validStaffIds と existingStaffIds を同時構築
  const validStaffIds = new Set();
  const existingStaffIds = new Set();
  const stagedDeletesSet = assignmentModalState.stagedDeletesSet;

  for (const a of assignmentModalState.assignments) {
    if (a.status === 'CANCELLED') continue;
    existingStaffIds.add(a.staff_id);
    if (!stagedDeletesSet.has(a.assignment_id)) {
      validStaffIds.add(a.staff_id);
    }
  }

  // 新規追加予定を計算（既存配置にないスタッフのみ）
  const newAdds = assignmentModalState.selectedStaffIds.filter(id => !existingStaffIds.has(id));

  const assigned = validStaffIds.size + newAdds.length;
  const required = Number(assignmentModalState.job?.required_count) || 0;
  const shortage = required - assigned;

  document.getElementById('modal-required').textContent = required;
  document.getElementById('modal-assigned').textContent = assigned;

  const shortageBadge = document.getElementById('modal-shortage-badge');
  const shortageValue = document.getElementById('modal-shortage');

  if (shortage > 0) {
    shortageBadge.style.display = 'inline-flex';
    shortageValue.textContent = shortage;
  } else {
    shortageBadge.style.display = 'none';
  }
}

// ========== Slot Functions ==========
/**
 * 枠セレクトを更新
 */
function updateSlotSelect() {
  const slotSelectRow = document.getElementById('slot-select-row');
  const slotSelect = document.getElementById('form-slot-id');
  const slots = assignmentModalState.slots || [];

  if (slots.length === 0) {
    // 枠が設定されていない場合は非表示
    slotSelectRow.style.display = 'none';
    return;
  }

  // 枠が設定されている場合は表示
  slotSelectRow.style.display = 'flex';

  // 枠充足状況を取得
  const slotStatus = assignmentModalState.slotStatus;
  const slotStatuses = slotStatus?.slotStatuses || [];

  // セレクトオプションを構築
  slotSelect.innerHTML = '<option value="">（枠を選択してください）</option>';

  const timeSlotLabels = {
    'jotou': '上棟',
    'shuujitsu': '終日',
    'am': 'AM',
    'pm': 'PM',
    'yakin': '夜勤',
    'mitei': '未定'
  };

  const payUnitLabels = {
    'basic': '基本',
    'halfday': 'ハーフ',
    'fullday': '終日',
    'night': '夜勤',
    'tobi': '鳶',
    'tobiage': '鳶揚げ'
  };

  slots.forEach(slot => {
    const option = document.createElement('option');
    option.value = slot.slot_id;
    option.dataset.payUnit = slot.slot_pay_unit;
    option.dataset.timeSlot = slot.slot_time_slot;

    // 充足状況を取得
    const status = slotStatuses.find(s => s.slot_id === slot.slot_id);
    const assigned = status?.assigned || 0;
    const required = Number(slot.slot_count) || 0;
    const shortage = required - assigned;

    const timeLabel = timeSlotLabels[slot.slot_time_slot] || slot.slot_time_slot;
    const payLabel = payUnitLabels[slot.slot_pay_unit] || slot.slot_pay_unit;

    // 表示形式: "AM / 基本 (2/3名)"
    const statusText = shortage > 0 ? `${assigned}/${required}名 不足${shortage}` : `${assigned}/${required}名 充足`;
    option.textContent = `${timeLabel} / ${payLabel} (${statusText})`;

    // 充足状態でスタイル変更のためのdata属性
    option.dataset.status = shortage > 0 ? 'shortage' : 'filled';

    slotSelect.appendChild(option);
  });

  // ヒントを更新
  updateSlotStatusHint();
}

/**
 * 枠選択時のハンドラー
 */
function onSlotChange() {
  const slotSelect = document.getElementById('form-slot-id');
  const invoiceUnitSelect = document.getElementById('form-invoice-unit');
  const selectedOption = slotSelect.options[slotSelect.selectedIndex];

  if (selectedOption && selectedOption.dataset.payUnit) {
    // 枠の単価区分を自動設定
    invoiceUnitSelect.value = selectedOption.dataset.payUnit;
  }

  updateSlotStatusHint();
}

/**
 * 枠充足状況のヒントを更新
 */
function updateSlotStatusHint() {
  const hintEl = document.getElementById('slot-status-hint');
  const slotSelect = document.getElementById('form-slot-id');
  const selectedSlotId = slotSelect.value;

  if (!selectedSlotId) {
    hintEl.textContent = '枠を選択すると単価区分が自動設定されます';
    hintEl.style.color = 'var(--text-muted)';
    return;
  }

  const slotStatus = assignmentModalState.slotStatus;
  const status = slotStatus?.slotStatuses?.find(s => s.slot_id === selectedSlotId);

  if (status) {
    const shortage = status.shortage;
    if (shortage > 0) {
      hintEl.textContent = `この枠はあと${shortage}名不足しています`;
      hintEl.style.color = 'var(--danger)';
    } else if (shortage < 0) {
      hintEl.textContent = `この枠は${Math.abs(shortage)}名超過しています`;
      hintEl.style.color = 'var(--warning)';
    } else {
      hintEl.textContent = 'この枠は充足しています';
      hintEl.style.color = 'var(--success)';
    }
  } else {
    hintEl.textContent = '';
  }
}

function filterStaffList(resetScroll = false) {
  const searchQuery = document.getElementById('staff-search').value.toLowerCase();
  const skillFilter = document.getElementById('staff-skill-filter').value;
  const typeFilter = document.getElementById('staff-type-filter').value;

  // Get assigned staff IDs (excluding staged deletes)
  const stagedDeletesSet = assignmentModalState.stagedDeletesSet;
  const assignedIdSet = new Set();
  for (const a of assignmentModalState.assignments) {
    if (a.status !== 'CANCELLED' && !stagedDeletesSet.has(a.assignment_id)) {
      assignedIdSet.add(a.staff_id);
    }
  }

  // Filter staff
  let filtered = assignmentModalState.allStaff.filter(s => {
    // Name search
    if (searchQuery) {
      const name = (s.name || '').toLowerCase();
      const kana = (s.name_kana || '').toLowerCase();
      if (!name.includes(searchQuery) && !kana.includes(searchQuery)) return false;
    }

    // Skill filter
    if (skillFilter && s.skills) {
      const skills = s.skills.split(',').map(sk => sk.trim());
      if (!skills.includes(skillFilter)) return false;
    }

    // Type filter
    if (typeFilter && s.staff_type !== typeFilter) {
      return false;
    }

    return true;
  });

  // Sort: assigned first, then by kana
  filtered.sort((a, b) => {
    const aAssigned = assignedIdSet.has(a.staff_id) ? 0 : 1;
    const bAssigned = assignedIdSet.has(b.staff_id) ? 0 : 1;
    if (aAssigned !== bAssigned) return aAssigned - bAssigned;
    const nameA = a.name_kana || a.name || '';
    const nameB = b.name_kana || b.name || '';
    return nameA.localeCompare(nameB, 'ja');
  });

  assignmentModalState.filteredStaff = filtered;
  if (resetScroll) {
    const container = document.getElementById('staff-list');
    if (container) container.scrollTop = 0;
  }
  renderStaffList();
}

function renderStaffRowHtml(staff, ctx) {
  const { workCategory, selectedStaffSet, assignmentMap, typeLabels } = ctx;
  const s = staff;
  const typeLabel = typeLabels[s.staff_type] || s.staff_type;
  const typeClass = s.staff_type || 'employee';
  const assignment = assignmentMap[s.staff_id];
  const isAssigned = !!assignment;
  const isSelected = selectedStaffSet.has(s.staff_id);
  const isStagedForDelete = isAssigned && assignmentModalState.stagedDeletesSet.has(assignment.assignment_id);
  const skills = s.skills ? s.skills.split(',').map(sk => sk.trim()) : [];

  // 競合チェック（配置済みでないスタッフのみ）
  const conflict = !isAssigned ? checkStaffConflicts(s.staff_id) : null;
  const hasConflict = !!conflict;

  // 配置済みスタッフの追加情報
  const roleLabel = isAssigned ? (assignment.assignment_role || '') : '';
  const leaderBadge = isAssigned && assignment.is_leader ? '<span class="leader-badge">リーダー</span>' : '';

  // 競合警告バッジ
  const conflictBadge = hasConflict
    ? `<span class="conflict-badge" title="${escapeHtml(conflict.conflictingSite)}（${formatTimeSlotLabel(conflict.timeSlot)}${conflict.startTime ? ' ' + conflict.startTime : ''}）に配置済み">⚠️</span>`
    : '';

  // クラス設定
  let itemClasses = 'staff-list-item';
  if (isStagedForDelete) {
    itemClasses += ' staged-delete';
  } else if (isAssigned) {
    itemClasses += ' assigned';
    if (isSelected) itemClasses += ' selected';
  } else if (isSelected) {
    itemClasses += ' selected';
  }
  if (hasConflict) {
    itemClasses += ' has-conflict';
  }

  // 削除ボタン（配置済みで削除予定でないもののみ）
  const deleteBtn = isAssigned && !isStagedForDelete
    ? `<button class="btn-icon btn-delete" onclick="event.stopPropagation(); stageDeleteByStaff('${s.staff_id}')" title="削除">×</button>`
    : '';

  // 削除取り消しボタン（削除予定のもののみ）
  const undoBtn = isStagedForDelete
    ? `<button class="btn-icon btn-undo" onclick="event.stopPropagation(); unstageDeleteByStaff('${s.staff_id}')" title="削除取消">↩</button>`
    : '';

  // チェックボックスの状態（選択中のみチェック、配置済みは背景色で表示）
  const checkboxChecked = isSelected;

  return `
    <div class="${itemClasses}" onclick="toggleStaffSelection('${s.staff_id}')">
      <input type="checkbox" class="staff-checkbox" ${checkboxChecked ? 'checked' : ''} onclick="event.stopPropagation(); toggleStaffSelection('${s.staff_id}')">
      <div class="staff-list-info">
        <span class="staff-list-name">${escapeHtml(s.name)}${s.nickname ? ' (' + escapeHtml(s.nickname) + ')' : ''}${leaderBadge}${conflictBadge}</span>
        <span class="staff-type-badge ${typeClass}">${typeLabel}</span>
        ${roleLabel ? `<span class="role-label">${escapeHtml(roleLabel)}</span>` : ''}
        ${skills.map(sk => `<span class="skill-badge ${sk === workCategory ? 'match' : ''}">${escapeHtml(sk)}</span>`).join('')}
      </div>
      <div class="staff-list-actions">
        ${deleteBtn}${undoBtn}
      </div>
    </div>
  `;
}

function renderStaffList() {
  const container = document.getElementById('staff-list');
  const staff = assignmentModalState.filteredStaff;
  const workCategory = assignmentModalState.job?.work_category;
  const selectedStaffSet = assignmentModalState.selectedStaffSet;

  // Build assignment map for quick lookup（キャッシュ利用）
  if (!assignmentModalState.assignmentMapCache) {
    const map = {};
    assignmentModalState.assignments
      .filter(a => a.status !== 'CANCELLED')
      .forEach(a => { map[a.staff_id] = a; });
    assignmentModalState.assignmentMapCache = map;
  }
  const assignmentMap = assignmentModalState.assignmentMapCache;

  if (staff.length === 0) {
    container.innerHTML = '<div class="panel-empty">該当するスタッフがいません</div>';
    updateSelectedCount();
    return;
  }

  const typeLabels = {
    'regular': '自社',
    'student': '学生',
    'sole_proprietor': '個人',
    'subcontract': '外注'
  };

  const ctx = { workCategory, selectedStaffSet, assignmentMap, typeLabels };
  const rowsHtml = staff
    .map(s => renderStaffRowHtml(s, ctx))
    .join('');

  container.innerHTML = rowsHtml;

  updateSelectedCount();
}

function toggleStaffSelection(staffId) {
  const assignment = assignmentModalState.assignments.find(
    a => a.staff_id === staffId && a.status !== 'CANCELLED'
  );

  // 削除予定の場合は、削除を取り消す
  if (assignment && assignmentModalState.stagedDeletesSet.has(assignment.assignment_id)) {
    unstageDelete(assignment.assignment_id);
    return;
  }

  // 選択状態をトグル
  const selectedStaffSet = assignmentModalState.selectedStaffSet;
  if (!selectedStaffSet.has(staffId)) {
    // 新規選択時：競合チェック（配置済みスタッフは既にこの案件に割り当て済みなのでスキップ）
    if (!assignment) {
      const conflict = checkStaffConflicts(staffId);
      if (conflict) {
        const staffName = getStaffById(staffId)?.name || 'このスタッフ';
        const timeLabel = formatTimeSlotLabel(conflict.timeSlot);
        const startTimeInfo = conflict.startTime ? `（${conflict.startTime}〜）` : '';

        // 汎用確認モーダルで警告表示
        ConfirmationModal.show({
          type: 'warning',
          title: '配置の重複確認',
          message: `${staffName} は同じ日の ${timeLabel}${startTimeInfo} に「${conflict.conflictingSite}」に配置されています。\n\nそれでも配置しますか？`,
          confirmText: '配置する',
          cancelText: 'キャンセル',
          onConfirm: () => {
            // 強制配置
            addStaffToSelection(staffId);
          }
        });
        return;
      }
    }
    selectedStaffSet.add(staffId);
    assignmentModalState.selectedStaffIds = Array.from(selectedStaffSet);
  } else {
    selectedStaffSet.delete(staffId);
    assignmentModalState.selectedStaffIds = Array.from(selectedStaffSet);
  }

  renderStaffList();
  updateSaveButton();
  updateModalStats();
}

/**
 * スタッフを選択リストに追加（競合確認後）
 * @param {string} staffId
 */
function addStaffToSelection(staffId) {
  if (!assignmentModalState.selectedStaffSet.has(staffId)) {
    assignmentModalState.selectedStaffSet.add(staffId);
    assignmentModalState.selectedStaffIds.push(staffId);
  }
  renderStaffList();
  updateSaveButton();
  updateModalStats();
}

function updateSelectedCount() {
  const count = assignmentModalState.selectedStaffIds.length;
  const countEl = document.getElementById('selected-count');
  countEl.textContent = count > 0 ? `${count}名選択中` : '';
}

// ========== Staged Delete Functions ==========
function stageDeleteByStaff(staffId) {
  const assignment = assignmentModalState.assignments.find(
    a => a.staff_id === staffId && a.status !== 'CANCELLED'
  );
  if (assignment) {
    stageDelete(assignment.assignment_id);
  }
}

function stageDelete(assignmentId) {
  if (!assignmentModalState.stagedDeletesSet.has(assignmentId)) {
    assignmentModalState.stagedDeletes.push(assignmentId);
    assignmentModalState.stagedDeletesSet.add(assignmentId);
  }
  renderStaffList();
  updateSaveButton();
  updateModalStats();
}

function unstageDeleteByStaff(staffId) {
  const assignment = assignmentModalState.assignments.find(
    a => a.staff_id === staffId && a.status !== 'CANCELLED'
  );
  if (assignment) {
    unstageDelete(assignment.assignment_id);
  }
}

function unstageDelete(assignmentId) {
  const idx = assignmentModalState.stagedDeletes.indexOf(assignmentId);
  if (idx !== -1) {
    assignmentModalState.stagedDeletes.splice(idx, 1);
    assignmentModalState.stagedDeletesSet.delete(assignmentId);
  }
  renderStaffList();
  updateSaveButton();
  updateModalStats();
}

// ========== Save Button ==========
function updateSaveButton() {
  const btn = document.getElementById('batch-add-btn');
  const selectedCount = assignmentModalState.selectedStaffIds.length;
  const deleteCount = assignmentModalState.stagedDeletes.length;
  const totalChanges = selectedCount + deleteCount;

  btn.disabled = totalChanges === 0 || assignmentModalState.isSaving;

  if (assignmentModalState.isSaving) {
    btn.textContent = '登録中...';
  } else if (totalChanges === 0) {
    btn.textContent = '変更を登録';
  } else {
    const parts = [];
    if (selectedCount > 0) parts.push(`${selectedCount}名`);
    if (deleteCount > 0) parts.push(`削除${deleteCount}件`);
    btn.textContent = `${parts.join(' / ')} を登録`;
  }
}

// ========== Save All Changes ==========
function saveAllChanges() {
  if (assignmentModalState.isSaving) return;

  const selectedIds = assignmentModalState.selectedStaffIds;
  const deleteIds = assignmentModalState.stagedDeletes;

  if (selectedIds.length === 0 && deleteIds.length === 0) return;

  // 保存前の競合チェック（新規追加のみ対象）
  const conflicts = checkAllConflictsBeforeSave(selectedIds);
  if (conflicts.length > 0) {
    // 競合がある場合は確認モーダルを表示
    const conflictMessages = conflicts.map(c =>
      `・${c.staffName}: ${formatTimeSlotLabel(c.timeSlot)}${c.startTime ? '（' + c.startTime + '〜）' : ''} 「${c.conflictingSite}」`
    ).join('\n');

    ConfirmationModal.show({
      type: 'warning',
      title: '配置の重複確認',
      message: `以下のスタッフは同じ日に他の案件に配置されています。\n\n${conflictMessages}\n\nそれでも登録しますか？`,
      confirmText: '登録する',
      cancelText: 'キャンセル',
      onConfirm: () => {
        // 強制登録
        doSaveAllChanges();
      }
    });
    return;
  }

  doSaveAllChanges();
}

/**
 * 保存前の競合チェック（新規追加スタッフのみ）
 * @param {string[]} selectedIds - 選択中のスタッフID
 * @returns {Object[]} 競合リスト [{staffId, staffName, conflictingSite, timeSlot, startTime}]
 */
function checkAllConflictsBeforeSave(selectedIds) {
  const conflicts = [];

  // 既に配置済みのスタッフIDを取得
  const existingStaffIds = new Set(
    assignmentModalState.assignments
      .filter(a => a.status !== 'CANCELLED')
      .map(a => a.staff_id)
  );

  // 新規追加のスタッフのみ競合チェック
  for (const staffId of selectedIds) {
    if (existingStaffIds.has(staffId)) continue;  // 既存配置は対象外

    const conflict = checkStaffConflicts(staffId);
    if (conflict) {
      const staff = getStaffById(staffId);
      conflicts.push({
        staffId: staffId,
        staffName: staff?.name || '不明',
        conflictingSite: conflict.conflictingSite,
        timeSlot: conflict.timeSlot,
        startTime: conflict.startTime
      });
    }
  }

  return conflicts;
}

/**
 * 実際の保存処理
 */
function doSaveAllChanges() {
  // UIフィードバックを即時化（payload構築前にボタンを無効化）
  assignmentModalState.isSaving = true;
  updateSaveButton();

  const selectedIds = assignmentModalState.selectedStaffIds;
  const deleteIds = assignmentModalState.stagedDeletes;

  const slotId = document.getElementById('form-slot-id')?.value || '';
  const invoiceUnit = document.getElementById('form-invoice-unit').value;
  const transportArea = document.getElementById('form-transport-area').value;
  const transportAmount = document.getElementById('form-transport-amount').value;
  const transportStation = document.getElementById('form-transport-station').value;
  const transportHasBus = document.getElementById('form-transport-has-bus').checked;
  const assignmentRole = document.getElementById('form-assignment-role').value;
  const isLeader = document.getElementById('form-is-leader').checked;

  // Build assignment map
  const assignmentMap = {};
  assignmentModalState.assignments.filter(a => a.status !== 'CANCELLED').forEach(a => {
    assignmentMap[a.staff_id] = a.assignment_id;
  });

  // Build upserts
  // Note: pay_unit, wage_rate, invoice_rate はバックエンドで自動設定
  // pay_unit = invoice_unit（強制同期）
  // wage_rate, invoice_rate = null（マスタ参照）
  const upserts = selectedIds.map(staffId => {
    const staff = getStaffById(staffId);
    const workerType = staff?.staff_type === 'subcontract' ? 'SUBCONTRACT' : 'STAFF';

    const data = {
      staff_id: staffId,
      worker_type: workerType,
      display_time_slot: assignmentModalState.job?.time_slot || '',
      invoice_unit: invoiceUnit,
      assignment_role: assignmentRole,
      is_leader: isLeader
    };

    // 枠IDが選択されていれば追加
    if (slotId) {
      data.slot_id = slotId;
    }

    if (assignmentMap[staffId]) {
      data.assignment_id = assignmentMap[staffId];
    }

    // P2-8: 交通費関連フィールド（空値・0も明示的に送信してクリア可能に）
    data.transport_area = transportArea || '';
    data.transport_amount = transportAmount !== '' ? Number(transportAmount) : '';
    data.transport_station = transportStation || '';
    data.transport_has_bus = transportHasBus;

    return data;
  });

  const changes = {
    upserts: upserts,
    deletes: deleteIds
  };

  google.script.run
    .withSuccessHandler(function(response) {
      assignmentModalState.isSaving = false;

      if (response.ok) {
        const msg = [];
        if (selectedIds.length > 0) msg.push(`${selectedIds.length}名を登録`);
        if (deleteIds.length > 0) msg.push(`${deleteIds.length}件を削除`);
        showToast(msg.join('、') + 'しました ✓', 'success');

        // Update state with server response
        assignmentModalState.assignments = response.data.assignments || [];
        assignmentModalState.slots = response.data.slots || assignmentModalState.slots;
        assignmentModalState.slotStatus = response.data.slotStatus || assignmentModalState.slotStatus;
        assignmentModalState.jobUpdatedAt = response.data.job?.updated_at;
        assignmentModalState.assignmentMapCache = null;  // assignments変更時にキャッシュ無効化

        // Clear staged changes
        assignmentModalState.selectedStaffIds = [];
        assignmentModalState.selectedStaffSet = new Set();
        assignmentModalState.stagedDeletes = [];
        assignmentModalState.stagedDeletesSet = new Set();

        // 枠選択をリセット
        const slotSelect = document.getElementById('form-slot-id');
        if (slotSelect) slotSelect.value = '';

        updateSlotSelect();  // 枠セレクトを更新（充足状況反映）
        updateModalStats();
        filterStaffList();
        updateSaveButton();

        // 日次キャッシュを更新（現在のジョブの配置のみ更新）
        // Note: モーダルを閉じた時に onAssignmentModalClose が呼ばれ、
        // ダッシュボードキャッシュも更新される
        updateDayAssignmentsCacheForCurrentJob();

        // 請求書存在チェック（案件担当への通知用）
        checkInvoiceExistsNotification();
      } else {
        showToast(response.error?.message || '保存に失敗しました', 'error');
        updateSaveButton();
      }
    })
    .withFailureHandler(function(error) {
      assignmentModalState.isSaving = false;
      showToast('エラー: ' + error.message, 'error');
      updateSaveButton();
    })
    .saveAssignments(assignmentModalState.jobId, changes, assignmentModalState.jobUpdatedAt);
}

// ========== LINE Template Functions ==========

// --- LocalStorage Cache for LINE Template ---
const LINE_TEMPLATE_CACHE_PREFIX = 'line_template_draft_';

function getTemplateCacheKey(jobId) {
  return LINE_TEMPLATE_CACHE_PREFIX + jobId;
}

function saveTemplateDraft(jobId, content) {
  if (!jobId) return;
  const workDate = assignmentModalState.job?.work_date || '';
  const data = {
    content: content,
    workDate: workDate,
    savedAt: new Date().toISOString()
  };
  try {
    localStorage.setItem(getTemplateCacheKey(jobId), JSON.stringify(data));
  } catch (e) {
    console.warn('Failed to save template draft:', e);
  }
}

function loadTemplateDraft(jobId) {
  if (!jobId) return null;
  try {
    const data = localStorage.getItem(getTemplateCacheKey(jobId));
    if (!data) return null;
    return JSON.parse(data);
  } catch (e) {
    console.warn('Failed to load template draft:', e);
    return null;
  }
}

function cleanupExpiredTemplateCache() {
  // 案件当日を過ぎたキャッシュを削除
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const keysToRemove = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith(LINE_TEMPLATE_CACHE_PREFIX)) {
      try {
        const data = JSON.parse(localStorage.getItem(key));
        if (data.workDate) {
          const workDate = new Date(data.workDate + 'T00:00:00');
          if (workDate < today) {
            keysToRemove.push(key);
          }
        }
      } catch (e) {
        // パースエラーの場合も削除対象
        keysToRemove.push(key);
      }
    }
  }

  keysToRemove.forEach(key => {
    try {
      localStorage.removeItem(key);
    } catch (e) {
      // 無視
    }
  });

  if (keysToRemove.length > 0) {
    console.log(`Cleaned up ${keysToRemove.length} expired template cache(s)`);
  }
}

// Debounce utility
let templateSaveTimeout = null;
function debouncedSaveTemplate() {
  if (templateSaveTimeout) {
    clearTimeout(templateSaveTimeout);
  }
  templateSaveTimeout = setTimeout(() => {
    const jobId = assignmentModalState.jobId;
    const textarea = document.getElementById('line-template-textarea');
    if (jobId && textarea) {
      saveTemplateDraft(jobId, textarea.value);
    }
  }, 500);
}

function openLineTemplateModal() {
  const jobId = assignmentModalState.jobId;

  // 古いキャッシュをクリーンアップ
  cleanupExpiredTemplateCache();

  // キャッシュがあれば復元、なければ新規生成
  const cached = loadTemplateDraft(jobId);
  let template;
  if (cached && cached.content) {
    template = cached.content;
  } else {
    template = generateLineTemplate();
  }

  document.getElementById('line-template-textarea').value = template;
  document.getElementById('line-template-modal').style.display = 'flex';
}

function closeLineTemplateModal() {

}

function copyLineTemplateFromModal() {

function generateLineTemplate() {
  const { job, assignments } = assignmentModalState;
  const activeAssignments = assignments.filter(a => a.status !== 'CANCELLED');

  // 日付フォーマット（YYYY年M月D日（曜日））
  const dateStr = job.work_date ? formatLineTemplateDate(job.work_date) : '';

  // リーダーを特定
  const leaders = activeAssignments.filter(a => a.is_leader);
  const leaderNames = leaders.map(a => a.staff_nickname || a.staff_name || '名前未設定').join('、');
  const leaderWithPhone = leaders.length > 0
    ? leaders.map(a => {
        const staff = getStaffById(a.staff_id);
        const phone = staff?.phone || a.staff_phone || '';
        const name = a.staff_nickname || a.staff_name || '名前未設定';
        return phone ? `${name}（${phone}）` : name;
      }).join('、')
    : '';

  // 作業種別の日本語マッピング
  const workCategoryLabels = {
    'jotou': '上棟',
    'keisagyo': '軽作業',
    'niage': '荷揚げ'
  };
  const workCategoryPrefix = workCategoryLabels[job.work_category] || '';

  // 役割別にグループ化（外注スタッフはまとめてカウント表示）
  const roleGroups = {};
  activeAssignments.forEach(a => {
    const role = a.assignment_role || '未指定';
    if (!roleGroups[role]) roleGroups[role] = { names: [], subCount: 0 };
    const staff = getStaffById(a.staff_id);
    if (staff?.staff_type === 'subcontract') {
      roleGroups[role].subCount++;
    } else {
      roleGroups[role].names.push(a.staff_nickname || a.staff_name || '名前未設定');
    }
  });

  // メンバー欄を役割別に生成（作業種別プレフィックス付き、外注は「外注○名」）
  const memberLines = [];
  const roleOrder = ['鳶', '鳶補助', '荷揚げ', '鳶揚げ', '未指定'];
  const formatRoleMembers = (role, group) => {
    const parts = [...group.names];
    if (group.subCount > 0) parts.push(`外注${group.subCount}名`);
    const label = role === '未指定' ? '' : (workCategoryPrefix + role);
    if (label) {
      memberLines.push(`${label}（${parts.join('、')}）`);
    } else {
      memberLines.push(parts.join('、'));
    }
  };
  roleOrder.forEach(role => {
    if (roleGroups[role] && (roleGroups[role].names.length > 0 || roleGroups[role].subCount > 0)) {
      formatRoleMembers(role, roleGroups[role]);
    }
  });
  // roleOrderにない役割があれば追加
  Object.keys(roleGroups).forEach(role => {
    if (!roleOrder.includes(role)) {
      formatRoleMembers(role, roleGroups[role]);
    }
  });
  // 複数行の場合は改行＋全角スペース字下げ
  const memberPadding = '\n　　　　　　';
  const memberStr = memberLines.join(memberPadding);

  // ヘッダー用メンバー名リスト（シンプル）
  const headerMemberNames = activeAssignments.map(a => a.staff_nickname || a.staff_name || '名前未設定').join('、');

  // 単価区分（配置の invoice_unit から判定、混在する場合は「混在」）
  // Note: pay_unit = invoice_unit で同期されているため、どちらを使っても同じ
  const unitTypes = [...new Set(activeAssignments.map(a => a.invoice_unit || a.pay_unit))];
  const unitLabels = {
    'basic': '基本', 'BASIC': '基本',
    'half': 'ハーフ', 'HALF': 'ハーフ',
    'halfday': 'ハーフ', 'HALFDAY': 'ハーフ',
    'fullday': '終日', 'FULLDAY': '終日',
    'night': '夜間', 'NIGHT': '夜間',
    'tobi': '鳶', 'TOBI': '鳶',
    'tobiage': '鳶揚げ', 'TOBIAGE': '鳶揚げ'
  };
  const payUnitLabel = unitTypes.length === 1
    ? (unitLabels[unitTypes[0]] || '-')
    : unitTypes.length > 1 ? '混在' : '-';

  // 作業内容（種別＋小項目）
  const workDetailLabel = getWorkDetailLabel(job.work_detail, job.work_detail_other_text);
  // 作業内容：役割グループがある場合は「上棟鳶補助、上棟荷揚げ作業」形式
  let workContent;
  if (workCategoryPrefix && memberLines.length > 0) {
    // memberLinesから役割名を抽出して「〇〇作業」形式に
    const roleNames = memberLines.map(line => {
      const match = line.match(/^(.+?)（/);
      return match ? match[1] : null;
    }).filter(Boolean);
    workContent = roleNames.length > 0
      ? roleNames.join('、') + '作業'
      : (workCategoryPrefix + (workDetailLabel || '') + '作業');
  } else {
    workContent = job.work_category
      ? (workDetailLabel ? `${workCategoryLabels[job.work_category] || job.work_category}${workDetailLabel}` : (workCategoryLabels[job.work_category] || job.work_category))
      : workDetailLabel;
  }

  // 最寄駅（配置の transport_station から取得）
  const nearestStation = activeAssignments.map(a => a.transport_station).find(s => s) || '';

  // 顧客名付き現場名
  const siteWithCustomer = job.customer_name
    ? `${job.site_name || ''}（${job.customer_name}）`
    : job.site_name || '';

  // テンプレート生成
  return `【工事発注書】${dateStr}${headerMemberNames ? ' ' + headerMemberNames : ''}${job.customer_name ? '（' + job.customer_name + '）' : ''}

お世話になっております。
内容確認次第、ご返信お願いします。

--------------------------------

◉作業年月日：${dateStr}
◉開始時間：${(job.start_time || '-').replace(/^0/, '')}
◉最寄駅：${nearestStation}
◉現場住所：${job.site_address || ''}
◉現場名：${siteWithCustomer}
◉担当者：${job.supervisor_name ? job.supervisor_name + 'さま' : ''}
◉リーダー：${leaderWithPhone}
◉人数：${activeAssignments.length}名
◉メンバー：${memberStr || '-'}
◉作業内容：${workContent}
◉単価：${payUnitLabel}
◉装備品：
◉詳細
${job.notes ? '・' + job.notes : '・'}
◉連絡事項
・

--------------------------------

上記以外の詳細情報等がある場合は、別途お送り致します。
よろしくお願い致します。
`;
}

function formatLineTemplateDate(dateStr) {
  if (!dateStr) return '';
  const date = new Date(dateStr + 'T00:00:00');
  const year = date.getFullYear();
  const month = date.getMonth() + 1;
  const day = date.getDate();
  const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
  const weekday = weekdays[date.getDay()];
  return `${year}年${month}月${day}日（${weekday}）`;
}

// ========== Utility Functions ==========
function formatAssignmentModalDate(dateStr) {
  if (!dateStr) return '-';
  const date = new Date(dateStr + 'T00:00:00');
  const m = date.getMonth() + 1;
  const d = date.getDate();
  const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
  const w = weekdays[date.getDay()];
  return `${m}月${d}日(${w})`;
}

function formatPayUnitLabel(unit) {
  const units = { 'FULLDAY': '終日', 'HALFDAY': 'ハーフ', 'HOURLY': '時給' };
  return units[unit] || unit || '-';
}

function formatTimeSlotLabel(slot) {
  const slots = {
    'jotou': '上棟',
    'shuujitsu': '終日',
    'am': 'AM',
    'pm': 'PM',
    'yakin': '夜勤',
    'mitei': '未定'
  };
  return slots[slot] || slot || '-';
}

/**
 * 開始時間の表示を更新
 * @param {string} startTime - 開始時間（例: "08:00", "07:30"）
 */
function updateStartTimeDisplay(startTime) {
  const el = document.getElementById('modal-job-start-time');
  if (!el) return;

  if (startTime) {
    // 先頭の0を削除（08:00 → 8:00）
    const formatted = startTime.replace(/^0/, '');
    el.textContent = formatted + '〜';
    el.style.display = 'inline';
  } else {
    el.textContent = '';
    el.style.display = 'none';
  }
}

const WORK_CATEGORY_TAG_MAP = {
  'jotou': { cls: 'tag-jotou', label: '上棟' },
  'keisagyo': { cls: 'tag-keisagyo', label: '軽作業' },
  'niage': { cls: 'tag-niage', label: '荷揚げ' },
};

function updateWorkCategoryTag(category) {
  const el = document.getElementById('modal-job-type-tag');
  if (!el) return;
  const info = WORK_CATEGORY_TAG_MAP[category];
  if (info) {
    el.textContent = info.label;
    el.className = 'work-category-tag ' + info.cls;
    el.style.display = 'inline';
  } else {
    el.style.display = 'none';
  }
}

function updateSiteAddress(address) {
  const el = document.getElementById('modal-site-address');
  if (el) el.textContent = address || '';
}

/**
 * 作業内容を更新
 * @param {string} workDetail - work_detail値
 */
function updateWorkContent(workDetail, otherText) {
  const el = document.getElementById('modal-work-content');
  if (!el) return;
  const label = getWorkDetailLabel(workDetail, otherText);
  el.textContent = label || '';
}

// ========== Event Listeners Setup ==========
function setupAssignmentModalEventListeners() {
  // Close modal on overlay click
  document.getElementById('assignment-modal').addEventListener('click', (e) => {
    if (e.target.id === 'assignment-modal') {
      closeAssignmentModal();
    }
  });

  // Close LINE template modal on overlay click
  document.getElementById('line-template-modal').addEventListener('click', (e) => {
    if (e.target.id === 'line-template-modal') {
      closeLineTemplateModal();
    }
  });

  // Auto-save LINE template on input (debounced)
  const templateTextarea = document.getElementById('line-template-textarea');
  if (templateTextarea) {
    templateTextarea.addEventListener('input', debouncedSaveTemplate);
  }

  const staffSearchInput = document.getElementById('staff-search');
  if (staffSearchInput) {
    staffSearchInput.addEventListener('input', onStaffSearchInput);
  }

  const staffListContainer = document.getElementById('staff-list');
  if (staffListContainer) {
    staffListContainer.addEventListener('scroll', onStaffListScroll, { passive: true });
  }

  // Close modals on Escape key
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (document.getElementById('line-template-modal').style.display !== 'none') {
        closeLineTemplateModal();
      } else if (document.getElementById('assignment-modal').style.display !== 'none') {
        closeAssignmentModal();
      }
    }
  });
}

// Auto-setup when DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', setupAssignmentModalEventListeners);
} else {
  setupAssignmentModalEventListeners();
}
</script>
