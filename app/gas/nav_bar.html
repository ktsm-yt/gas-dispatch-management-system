<!-- Shared Navigation Bar -->
<header class="header">
  <div class="header-title">配置管理システム <span class="breadcrumb-separator">&gt;</span> <span id="page-title" class="page-name"></span></div>
  <nav class="header-nav">
    <a href="#" id="nav-dashboard">ダッシュボード</a>
    <a href="#" id="nav-jobs">案件一覧</a>
    <!-- 配置管理はダッシュボードのリスト表示で代替。要望があれば復活 -->
    <!-- <a href="#" id="nav-assignments">配置管理</a> -->
    <a href="#" id="nav-invoices">請求</a>
    <a href="#" id="nav-payouts">支払</a>
    <a href="#" id="nav-sales-analytics">売上分析</a>
    <div class="nav-dropdown">
      <a href="#" id="nav-settings">設定</a>
      <div class="nav-dropdown-menu" id="settings-menu">
        <a href="#" id="nav-customers">顧客</a>
        <a href="#" id="nav-staff">スタッフ</a>
        <a href="#" id="nav-subcontractors">外注先</a>
        <a href="#" id="nav-transport">交通費</a>
        <a href="#" id="nav-company">自社情報</a>
      </div>
    </div>
  </nav>
</header>

<script>
function initNavBar(currentPage, pageTitle) {
  // Set page title
  document.getElementById('page-title').textContent = pageTitle;

  // Set active nav item
  const navMap = {
    'dashboard': 'nav-dashboard',
    'jobs': 'nav-jobs',
    'assignments': 'nav-assignments',
    'invoices': 'nav-invoices',
    'payouts': 'nav-payouts',
    'sales_analytics': 'nav-sales-analytics',
    'customers': 'nav-settings',
    'staff': 'nav-settings',
    'subcontractors': 'nav-settings',
    'transportFees': 'nav-settings',
    'company': 'nav-settings'
  };

  const activeNavId = navMap[currentPage];
  if (activeNavId) {
    document.getElementById(activeNavId).classList.add('active');
  }

  // Navigation click handlers
  document.getElementById('nav-dashboard').addEventListener('click', (e) => {
    e.preventDefault();
    navigateTo('dashboard');
  });
  document.getElementById('nav-jobs').addEventListener('click', (e) => {
    e.preventDefault();
    navigateTo('jobs');
  });
  // 配置管理はダッシュボードのリスト表示で代替
  // document.getElementById('nav-assignments').addEventListener('click', (e) => {
  //   e.preventDefault();
  //   navigateTo('assignments');
  // });
  document.getElementById('nav-invoices').addEventListener('click', (e) => {
    e.preventDefault();
    navigateTo('invoices');
  });
  document.getElementById('nav-payouts').addEventListener('click', (e) => {
    e.preventDefault();
    navigateTo('payouts');
  });
  document.getElementById('nav-sales-analytics').addEventListener('click', (e) => {
    e.preventDefault();
    navigateTo('sales_analytics');
  });

  // Settings dropdown
  const dropdown = document.querySelector('.nav-dropdown');
  document.getElementById('nav-settings').addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    dropdown.classList.toggle('open');
  });
  document.addEventListener('click', () => dropdown.classList.remove('open'));

  document.getElementById('nav-customers').addEventListener('click', (e) => {
    e.preventDefault();
    navigateTo('customers');
  });
  document.getElementById('nav-staff').addEventListener('click', (e) => {
    e.preventDefault();
    navigateTo('staff');
  });
  document.getElementById('nav-subcontractors').addEventListener('click', (e) => {
    e.preventDefault();
    navigateTo('subcontractors');
  });
  document.getElementById('nav-transport').addEventListener('click', (e) => {
    e.preventDefault();
    navigateTo('transportFees');
  });
  document.getElementById('nav-company').addEventListener('click', (e) => {
    e.preventDefault();
    navigateTo('company');
  });

  // 右クリック→新しいタブ対応: 各リンクにhref属性を設定
  const cachedUrl = sessionStorage.getItem('__SCRIPT_URL__');
  if (cachedUrl) {
    setNavHrefs(cachedUrl);
  } else {
    google.script.run
      .withSuccessHandler(function(url) {
        sessionStorage.setItem('__SCRIPT_URL__', url);
        setNavHrefs(url);
      })
      .getScriptUrl();
  }
}

// 各ナビリンクにhref属性を設定（右クリック・Cmd+クリック対応）
function setNavHrefs(baseUrl) {
  const links = {
    'nav-dashboard': 'dashboard',
    'nav-jobs': 'jobs',
    // 'nav-assignments': 'assignments', // コメントアウト中
    'nav-invoices': 'invoices',
    'nav-payouts': 'payouts',
    'nav-sales-analytics': 'sales_analytics',
    'nav-customers': 'customers',
    'nav-staff': 'staff',
    'nav-subcontractors': 'subcontractors',
    'nav-transport': 'transportFees',
    'nav-company': 'company'
  };

  for (const [id, page] of Object.entries(links)) {
    const el = document.getElementById(id);
    if (el) el.href = baseUrl + '?page=' + page;
  }
}

function navigateTo(page) {
  // sessionStorageにキャッシュされたURLがあれば即時遷移（RPC不要）
  const cachedUrl = sessionStorage.getItem('__SCRIPT_URL__');
  if (cachedUrl) {
    window.open(cachedUrl + '?page=' + page, '_top');
    return;
  }

  // 初回のみRPCでURLを取得してキャッシュ
  google.script.run
    .withSuccessHandler(function(url) {
      sessionStorage.setItem('__SCRIPT_URL__', url);
      window.open(url + '?page=' + page, '_top');
    })
    .getScriptUrl();
}
</script>
