    /* Toolbar */
    .toolbar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      padding: var(--spacing-md) var(--spacing-lg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--spacing-md);
      flex-wrap: wrap;
    }

    .filter-group {
      display: flex;
      gap: var(--spacing-sm);
      align-items: center;
    }

    .filter-group label {
      font-size: 13px;
      color: var(--text-muted);
    }

    .filter-group select,
    .filter-group input {
      padding: var(--spacing-xs) var(--spacing-sm);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      font-size: 13px;
      background: white;
    }

    .toolbar-actions {
      display: flex;
      gap: var(--spacing-sm);
    }

    /* Collapsible Section */
    .collapsible-header {
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }
    .collapsible-header:hover {
      opacity: 0.8;
    }
    .collapse-icon {
      display: inline-block;
      transition: transform 0.2s ease;
      font-size: 12px;
    }
    .collapse-icon.collapsed {
      transform: rotate(-90deg);
    }
    .collapsible-content.collapsed {
      display: none;
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-xs);
      padding: var(--spacing-sm) var(--spacing-md);
      border: none;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-primary { background: var(--color-primary); color: white; }
    .btn-primary:hover { background: var(--color-accent); }
    .btn-secondary { background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border-color); }
    .btn-secondary:hover { background: var(--bg-hover); }
    .btn-success { background: var(--color-success); color: white; }
    .btn-danger { background: var(--color-danger); color: white; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Main Content */
    .main-content { padding: var(--spacing-lg); }

    /* Summary Card */
    .summary-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: var(--spacing-lg);
      margin-bottom: var(--spacing-lg);
    }

    .summary-card h3 {
      font-size: 16px;
      margin-bottom: var(--spacing-md);
      color: var(--color-primary);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: var(--spacing-md);
    }

    .summary-item {
      text-align: center;
      padding: var(--spacing-md);
      background: white;
      border-radius: var(--radius-sm);
    }

    .summary-item .label {
      font-size: 12px;
      color: var(--text-muted);
    }

    .summary-item .value {
      font-size: 24px;
      font-weight: bold;
      color: var(--text-primary);
    }

    .summary-item .value.amount {
      color: var(--color-success);
    }

    /* Table */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-card);

    }

    .data-table td.amount {

  <script>
    // State
    let staffList = [];
    let currentUnpaid = null;
    let currentTab = 'staff';

    // Subcontractor State
    let subcontractorList = [];
    let currentSubUnpaid = null;

    // SessionStorage for unpaid data persistence
    const SS_KEY = 'payouts_unpaid_data';
    const SS_HISTORY_KEY = 'payouts_history_data';
    const SS_STAFF_KEY = 'payouts_staff_data';
    const SS_SUB_KEY = 'payouts_subcontractor_data';
    const SS_SUB_UNPAID_KEY = 'payouts_sub_unpaid_data';
    const SS_SUB_HISTORY_KEY = 'payouts_sub_history_data';
    const CACHE_TTL = 2 * 60 * 60 * 1000; // 2時間（未払データ、他ページと統一）
    const HISTORY_CACHE_TTL = 2 * 60 * 60 * 1000; // 2時間（履歴）

    function saveToSession(data) {
      sessionStorage.setItem(SS_KEY, JSON.stringify({
        timestamp: Date.now(),
        ...data
      }));
    }

    function loadFromSession(endDate = null) {
      const saved = sessionStorage.getItem(SS_KEY);
      if (!saved) return null;
      const data = JSON.parse(saved);
      // TTL check
      if (Date.now() - data.timestamp > CACHE_TTL) {
        sessionStorage.removeItem(SS_KEY);
        return null;
      }
      // endDate check (キャッシュと異なる日付なら無効)
      if (endDate && data.endDate !== endDate) {
        return null;
      }
      return data;
    }

    function clearSession() {
      sessionStorage.removeItem(SS_KEY);
    }

    /**
     * キャッシュから日付フィルターを復元（init時に呼び出し）
     * @returns {boolean} 復元できたかどうか
     */
    function tryRestoreFromCache() {
      const saved = sessionStorage.getItem(SS_KEY);
      if (!saved) return false;
      try {
        const data = JSON.parse(saved);
        // TTL check
        if (Date.now() - data.timestamp > CACHE_TTL) {
          sessionStorage.removeItem(SS_KEY);
          return false;
        }
        // 日付フィルターを復元
        if (data.endDate) {
          document.getElementById('endDateFilter').value = data.endDate;
        }
        if (data.staffId) {
          // スタッフフィルターは後でpopulateStaffFilterで設定される
        }
        return true;
      } catch (e) {
        return false;
      }
    }

    /**
     * 外注キャッシュから日付フィルターを復元（init時に呼び出し）
     * @returns {boolean} 復元できたかどうか
     */
    function tryRestoreSubFromCache() {
      const saved = sessionStorage.getItem(SS_SUB_UNPAID_KEY);
      if (!saved) return false;
      try {
        const cache = JSON.parse(saved);
        // TTL check
        if (Date.now() - cache.timestamp > CACHE_TTL) {
          sessionStorage.removeItem(SS_SUB_UNPAID_KEY);
          return false;
        }
        // 日付フィルターを復元
        if (cache.endDate) {
          document.getElementById('subEndDateFilter').value = cache.endDate;
        }
        return true;
      } catch (e) {
        return false;
      }
    }

    // 外注費未払キャッシュ
    function saveSubUnpaidToSession(data, endDate) {
      sessionStorage.setItem(SS_SUB_UNPAID_KEY, JSON.stringify({
        timestamp: Date.now(),
        endDate: endDate,
        data: data
      }));
    }

    function loadSubUnpaidFromSession(endDate) {
      const saved = sessionStorage.getItem(SS_SUB_UNPAID_KEY);
      if (!saved) return null;
      const cache = JSON.parse(saved);
      // TTL check
      if (Date.now() - cache.timestamp > CACHE_TTL) {
        sessionStorage.removeItem(SS_SUB_UNPAID_KEY);
        return null;
      }
      // endDate check
      if (cache.endDate !== endDate) {
        return null;
      }
      return cache.data;
    }

    function getCachedSubcontractorPreview(subcontractorId, endDate) {
      const cache = loadSubUnpaidFromSession(endDate);
      if (!cache || !cache.subcontractorList) return null;
      return cache.subcontractorList.find(s => s.subcontractorId === subcontractorId) || null;
    }

    function clearSubUnpaidSession() {
      sessionStorage.removeItem(SS_SUB_UNPAID_KEY);
    }

    // History cache functions
    function saveHistoryToSession(payouts) {
      sessionStorage.setItem(SS_HISTORY_KEY, JSON.stringify({
        timestamp: Date.now(),
        payouts: payouts
      }));
    }

    function loadHistoryFromSession() {
      const saved = sessionStorage.getItem(SS_HISTORY_KEY);
      if (!saved) return null;
      const data = JSON.parse(saved);
      // TTL check
      if (Date.now() - data.timestamp > HISTORY_CACHE_TTL) {
        sessionStorage.removeItem(SS_HISTORY_KEY);
        return null;
      }
      return data.payouts;
    }

    function updateHistoryCache(updater) {
      const saved = sessionStorage.getItem(SS_HISTORY_KEY);
      if (!saved) return;
      const data = JSON.parse(saved);
      data.payouts = updater(data.payouts);
      data.timestamp = Date.now(); // refresh TTL
      sessionStorage.setItem(SS_HISTORY_KEY, JSON.stringify(data));
    }

    function getCachedUnpaidPreview(staffId, endDate) {
      const cached = loadFromSession(endDate);
      if (!cached || !staffId) return null;

      if (cached.mode === 'single' && cached.staffId === staffId && cached.data) {
        return { data: cached.data, isComplete: true };
      }

      if (cached.mode === 'list' && cached.data && Array.isArray(cached.data.staffList)) {
        const row = cached.data.staffList.find(s => s.staffId === staffId);
        if (!row) return null;
        return {
          data: {
            staffName: row.staffName,
            assignmentCount: row.unpaidCount,
            baseAmount: row.baseAmount,
            transportAmount: row.transportAmount,
            taxAmount: row.taxAmount,
            totalAmount: row.estimatedAmount,
            periodStart: row.periodStart,
            periodEnd: row.periodEnd
          },
          isComplete: false
        };
      }

      return null;
    }

    function getCachedHistoryForStaff(staffId) {
      const cached = loadHistoryFromSession();
      if (!cached || !staffId) return null;
      return cached.filter(p => p.staff_id === staffId).slice(0, 10);
    }

    // Staff cache functions (no TTL - valid for session)
    function saveStaffToCache(data) {
      sessionStorage.setItem(SS_STAFF_KEY, JSON.stringify(data));
    }

    function loadStaffFromCache() {
      const saved = sessionStorage.getItem(SS_STAFF_KEY);
      return saved ? JSON.parse(saved) : null;
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', init);

    function init() {
      // Initialize navigation bar with breadcrumb
      initNavBar('payouts', '支払管理');

      // キャッシュから復元を試みる（日付フィルターも含む）
      const hasRestoredStaff = tryRestoreFromCache();
      const hasRestoredSub = tryRestoreSubFromCache();

      // キャッシュがない場合のみデフォルト日付を設定
      if (!hasRestoredStaff) {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('endDateFilter').value = today;
      }
      if (!hasRestoredSub) {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('subEndDateFilter').value = today;
      }

      loadStaffList();
      loadHistory();
      loadPayoutFolderLink();

      // Load subcontractor list for second tab
      loadSubcontractorList();

      // スタッフリストがロードされた後にデータを復元（UIに反映）
      restoreFromSession();

      // Event delegation for subcontractor payout undo buttons
      document.addEventListener('click', function(e) {
        if (e.target.classList.contains('btn-undo-sub-payout')) {
          const payoutId = e.target.dataset.payoutId;
          const updatedAt = e.target.dataset.updatedAt;
          const targetName = e.target.dataset.targetName;
          undoSubcontractorPayoutConfirm(payoutId, updatedAt, targetName);
        }
      });
    }

    // ========== Tab Switching ==========
    function switchTab(tab) {
      currentTab = tab;

      // Update tab buttons
      document.getElementById('tabStaff').classList.toggle('active', tab === 'staff');
      document.getElementById('tabSubcontractor').classList.toggle('active', tab === 'subcontractor');

      // Update tab content
      document.getElementById('tabContentStaff').classList.toggle('active', tab === 'staff');
      document.getElementById('tabContentSubcontractor').classList.toggle('active', tab === 'subcontractor');

      // Load data for subcontractor tab if switching to it
      if (tab === 'subcontractor' && subcontractorList.length === 0) {
        loadSubcontractorList();
      }
    }

    // エクスポートフォルダリンクを読み込み
    function loadPayoutFolderLink() {
      google.script.run
        .withSuccessHandler(function(response) {
          const link = document.getElementById('payout-folder-link');
          if (response.ok && response.data.configured && response.data.url) {
            link.href = response.data.url;
            link.dataset.configured = 'true';
          } else {
            link.dataset.configured = 'false';
          }
        })
        .getPayoutExportFolderUrl();
    }

    function handleFolderLinkClick(link) {
      if (link.dataset.configured === 'true' && link.href && link.href !== '#') {
        return true; // 通常のリンク動作
      }
      if (link.dataset.configured === 'false') {
        showToast('エクスポート先フォルダが設定されていません。設定画面で設定してください。', 'warning');
      }
      return false; // リンク遷移を阻止
    }

    function restoreFromSession() {
      const saved = loadFromSession();
      if (!saved) return;

      // Restore filter values
      if (saved.staffId) {
        document.getElementById('staffFilter').value = saved.staffId;
      }
      if (saved.endDate) {
        document.getElementById('endDateFilter').value = saved.endDate;
      }

      // Restore and render data
      if (saved.mode === 'single' && saved.data) {
        currentUnpaid = saved.data;
        renderUnpaidSummary(saved.data);
      } else if (saved.mode === 'list' && saved.data) {
        // Restore with confirmed data if available
        const confirmedData = saved.confirmedData || [];
        renderUnpaidStaffList(saved.data, confirmedData);
      }
    }

    // Load staff list for filter
    function loadStaffList() {
      // Check cache first
      const cached = loadStaffFromCache();
      if (cached) {
        staffList = cached;
        populateStaffFilter();
        return;
      }

      // Fetch from API
      google.script.run
        .withSuccessHandler(result => {
          if (result.ok) {
            staffList = result.data.staff;
            saveStaffToCache(staffList);
            populateStaffFilter();
          }
        })
        .withFailureHandler(err => showToast('error', err.message))
        .getStaffForPayouts();
    }

    function populateStaffFilter() {
      const select = document.getElementById('staffFilter');
      // Clear existing options (except first "全て" option)
      select.innerHTML = '<option value="">全て</option>';
      staffList.forEach(s => {
        const option = document.createElement('option');
        option.value = s.staff_id;
        option.textContent = s.name;
        select.appendChild(option);
      });
    }

    // Load unpaid summary
    function loadUnpaidList(forceRefresh = false) {
      const staffId = document.getElementById('staffFilter').value;
      const endDate = document.getElementById('endDateFilter').value;

      if (!endDate) {
        showToast('error', '対象日を選択してください');
        return;
      }

      // キャッシュチェック（全スタッフ一覧の場合のみ）
      if (!forceRefresh && !staffId) {
        const cached = loadFromSession(endDate);
        if (cached && cached.mode === 'list' && cached.data) {
          const confirmedData = cached.confirmedData || [];
          renderUnpaidStaffList(cached.data, confirmedData);
          return;
        }
      }

      const summaryDiv = document.getElementById('unpaidSummary');
      summaryDiv.innerHTML = '<div class="loading">計算中...</div>';

      if (staffId) {
        // 特定スタッフの未払
        showLoading('未払計算中...');
        google.script.run
          .withSuccessHandler(result => {
            hideLoading();
            if (result.ok) {
              renderUnpaidSummary(result.data);
              // Save to SessionStorage
              saveToSession({
                mode: 'single',
                staffId: staffId,
                endDate: endDate,
                data: result.data
              });
            } else {
              summaryDiv.innerHTML = `<div class="empty-state">${result.error}</div>`;
              clearSession();
            }
          })
          .withFailureHandler(err => {
            hideLoading();
            summaryDiv.innerHTML = `<div class="empty-state">エラー: ${err.message}</div>`;
            clearSession();
          })
          .getUnpaidSummary(staffId, endDate, { include_assignments: false });
      } else {
        // 全スタッフの未払一覧 + 確認済み一覧を並列取得
        showLoading('データを読み込み中...');

        let unpaidResult = null;
        let confirmedResult = null;
        let completed = 0;

        function checkAndRender() {
          completed++;
          if (completed < 2) return;

          hideLoading();

          const unpaidData = unpaidResult?.ok ? unpaidResult.data : { staffList: [], totalCount: 0, totalAmount: 0 };
          const confirmedData = confirmedResult?.ok ? confirmedResult.data.payouts : [];

          renderUnpaidStaffList(unpaidData, confirmedData);

          // Save to SessionStorage
          saveToSession({
            mode: 'list',
            staffId: null,
            endDate: endDate,
            data: unpaidData,
            confirmedData: confirmedData
          });
        }

        // 未払一覧を取得
        google.script.run
          .withSuccessHandler(result => { unpaidResult = result; checkAndRender(); })
          .withFailureHandler(err => { unpaidResult = { ok: false, error: err.message }; checkAndRender(); })
          .getUnpaidStaffList(endDate);

        // 確認済み一覧を取得
        google.script.run
          .withSuccessHandler(result => { confirmedResult = result; checkAndRender(); })
          .withFailureHandler(err => { confirmedResult = { ok: false, data: { payouts: [] } }; checkAndRender(); })
          .getConfirmedPayouts({});
      }
    }

    // Render unpaid summary for single staff
    function renderUnpaidSummary(data) {
      currentUnpaid = data;
      const summaryDiv = document.getElementById('unpaidSummary');
      const today = new Date().toISOString().split('T')[0];

      if (data.assignmentCount === 0) {
        summaryDiv.innerHTML = '<div class="empty-state">未払の配置はありません</div>';
        return;
      }

      summaryDiv.innerHTML = `
        <div class="summary-grid">
          <div class="summary-item">
            <div class="label">スタッフ</div>
            <div class="value">${data.staffName || '-'}</div>
          </div>
          <div class="summary-item">
            <div class="label">配置数</div>
            <div class="value">${data.assignmentCount}件</div>
          </div>
          <div class="summary-item">
            <div class="label">基本給与</div>
            <div class="value amount">${formatCurrency(data.baseAmount)}</div>
          </div>
          <div class="summary-item">
            <div class="label">交通費</div>
            <div class="value amount">${formatCurrency(data.transportAmount)}</div>
          </div>
          <div class="summary-item">
            <div class="label">合計</div>
            <div class="value amount" id="singleTotalAmount">${formatCurrency(data.totalAmount)}</div>
          </div>
          <div class="summary-item">
            <div class="label">期間</div>
            <div class="value" style="font-size:14px">${data.periodStart || '-'} ~ ${data.periodEnd}</div>
          </div>
        </div>
        <div style="margin-top: var(--spacing-md); display: flex; gap: var(--spacing-md); align-items: center; flex-wrap: wrap;">
          <div class="filter-group">
            <label>支払日:</label>
            <input type="date" id="singlePaidDate" value="${today}" />
          </div>
          <div class="filter-group">
            <label>調整額:</label>
            <input type="number" id="singleAdjustment" value="0" style="width: 100px;" onchange="updateSingleTotal()" />
          </div>
          <div class="filter-group" style="flex: 1;">
            <label>備考:</label>
            <input type="text" id="singleNotes" placeholder="任意" style="width: 200px;" />
          </div>
          <button class="btn btn-primary" onclick="markAsPaidSingle()">支払済にする</button>
        </div>
      `;
    }

    // Update single staff total when adjustment changes
    function updateSingleTotal() {
      if (!currentUnpaid) return;
      const adjustment = Number(document.getElementById('singleAdjustment').value) || 0;
      const total = currentUnpaid.totalAmount + adjustment;
      document.getElementById('singleTotalAmount').textContent = formatCurrency(total);
    }

    // Render combined staff list (unpaid + confirmed)
    function renderUnpaidStaffList(data, confirmedData = []) {
      const summaryDiv = document.getElementById('unpaidSummary');
      const today = new Date().toISOString().split('T')[0];

      // Merge unpaid and confirmed data
      const unpaidRows = (data.staffList || []).map(s => ({
        ...s,
        status: 'unpaid',
        rowId: `unpaid-${s.staffId}`
      }));

      const confirmedRows = confirmedData.map(p => ({
        staffId: p.staff_id,
        staffName: p.target_name,
        unpaidCount: p.assignment_count,
        periodStart: p.period_start,
        periodEnd: p.period_end,
        estimatedAmount: p.total_amount,
        baseAmount: p.base_amount,
        transportAmount: p.transport_amount,
        adjustmentAmount: p.adjustment_amount || 0,
        notes: p.notes || '',
        payoutId: p.payout_id,
        updatedAt: p.updated_at,
        status: 'confirmed',
        rowId: `confirmed-${p.payout_id}`
      }));

      const allRows = [...unpaidRows, ...confirmedRows];

      // Sort: confirmed first, then unpaid
      allRows.sort((a, b) => {
        if (a.status === b.status) return a.staffName.localeCompare(b.staffName);
        return a.status === 'confirmed' ? -1 : 1;
      });

      if (allRows.length === 0) {
        summaryDiv.innerHTML = '<div class="empty-state">対象のスタッフはいません</div>';
        return;
      }

      const unpaidCount = unpaidRows.length;
      const confirmedCount = confirmedRows.length;
      const unpaidTotal = data.totalAmount || 0;
      const confirmedTotal = confirmedData.reduce((sum, p) => sum + (p.total_amount || 0), 0);

      let html = `
        <div class="summary-grid" style="margin-bottom: var(--spacing-md);">
          <div class="summary-item">
            <div class="label">未払</div>
            <div class="value">${unpaidCount}名</div>
          </div>
          <div class="summary-item">
            <div class="label">確認済み</div>
            <div class="value" style="color: var(--color-secondary);">${confirmedCount}名</div>
          </div>
          <div class="summary-item">
            <div class="label">合計金額</div>
            <div class="value amount">${formatCurrency(unpaidTotal + confirmedTotal)}</div>
          </div>
        </div>
        <div style="margin-bottom: var(--spacing-md); display: flex; gap: var(--spacing-md); align-items: center;">
          <div class="filter-group">
            <label>支払日:</label>
            <input type="date" id="bulkPaidDate" value="${today}" />
          </div>
        </div>
        <table class="data-table" id="payoutTable">
          <thead>
            <tr>
              <th><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)"></th>
              <th>スタッフ</th>
              <th>配置数</th>
              <th>期間</th>
              <th>基本金額</th>
              <th>調整額</th>
              <th>備考</th>
              <th class="sortable" onclick="toggleStatusSort()" style="cursor: pointer;">ステータス ⇅</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
      `;

      allRows.forEach(row => {
        if (row.status === 'unpaid') {
          html += renderUnpaidRow(row);
        } else {
          html += renderConfirmedRow(row);
        }
      });

      html += `
          </tbody>
        </table>
      `;

      summaryDiv.innerHTML = html;
      currentSortOrder = 'unpaid-first';
      updateFab();
    }

    // Render a single unpaid row
    function renderUnpaidRow(s) {
      return `
        <tr data-staff-id="${s.staffId}" data-status="unpaid" data-row-id="${s.rowId}" class="clickable-row" onclick="toggleRowCheck(this, event)">
          <td><input type="checkbox" class="staff-check" data-status="unpaid" value="${s.staffId}"></td>
          <td>${s.staffName}</td>
          <td>${s.unpaidCount}件</td>
          <td style="font-size:12px">${s.periodStart || '-'} ~ ${s.periodEnd}</td>
          <td class="amount">${formatCurrency(s.estimatedAmount)}</td>
          <td style="white-space: nowrap;">
            <button type="button" class="btn-sign positive" data-staff-id="${s.staffId}" onclick="toggleSign('${s.staffId}')">+</button>
            <input type="number" class="adjustment-input" data-staff-id="${s.staffId}" value="0" min="0" />
          </td>
          <td><input type="text" class="notes-input" data-staff-id="${s.staffId}" placeholder="" /></td>
          <td><span class="status-badge draft">未払</span></td>
          <td>
            <button class="btn btn-secondary" onclick="openPayoutModal('${s.staffId}', '${s.staffName}')">詳細</button>
          </td>
        </tr>
      `;
    }

    // Render a single confirmed row
    function renderConfirmedRow(p) {
      const adjustmentDisplay = p.adjustmentAmount !== 0
        ? `<span style="color: ${p.adjustmentAmount > 0 ? 'var(--color-success)' : 'var(--color-danger)'}">${p.adjustmentAmount > 0 ? '+' : ''}${formatCurrency(p.adjustmentAmount).replace('¥', '')}</span>`
        : '-';
      return `
        <tr data-payout-id="${p.payoutId}" data-staff-id="${p.staffId}" data-status="confirmed" data-row-id="${p.rowId}" data-updated-at="${p.updatedAt}" class="clickable-row" onclick="toggleRowCheck(this, event)">
          <td><input type="checkbox" class="payout-check" data-status="confirmed" value="${p.payoutId}"></td>
          <td>${p.staffName}</td>
          <td>${p.unpaidCount}件</td>
          <td style="font-size:12px">${p.periodStart || '-'} ~ ${p.periodEnd}</td>
          <td class="amount">${formatCurrency(p.estimatedAmount)}</td>
          <td class="amount">${adjustmentDisplay}</td>
          <td style="max-width: 150px; white-space: normal;">${p.notes}</td>
          <td><span class="status-badge confirmed">確認済み</span></td>
          <td style="white-space: nowrap;">
            <button class="btn btn-secondary" onclick="openPayoutModal('${p.staffId}', '${p.staffName}')">詳細</button>
            <button class="btn btn-primary" onclick="payConfirmed('${p.payoutId}', '${p.updatedAt}', '${p.staffName}')">支払</button>
            <button class="btn btn-secondary" onclick="undoConfirm('${p.payoutId}', '${p.updatedAt}', '${p.staffName}')">取消</button>
          </td>
        </tr>
      `;
    }

    // Sort state
    let currentSortOrder = 'confirmed-first';

    // Toggle sort order
    function toggleStatusSort() {
      const tbody = document.querySelector('#payoutTable tbody');
      if (!tbody) return;

      const rows = Array.from(tbody.querySelectorAll('tr'));

      if (currentSortOrder === 'unpaid-first') {
        // Sort confirmed first
        rows.sort((a, b) => {
          const statusA = a.dataset.status;
          const statusB = b.dataset.status;
          if (statusA === statusB) return 0;
          return statusA === 'confirmed' ? -1 : 1;
        });
        currentSortOrder = 'confirmed-first';
      } else {
        // Sort unpaid first
        rows.sort((a, b) => {
          const statusA = a.dataset.status;
          const statusB = b.dataset.status;
          if (statusA === statusB) return 0;
          return statusA === 'unpaid' ? -1 : 1;
        });
        currentSortOrder = 'unpaid-first';
      }

      rows.forEach(row => tbody.appendChild(row));
    }

    // Load payment history (paid only) with cache
    function loadHistory(forceRefresh = false) {
      const staffId = document.getElementById('staffFilter').value;

      // Try cache first
      if (!forceRefresh) {
        const cached = loadHistoryFromSession();
        if (cached) {
          // Filter by staffId if specified
          const filtered = staffId
            ? cached.filter(p => p.staff_id === staffId)
            : cached;
          renderHistory(filtered);
          return;
        }
      }

      const query = { status: 'paid', payout_type: 'STAFF', limit: 50 };
      // Don't filter by staff on server - get all and cache (STAFF type only)
      document.getElementById('historyTable').innerHTML = '<div class="loading">読み込み中...</div>';

      google.script.run
        .withSuccessHandler(result => {
          if (result.ok) {
            // Cache all payouts
            saveHistoryToSession(result.data.payouts);
            // Filter for display
            const filtered = staffId
              ? result.data.payouts.filter(p => p.staff_id === staffId)
              : result.data.payouts;
            renderHistory(filtered);
          } else {
            document.getElementById('historyTable').innerHTML =
              `<div class="empty-state">${result.error}</div>`;
          }
        })
        .withFailureHandler(err => {
          document.getElementById('historyTable').innerHTML =
            `<div class="empty-state">エラー: ${err.message}</div>`;
        })
        .searchPayouts(query);
    }

    // Render history table with undo button
    function renderHistory(payouts) {
      const container = document.getElementById('historyTable');

      if (payouts.length === 0) {
        container.innerHTML = '<div class="empty-state">支払履歴がありません</div>';
        return;
      }

      let html = `
        <table class="data-table">
          <thead>
            <tr>
              <th style="white-space: nowrap;">スタッフ</th>
              <th style="white-space: nowrap;">期間</th>
              <th style="white-space: nowrap;">支払日</th>
              <th style="white-space: nowrap;">配置数</th>
              <th style="white-space: nowrap;">基本金額</th>
              <th style="white-space: nowrap;">調整額</th>
              <th style="white-space: nowrap;">合計金額</th>
              <th style="white-space: nowrap; width: 200px;">備考</th>
              <th style="white-space: nowrap;">操作</th>
            </tr>
          </thead>
          <tbody>
      `;

      payouts.forEach(p => {
        const baseAmount = (p.base_amount || 0) + (p.transport_amount || 0);
        const adjustmentAmount = p.adjustment_amount || 0;
        html += `
          <tr style="white-space: nowrap;" data-payout-id="${p.payout_id}">
            <td>${p.target_name}</td>
            <td style="font-size:12px">${p.period_start || '-'} ~ ${p.period_end || '-'}</td>
            <td>${p.paid_date || '-'}</td>
            <td>${p.assignment_count}件</td>
            <td class="amount">${formatCurrency(baseAmount)}</td>
            <td class="amount" style="color: ${adjustmentAmount !== 0 ? (adjustmentAmount > 0 ? 'var(--color-success)' : 'var(--color-danger)') : 'inherit'}">${adjustmentAmount !== 0 ? formatCurrency(Math.abs(adjustmentAmount)).replace('¥', '') : '-'}</td>
            <td class="amount">${formatCurrency(p.total_amount)}</td>
            <td style="white-space: normal; max-width: 200px;">${p.notes || ''}</td>
            <td>
              <button class="btn btn-danger" onclick="undoPayoutConfirm('${p.payout_id}', '${p.updated_at}', '${p.target_name}')">取消</button>
            </td>
          </tr>
        `;
      });

      html += '</tbody></table>';
      container.innerHTML = html;

    // ========== Loading Functions ==========
    function showLoading(text = '処理中...') {
      document.getElementById('loadingText').textContent = text;
      document.getElementById('loadingOverlay').classList.add('active');
    }

    function hideLoading() {
      document.getElementById('loadingOverlay').classList.remove('active');
    }

    // ========== Modal Functions ==========
    let pendingConfirmAction = null;

    function showConfirmModal(title, body, btnText, btnClass, action) {
      document.getElementById('confirmModalTitle').textContent = title;
      document.getElementById('confirmModalBody').innerHTML = body;
      const btn = document.getElementById('confirmModalBtn');
      btn.textContent = btnText;
      btn.className = 'btn ' + btnClass;
      pendingConfirmAction = action;
      document.getElementById('confirmModal').classList.add('active');
    }

    function closeConfirmModal() {
      document.getElementById('confirmModal').classList.remove('active');
      pendingConfirmAction = null;
    }

    function executeConfirmAction() {
      if (pendingConfirmAction) {
        pendingConfirmAction();
      }
      closeConfirmModal();
    }

    function handleModalOverlayClick(event) {
      if (event.target.id === 'confirmModal') {
        closeConfirmModal();
      }
    }

    // ESCキーでモーダルを閉じる
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeConfirmModal();
        closePayoutModal();

    // Bulk confirm (unpaid → confirmed)
    function bulkConfirm() {
      const checkboxes = document.querySelectorAll('.staff-check[data-status="unpaid"]:checked');
      const staffIds = Array.from(checkboxes).map(cb => cb.value);
      const endDate = document.getElementById('endDateFilter').value;

      if (staffIds.length === 0) {
        showToast('error', '未払スタッフを選択してください');
        return;
      }

      // Collect adjustments and notes for each staff
      const adjustments = {};
      staffIds.forEach(staffId => {
        const adjInput = document.querySelector(`.adjustment-input[data-staff-id="${staffId}"]`);
        const signBtn = document.querySelector(`.btn-sign[data-staff-id="${staffId}"]`);
        const notesInput = document.querySelector(`.notes-input[data-staff-id="${staffId}"]`);
        const amount = Number(adjInput?.value) || 0;
        const sign = signBtn?.textContent === '-' ? -1 : 1;
        adjustments[staffId] = {
          adjustment_amount: amount * sign,
          notes: notesInput?.value || ''
        };
      });

      // ★ 軽量モード: SessionStorageから事前計算済みデータを取得
      const cached = loadFromSession(endDate);
      let preCalculatedData = null;
      if (cached && cached.data && cached.data.staffList) {
        preCalculatedData = {};
        cached.data.staffList.forEach(staff => {
          if (staffIds.includes(staff.staffId)) {
            preCalculatedData[staff.staffId] = {
              assignmentIds: staff.assignmentIds || [],
              baseAmount: staff.baseAmount || 0,
              transportAmount: staff.transportAmount || 0,
              taxAmount: staff.taxAmount || 0,
              estimatedAmount: staff.estimatedAmount || 0,
              periodStart: staff.periodStart,
              periodEnd: staff.periodEnd
            };
          }
        });
        console.log('[bulkConfirm] Using light mode with preCalculatedData for', Object.keys(preCalculatedData).length, 'staff');
      }

      showConfirmModal(
        '一括確認',
        `<p><strong>${staffIds.length}名</strong> のスタッフを確認済みにします。</p>
         <p>よろしいですか？</p>`,
        '確認済みにする',
        'btn-primary',
        () => {
          showLoading(`${staffIds.length}名を確認中...`);
          google.script.run
            .withSuccessHandler(result => {
              hideLoading();
              if (result.ok) {
                showToast('success', `${result.data.success}件を確認済みにしました`);
                const data = result.data || {};
                const payouts = data.payouts || [];
                const results = data.results || [];

                // 成功したスタッフの行を確認済みに更新
                const successStaffIds = results
                  .filter(r => r.success)
                  .map(r => r.staffId);

                successStaffIds.forEach((staffId, idx) => {
                  const payout = payouts.find(p => p.staff_id === staffId);
                  if (payout) {
                    updateRowToConfirmed(staffId, payout);
                  }
                });

                clearSession();
                updateFab();
              } else {
                showToast('error', result.error);
              }
            })
            .withFailureHandler(err => {
              hideLoading();
              showToast('error', err.message);
            })
            .bulkConfirmPayouts(staffIds, endDate, {
              adjustments: adjustments,
              preCalculatedData: preCalculatedData  // ★ 軽量モード用データ
            });
        }
      );
    }

    // Bulk pay confirmed (confirmed → paid)
    function bulkPayConfirmed() {
      const checkboxes = document.querySelectorAll('.payout-check[data-status="confirmed"]:checked');
      const payoutIds = Array.from(checkboxes).map(cb => cb.value);

      if (payoutIds.length === 0) {
        showToast('error', '確認済みのスタッフを選択してください');
        return;
      }

      const paidDate = document.getElementById('bulkPaidDate').value;

      showConfirmModal(
        '一括振込完了',
        `<p><strong>${payoutIds.length}件</strong> を支払済にします。</p>
         <p>支払日: ${paidDate}</p>
         <p>よろしいですか？</p>`,
        '支払済にする',
        'btn-primary',
        () => {
          showLoading(`${payoutIds.length}件の振込処理中...`);
          google.script.run
            .withSuccessHandler(result => {
              hideLoading();
              if (result.ok) {
                showToast('success', `${result.data.success}件を支払済にしました`);
                const data = result.data || {};
                const payouts = data.payouts || [];
                const results = data.results || [];

                // 成功したpayoutの行を削除し、履歴に追加
                const successPayoutIds = results
                  .filter(r => r.success)
                  .map(r => r.payoutId);

                successPayoutIds.forEach(payoutId => {
                  removeConfirmedRow(payoutId);
                });

                payouts.reverse().forEach(payout => {
                  prependHistoryRow(payout);
                });

                clearSession();
                updateFab();
              } else {
                showToast('error', result.error);
              }
            })
            .withFailureHandler(err => {
              hideLoading();
              showToast('error', err.message);
            })
            .bulkPayConfirmed(payoutIds, { paid_date: paidDate });
        }
      );
    }

    function payConfirmed(payoutId, updatedAt, staffName) {

        '支払済にする',
        'btn-primary',
        () => {

            .withSuccessHandler(result => {

    // Undo confirm (confirmed → unpaid)
    function undoConfirm(payoutId, updatedAt, staffName) {
      showConfirmModal(
        '確認取消',
        `<p><strong>${staffName}</strong> の確認を取り消しますか？</p>
         <p>取り消すと未払状態に戻ります。</p>`,
        '取り消す',
        'btn-danger',
        () => {
          showLoading('取消処理中...');
          google.script.run
            .withSuccessHandler(result => {
              hideLoading();
              if (result.ok) {
                showToast('success', '確認を取り消しました');
                // 確認済み行を未払行に変換
                const undone = result.data?.undone;
                if (undone) {
                  convertConfirmedToUnpaid(payoutId, undone);
                } else {
                  // フォールバック: 行を削除のみ
                  removeConfirmedRow(payoutId);
                }
                clearSession();
                updateFab();
              } else {
                showToast('error', result.error);
              }
            })
            .withFailureHandler(err => {
              hideLoading();
              showToast('error', err.message);
            })
            .undoPayout(payoutId, updatedAt);
        }
      );
    }

    /**
     * 確認済み行を未払行に変換
     * @param {string} payoutId - 支払ID
     * @param {Object} undone - 取り消されたpayoutデータ
     */
    function convertConfirmedToUnpaid(payoutId, undone) {
      const row = document.querySelector(`tr[data-payout-id="${payoutId}"]`);
      if (!row) return;

      const unpaidRow = {
        staffId: undone.staff_id,
        staffName: undone.target_name,
        unpaidCount: undone.assignment_count,
        periodStart: undone.period_start,
        periodEnd: undone.period_end,
        estimatedAmount: (undone.base_amount || 0) + (undone.transport_amount || 0),
        status: 'unpaid',
        rowId: `unpaid-${undone.staff_id}`
      };

      const newRowHtml = renderUnpaidRow(unpaidRow);
      row.outerHTML = newRowHtml;
      updatePayoutSummary();
    }

    // Undo payout (cancel payment from history)
    function undoPayoutConfirm(payoutId, updatedAt, staffName) {
      showConfirmModal(
        '支払取消確認',
        `<p><strong>${staffName}</strong> の支払を取り消しますか？</p>
         <p>取り消すと未払状態に戻ります。</p>`,
        '取り消す',
        'btn-danger',
        () => {
          showLoading('取消処理中...');
          google.script.run
            .withSuccessHandler(result => {
              hideLoading();
              if (result.ok) {
                showToast('success', '支払を取り消しました');
                // 差分リロード: 履歴から行を削除
                removeHistoryRow(payoutId);
                // 未払リストは次回の集計時に自動反映されるため、再読込しない
              } else {
                showToast('error', result.error);
              }
            })
            .withFailureHandler(err => {
              hideLoading();
              showToast('error', err.message);
            })
            .undoPayout(payoutId, updatedAt);
        }
      );
    }

    // Helpers

    // 行クリックでチェックボックスをトグル
    function toggleRowCheck(row, event) {
      // ボタン・input要素クリック時は除外
      if (event.target.closest('button, input')) return;

      // 未払行と確認済み行の両方に対応
      const checkbox = row.querySelector('.staff-check, .payout-check');

    function toggleSelectAll(checkbox) {

      document.querySelectorAll('.staff-check, .payout-check').forEach(cb => {
        cb.checked = checkbox.checked;
      });
      updateBulkActionBar();
    }

    function toggleSelectAllFromBar() {
      const bulkSelectAll = document.getElementById('bulkSelectAll');
      const selectAll = document.getElementById('selectAll');
      // 未払と確認済み両方のチェックボックスを選択

    // ========== Payout Detail Modal ==========
    let modalUnpaidData = null;
    let modalHistoryData = [];

    function openPayoutModal(staffId, staffName) {
      const modal = document.getElementById('payoutDetailModal');
      modal.dataset.staffId = staffId;
      modal.dataset.assignmentsLoaded = 'false';
      modal.dataset.assignmentsLoading = 'false';
      document.getElementById('modalStaffName').textContent = staffName || '';
      modalUnpaidData = null;
      modalHistoryData = [];
      const endDate = document.getElementById('endDateFilter').value;

      const cachedSummary = getCachedUnpaidPreview(staffId, endDate);
      const cachedHistory = getCachedHistoryForStaff(staffId);
      const summaryComplete = cachedSummary && cachedSummary.isComplete;

      if (cachedSummary) {
        modalUnpaidData = cachedSummary.data;
        modalHistoryData = cachedHistory || [];
        renderPayoutModal(
          cachedSummary.data,
          cachedHistory ? cachedHistory : null,
          { preview: !summaryComplete }
        );
      } else {
        document.getElementById('payoutModalBody').innerHTML = '<div class="loading">読み込み中...</div>';
      }

      modal.classList.add('active');

      if (summaryComplete) {
        // サマリーが完備している場合は履歴のみ遅延取得
        if (!cachedHistory) {
          google.script.run
            .withSuccessHandler(result => {
              if (modal.dataset.staffId !== staffId) return;
              if (result.ok) {
                modalHistoryData = result.data.payouts || [];
                updateModalHistory(modalHistoryData);
              } else {
                updateModalHistory([]);
              }
            })
            .withFailureHandler(() => {
              if (modal.dataset.staffId !== staffId) return;
              updateModalHistory([]);
            })
            .searchPayouts({ staff_id: staffId, status: 'paid', limit: 10 });
        }
        return;
      }

      // 未払サマリーと支払履歴を並行取得
      let unpaidResult = null;
      let historyResult = null;
      let completed = 0;

      function checkAndRender() {
        completed++;
        if (completed === 2) {
          if (modal.dataset.staffId !== staffId) return;
          if (unpaidResult && unpaidResult.ok) {
            modalUnpaidData = unpaidResult.data;
            modalHistoryData = historyResult?.ok ? historyResult.data.payouts : [];
            renderPayoutModal(unpaidResult.data, modalHistoryData);
          } else {
            document.getElementById('payoutModalBody').innerHTML =
              `<div class="empty-state">${unpaidResult?.error || 'エラーが発生しました'}</div>`;
          }
        }
      }

      google.script.run
        .withSuccessHandler(result => { unpaidResult = result; checkAndRender(); })
        .withFailureHandler(err => { unpaidResult = { ok: false, error: err.message }; checkAndRender(); })
        .getUnpaidSummary(staffId, endDate, { include_assignments: false });

      google.script.run
        .withSuccessHandler(result => { historyResult = result; checkAndRender(); })
        .withFailureHandler(err => { historyResult = { ok: false, data: { payouts: [] } }; checkAndRender(); })
        .searchPayouts({ staff_id: staffId, status: 'paid', limit: 10 });
    }

    function buildHistoryListHtml(history) {
      if (history === null) {
        return '<li class="empty">読み込み中...</li>';
      }
      if (history.length > 0) {
        return history.map(p => `
          <li>
            <span class="history-date">${p.paid_date || '-'}</span>
            <span class="history-amount">${formatCurrency(p.total_amount)}</span>
          </li>
        `).join('');
      }
      return '<li class="empty">履歴なし</li>';
    }

    function updateModalHistory(history) {
      const list = document.getElementById('modalHistoryList');
      if (!list) return;
      list.innerHTML = buildHistoryListHtml(history);
    }

    function buildAssignmentTableHtml(assignments) {
      const rows = assignments.map(a => {
        const dateStr = a.work_date ? formatDateShort(a.work_date) : '-';
        const siteName = a.site_name || '(現場名なし)';
        return `<tr><td>${dateStr}</td><td>${siteName}</td></tr>`;
      }).join('');
      return `
        <table class="assignment-list-table">
          <thead><tr><th>日付</th><th>現場名</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function renderModalAssignments(assignments) {
      const wrapper = document.getElementById('modalAssignmentWrapper');
      if (!wrapper) return;
      if (!assignments || assignments.length === 0) {
        wrapper.innerHTML = '<div class="empty-state">出勤現場がありません</div>';
        return;
      }
      wrapper.innerHTML = buildAssignmentTableHtml(assignments);
    }

    function loadModalAssignments() {
      const modal = document.getElementById('payoutDetailModal');
      if (!modal) return;
      if (modal.dataset.assignmentsLoaded === 'true' || modal.dataset.assignmentsLoading === 'true') return;

      const staffId = modal.dataset.staffId;
      const endDate = document.getElementById('endDateFilter').value;
      const wrapper = document.getElementById('modalAssignmentWrapper');
      if (!staffId || !wrapper) return;

      modal.dataset.assignmentsLoading = 'true';
      wrapper.innerHTML = '<div class="loading">読み込み中...</div>';

      google.script.run
        .withSuccessHandler(result => {
          if (modal.dataset.staffId !== staffId) return;
          modal.dataset.assignmentsLoading = 'false';
          if (result.ok) {
            modal.dataset.assignmentsLoaded = 'true';
            renderModalAssignments(result.data.assignments || []);
          } else {
            wrapper.innerHTML = `<div class="empty-state">${result.error || '取得に失敗しました'}</div>`;
          }
        })
        .withFailureHandler(err => {
          if (modal.dataset.staffId !== staffId) return;
          modal.dataset.assignmentsLoading = 'false';
          wrapper.innerHTML = `<div class="empty-state">エラー: ${err.message}</div>`;
        })
        .getUnpaidAssignments(staffId, endDate);
    }

    function attachModalAssignmentLazyLoad(assignmentsLoaded) {
      const details = document.getElementById('modalAssignmentDetails');
      if (!details || assignmentsLoaded) return;
      details.addEventListener('toggle', () => {
        if (details.open) {
          loadModalAssignments();
        }
      });
    }

      attachModalAssignmentLazyLoad(assignmentsLoaded);
    }

    function toggleModalSign() {
      const btn = document.getElementById('modalSignBtn');
      if (btn.textContent === '+') {
        btn.textContent = '-';
        btn.classList.remove('positive');
        btn.classList.add('negative');
      } else {
        btn.textContent = '+';
        btn.classList.remove('negative');
        btn.classList.add('positive');
      }
      updateModalTotal();
    }

    function updateModalTotal() {
      if (!modalUnpaidData) return;
      const signBtn = document.getElementById('modalSignBtn');
      const sign = signBtn && signBtn.textContent === '-' ? -1 : 1;
      const adjustment = (Number(document.getElementById('modalAdjustment').value) || 0) * sign;
      const total = modalUnpaidData.totalAmount + adjustment;
      document.getElementById('modalTotalAmount').textContent = formatCurrency(total);
    }

    function markAsPaidFromModal() {
      const modal = document.getElementById('payoutDetailModal');
      const staffId = modal.dataset.staffId;
      const endDate = document.getElementById('endDateFilter').value;

      if (!staffId || !modalUnpaidData) {
        showToast('error', 'データがありません');
        return;
      }

      const paidDate = document.getElementById('modalPaidDate').value;
      const signBtn = document.getElementById('modalSignBtn');
      const sign = signBtn && signBtn.textContent === '-' ? -1 : 1;
      const adjustmentAmount = (Number(document.getElementById('modalAdjustment').value) || 0) * sign;
      const notes = document.getElementById('modalNotes').value;
      const total = modalUnpaidData.totalAmount + adjustmentAmount;

      showConfirmModal(
        '支払済確認',
        `<p><strong>${modalUnpaidData.staffName}</strong> を支払済にします。</p>
         <p>配置数: ${modalUnpaidData.assignmentCount}件</p>
         <p>支払日: ${paidDate}</p>
         <p>合計金額: <strong>${formatCurrency(total)}</strong></p>`,
        '支払済にする',
        'btn-primary',
        () => {
          showLoading('支払処理中...');
          google.script.run
            .withSuccessHandler(result => {
              hideLoading();
              if (result.ok) {
                showToast('success', '支払済にしました');
                closePayoutModal();
                // 未払リストから該当行を削除
                removeUnpaidStaffRow(staffId);
                // 履歴に追加
                if (result.data && result.data.payout) {
                  prependHistoryRow(result.data.payout);
                }
                clearSession();
              } else {
                showToast('error', result.error);
              }
            })
            .withFailureHandler(err => {
              hideLoading();
              showToast('error', err.message);
            })
            .markAsPaid(staffId, endDate, {
              paid_date: paidDate,
              adjustment_amount: adjustmentAmount,
              notes: notes
            });
        }
      );
    }

    function closePayoutModal() {
      const modal = document.getElementById('payoutDetailModal');
      modal.classList.remove('active');
      modalUnpaidData = null;
      hidePayoutArchiveWarning();
    }

    /**

     */

      const banner = document.getElementById('payout-archive-warning-banner');
      const messageEl = document.getElementById('payout-archive-warning-message');
      if (banner && messageEl) {
        messageEl.textContent = message || 'このデータは過去年度のアーカイブです。編集内容はアーカイブDBに反映されます。';
        banner.style.display = 'flex';

    /**
     * 支払アーカイブ警告バナーを非表示
     */

      const banner = document.getElementById('payout-archive-warning-banner');
      if (banner) {
        banner.style.display = 'none';
      }
    }

    function handlePayoutModalOverlayClick(event) {
      if (event.target.id === 'payoutDetailModal') {
        closePayoutModal();
      }
    }

    function toggleSign(staffId) {
      const btn = document.querySelector(`.btn-sign[data-staff-id="${staffId}"]`);
      if (btn.textContent === '+') {
        btn.textContent = '-';
        btn.classList.remove('positive');
        btn.classList.add('negative');
      } else {
        btn.textContent = '+';
        btn.classList.remove('negative');
        btn.classList.add('positive');
      }
    }

    function formatCurrency(amount) {
      return new Intl.NumberFormat('ja-JP', {
        style: 'currency',
        currency: 'JPY'
      }).format(amount || 0);
    }

    /**
     * 日付をMM/DD形式に変換（年は不要）
     */
    function formatDateShort(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return dateStr;
      return (d.getMonth() + 1) + '/' + d.getDate();
    }

    function formatNumber(num) {
      return new Intl.NumberFormat('ja-JP').format(num || 0);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getStatusLabel(status) {
      const labels = { draft: '下書き', confirmed: '確定', paid: '支払済' };
      return labels[status] || status;
    }

    // ========== 差分リロード用ヘルパー関数 ==========

    /**
     * 未払リストから特定スタッフの行を削除
     * @param {string} staffId - スタッフID
     */
    function removeUnpaidStaffRow(staffId) {
      const row = document.querySelector(`tr[data-staff-id="${staffId}"]`);
      if (row) {
        row.remove();
        updateUnpaidListSummary();
      }
    }

    /**
     * 未払リストのサマリー（対象人数・合計金額）を再計算
     */
    function updateUnpaidListSummary() {
      const rows = document.querySelectorAll('#unpaidSummary tbody tr[data-staff-id]');
      let totalCount = rows.length;
      let totalAmount = 0;

      rows.forEach(row => {
        const amountCell = row.querySelector('td.amount');
        if (amountCell) {
          // 半角¥(U+00A5)と全角￥(U+FFE5)の両方を除去
          const amountText = amountCell.textContent.replace(/[¥￥,]/g, '');
          totalAmount += Number(amountText) || 0;
        }
      });

      // サマリーを更新
      const summaryItems = document.querySelectorAll('#unpaidSummary .summary-item .value');
      if (summaryItems.length >= 2) {
        summaryItems[0].textContent = `${totalCount}名`;
        summaryItems[1].textContent = formatCurrency(totalAmount);
      }

      // 全員支払済の場合
      if (totalCount === 0) {
        const summaryDiv = document.getElementById('unpaidSummary');
        summaryDiv.innerHTML = '<div class="empty-state">未払のスタッフはいません</div>';
        clearSession();
      }
    }

    /**
     * 履歴テーブルの先頭に行を追加
     * @param {Object} payout - 支払データ
     */
    function prependHistoryRow(payout) {
      const container = document.getElementById('historyTable');
      let tbody = container.querySelector('tbody');

      // テーブルがない場合は作成
      if (!tbody) {
        container.innerHTML = `
          <table class="data-table">
            <thead>
              <tr>
                <th style="white-space: nowrap;">スタッフ</th>
                <th style="white-space: nowrap;">期間</th>
                <th style="white-space: nowrap;">支払日</th>
                <th style="white-space: nowrap;">配置数</th>
                <th style="white-space: nowrap;">基本金額</th>
                <th style="white-space: nowrap;">調整額</th>
                <th style="white-space: nowrap;">合計金額</th>
                <th style="white-space: nowrap; width: 200px;">備考</th>
                <th style="white-space: nowrap;">操作</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        `;
        tbody = container.querySelector('tbody');
      }

      // 行を作成
      const baseAmount = (payout.base_amount || 0) + (payout.transport_amount || 0);
      const adjustmentAmount = payout.adjustment_amount || 0;
      const tr = document.createElement('tr');
      tr.style.whiteSpace = 'nowrap';
      tr.dataset.payoutId = payout.payout_id;
      tr.innerHTML = `
        <td>${payout.target_name || ''}</td>
        <td style="font-size:12px">${payout.period_start || '-'} ~ ${payout.period_end || '-'}</td>
        <td>${payout.paid_date || '-'}</td>
        <td>${payout.assignment_count}件</td>
        <td class="amount">${formatCurrency(baseAmount)}</td>
        <td class="amount" style="color: ${adjustmentAmount !== 0 ? (adjustmentAmount > 0 ? 'var(--color-success)' : 'var(--color-danger)') : 'inherit'}">${adjustmentAmount !== 0 ? formatCurrency(Math.abs(adjustmentAmount)).replace('¥', '') : '-'}</td>
        <td class="amount">${formatCurrency(payout.total_amount)}</td>
        <td style="white-space: normal; max-width: 200px;">${payout.notes || ''}</td>
        <td>
          <button class="btn btn-danger" onclick="undoPayoutConfirm('${payout.payout_id}', '${payout.updated_at}', '${payout.target_name}')">取消</button>
        </td>
      `;

      // 先頭に挿入
      tbody.insertBefore(tr, tbody.firstChild);

      // Update cache
      updateHistoryCache(payouts => [payout, ...payouts]);
    }

    /**
     * 履歴テーブルから特定の行を削除
     * @param {string} payoutId - 支払ID
     */
    function removeHistoryRow(payoutId) {
      const row = document.querySelector(`tr[data-payout-id="${payoutId}"]`);
      if (row) {
        row.remove();
      }

      // テーブルが空になった場合
      const tbody = document.querySelector('#historyTable tbody');
      if (tbody && tbody.children.length === 0) {
        document.getElementById('historyTable').innerHTML =
          '<div class="empty-state">支払履歴がありません</div>';
      }

      // Update cache
      updateHistoryCache(payouts => payouts.filter(p => p.payout_id !== payoutId));
    }

    /**
     * 単一スタッフの未払サマリーをクリア
     */
    function clearSingleUnpaidSummary() {
      const summaryDiv = document.getElementById('unpaidSummary');
      summaryDiv.innerHTML = '<div class="empty-state">未払の配置はありません</div>';
      currentUnpaid = null;
      clearSession();
    }

    /**
     * 未払行を確認済み行に更新
     * @param {string} staffId - スタッフID
     * @param {Object} payout - 確認済みの支払データ
     */
    function updateRowToConfirmed(staffId, payout) {
      const row = document.querySelector(`tr[data-staff-id="${staffId}"][data-status="unpaid"]`);
      if (!row) return;

      const confirmedRow = {
        staffId: payout.staff_id,
        staffName: payout.target_name,
        unpaidCount: payout.assignment_count,
        periodStart: payout.period_start,
        periodEnd: payout.period_end,
        estimatedAmount: payout.total_amount,
        adjustmentAmount: payout.adjustment_amount || 0,
        notes: payout.notes || '',
        payoutId: payout.payout_id,
        updatedAt: payout.updated_at,
        status: 'confirmed',
        rowId: `confirmed-${payout.payout_id}`
      };

      const newRowHtml = renderConfirmedRow(confirmedRow);
      row.outerHTML = newRowHtml;
      updatePayoutSummary();
    }

    /**
     * 確認済み行を削除
     * @param {string} payoutId - 支払ID
     */
    function removeConfirmedRow(payoutId) {
      const row = document.querySelector(`tr[data-payout-id="${payoutId}"]`);
      if (row) {
        row.remove();
        updatePayoutSummary();
      }
    }

    /**
     * サマリー（未払/確認済み/合計金額）を再計算
     */
    function updatePayoutSummary() {
      const unpaidRows = document.querySelectorAll('#payoutTable tbody tr[data-status="unpaid"]');
      const confirmedRows = document.querySelectorAll('#payoutTable tbody tr[data-status="confirmed"]');

      let unpaidTotal = 0;
      let confirmedTotal = 0;

      unpaidRows.forEach(row => {
        const amountCell = row.querySelector('td.amount');
        if (amountCell) {
          const amountText = amountCell.textContent.replace(/[¥￥,]/g, '');
          unpaidTotal += Number(amountText) || 0;
        }
      });

      confirmedRows.forEach(row => {
        const amountCell = row.querySelector('td.amount');
        if (amountCell) {
          const amountText = amountCell.textContent.replace(/[¥￥,]/g, '');
          confirmedTotal += Number(amountText) || 0;
        }
      });

      // サマリーを更新
      const summaryItems = document.querySelectorAll('#unpaidSummary .summary-item .value');
      if (summaryItems.length >= 3) {
        summaryItems[0].textContent = `${unpaidRows.length}名`;
        summaryItems[1].textContent = `${confirmedRows.length}名`;
        summaryItems[2].textContent = formatCurrency(unpaidTotal + confirmedTotal);
      }

      // 全員処理済みの場合
      if (unpaidRows.length === 0 && confirmedRows.length === 0) {
        const summaryDiv = document.getElementById('unpaidSummary');
        summaryDiv.innerHTML = '<div class="empty-state">対象のスタッフはいません</div>';
        clearSession();
      }
    }

    function showToast(type, message) {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // ========== Bulk Action Bar ==========
    function getSelectedCounts() {
      const unpaidCount = document.querySelectorAll('.staff-check[data-status="unpaid"]:checked').length;
      const confirmedCount = document.querySelectorAll('.payout-check[data-status="confirmed"]:checked').length;
      return { unpaidCount, confirmedCount };
    }

    function updateBulkActionBar() {
      const { unpaidCount, confirmedCount } = getSelectedCounts();
      const bar = document.getElementById('bulkActionBar');
      const countSpan = document.getElementById('selectedCount');
      const statusSelect = document.getElementById('bulkStatusSelect');
      const totalSelected = unpaidCount + confirmedCount;

      if (bar) {
        bar.classList.toggle('visible', totalSelected > 0);
      }

      if (countSpan) {
        countSpan.textContent = totalSelected;
      }

      // 全選択チェックボックスの状態を同期
      const allCheckboxes = document.querySelectorAll('.staff-check, .payout-check');
      const checkedCount = document.querySelectorAll('.staff-check:checked, .payout-check:checked').length;
      const isAllSelected = allCheckboxes.length > 0 && checkedCount === allCheckboxes.length;
      const selectAll = document.getElementById('selectAll');
      const bulkSelectAll = document.getElementById('bulkSelectAll');
      if (selectAll) selectAll.checked = isAllSelected;
      if (bulkSelectAll) bulkSelectAll.checked = isAllSelected;

      // ステータスに応じて選択可能なオプションを調整
      if (statusSelect) {
        const confirmedOption = statusSelect.querySelector('option[value="confirmed"]');
        const paidOption = statusSelect.querySelector('option[value="paid"]');
        const unpaidOption = statusSelect.querySelector('option[value="unpaid"]');

        // 未払選択時のみ「確認済みにする」を有効化
        if (confirmedOption) confirmedOption.disabled = unpaidCount === 0;
        // 確認済み選択時のみ「支払済にする」を有効化
        if (paidOption) paidOption.disabled = confirmedCount === 0;
        // 確認済み選択時のみ「未払に戻す」を有効化
        if (unpaidOption) unpaidOption.disabled = confirmedCount === 0;
      }
    }

    // 後方互換性のためのエイリアス
    function updateFab() {
      updateBulkActionBar();
    }

    function executeBulkStatusChange() {
      const statusSelect = document.getElementById('bulkStatusSelect');
      const selectedStatus = statusSelect?.value;

      if (!selectedStatus) {
        showToast('error', 'ステータスを選択してください');
        return;
      }

      switch (selectedStatus) {
        case 'confirmed':
          bulkConfirm();
          break;
        case 'paid':
          bulkPayConfirmed();
          break;
        case 'unpaid':
          bulkUndoConfirm();
          break;
        default:
          showToast('error', '不明なステータスです');
      }

      // 選択をリセット
      statusSelect.value = '';
    }

    function clearSelection() {
      document.querySelectorAll('.staff-check:checked, .payout-check:checked').forEach(cb => {
        cb.checked = false;
      });
      const selectAll = document.getElementById('selectAll');
      if (selectAll) selectAll.checked = false;
      updateBulkActionBar();
    }

    // 一括で確認済みを取り消し
    function bulkUndoConfirm() {
      const checkboxes = document.querySelectorAll('.payout-check[data-status="confirmed"]:checked');
      if (checkboxes.length === 0) {
        showToast('error', '確認済みのスタッフを選択してください');
        return;
      }

      const rows = Array.from(checkboxes).map(cb => {
        const row = cb.closest('tr');
        return {
          payoutId: row.dataset.payoutId,
          updatedAt: row.dataset.updatedAt,
          staffName: row.querySelector('td:nth-child(2)')?.textContent || ''
        };
      });

      showConfirmModal(
        '一括取消',
        `<p><strong>${rows.length}件</strong> の確認を取り消しますか？</p>
         <p>取り消すと未払状態に戻ります。</p>`,
        '取り消す',
        'btn-danger',
        () => {
          // 順番に処理（並列だとAPIリミットの問題があるため）
          let processed = 0;
          showLoading(`${rows.length}件を取消中...`);

          function processNext() {
            if (processed >= rows.length) {
              hideLoading();
              showToast('success', `${rows.length}件を取り消しました`);
              clearSession();
              updateBulkActionBar();
              return;
            }

            const { payoutId, updatedAt } = rows[processed];
            google.script.run
              .withSuccessHandler(result => {
                if (result.ok) {
                  const undone = result.data?.undone;
                  if (undone) {
                    convertConfirmedToUnpaid(payoutId, undone);
                  } else {
                    removeConfirmedRow(payoutId);
                  }
                }
                processed++;
                processNext();
              })
              .withFailureHandler(() => {
                processed++;
                processNext();
              })
              .undoPayout(payoutId, updatedAt);
          }

          processNext();
        }
      );
    }

    // Checkbox change listener (delegate)
    document.addEventListener('change', (e) => {
      if (e.target.classList.contains('staff-check') ||
          e.target.classList.contains('payout-check') ||
          e.target.id === 'selectAll') {
        updateBulkActionBar();
      }
    });

    // ========== Collapsible Section ==========

    function toggleUnpaidSection() {
