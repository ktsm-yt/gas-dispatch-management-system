    // ========== Payout Detail Modal ==========
    let modalUnpaidData = null;
    let modalHistoryData = [];
    let modalPayoutStatus = 'unpaid';  // 'unpaid' or 'confirmed'
    let modalPayoutId = null;
    let modalPayoutUpdatedAt = null;

    function openPayoutModal(staffId, staffName, options = {}) {
      const modal = document.getElementById('payoutDetailModal');
      const status = options.status || 'unpaid';
      const payoutId = options.payoutId || null;
      const updatedAt = options.updatedAt || null;

      modal.dataset.staffId = staffId;
      modal.dataset.assignmentsLoaded = 'false';
      modal.dataset.assignmentsLoading = 'false';
      document.getElementById('modalStaffName').textContent = staffName || '';
      modalUnpaidData = null;
      modalHistoryData = [];
      modalPayoutStatus = status;
      modalPayoutId = payoutId;
      modalPayoutUpdatedAt = updatedAt;
      const endDate = document.getElementById('endDateFilter').value;

      // 確認済みの場合
      if (status === 'confirmed' && payoutId) {
        // キャッシュを確認（未払と同じパターン）
        const cachedPayout = getCachedConfirmedPayout(payoutId);
        const cachedHistory = getCachedHistoryForStaff(staffId);

        if (cachedPayout) {
          // キャッシュがあれば即座に表示
          modalUnpaidData = cachedPayout;
          modalHistoryData = cachedHistory || [];
          modalPayoutUpdatedAt = cachedPayout.updatedAt;
          renderPayoutModal(cachedPayout, cachedHistory, { status: 'confirmed' });
          modal.classList.add('active');

          // 履歴がキャッシュにない場合のみ取得
          if (!cachedHistory) {
            google.script.run
              .withSuccessHandler(result => {
                if (modal.dataset.staffId !== staffId) return;
                if (result.ok) {
                  modalHistoryData = result.data.payouts || [];
                  updateModalHistory(modalHistoryData);
                }
              })
              .withFailureHandler(() => {})
              .searchPayouts({ staff_id: staffId, status: 'paid', limit: 10 });
          }
          return;
        }

        // キャッシュがない場合はAPI取得
        document.getElementById('payoutModalBody').innerHTML = '<div class="loading">読み込み中...</div>';
        modal.classList.add('active');

        let payoutResult = null;
        let historyResult = null;
        let completed = 0;

        function checkAndRenderConfirmed() {
          completed++;
          if (completed === 2) {
            if (modal.dataset.staffId !== staffId) return;
            if (payoutResult && payoutResult.ok) {
              modalUnpaidData = payoutResult.data;
              modalHistoryData = historyResult?.ok ? historyResult.data.payouts : [];
              if (payoutResult.data.updatedAt) {
                modalPayoutUpdatedAt = payoutResult.data.updatedAt;
              }
              renderPayoutModal(payoutResult.data, modalHistoryData, { status: 'confirmed' });
            } else {
              document.getElementById('payoutModalBody').innerHTML =
                `<div class="empty-state">${payoutResult?.error || 'エラーが発生しました'}</div>`;
            }
          }
        }

        google.script.run
          .withSuccessHandler(result => { payoutResult = result; checkAndRenderConfirmed(); })
          .withFailureHandler(err => { payoutResult = { ok: false, error: err.message }; checkAndRenderConfirmed(); })
          .getPayoutDetails(payoutId, { include_assignments: false });

        google.script.run
          .withSuccessHandler(result => { historyResult = result; checkAndRenderConfirmed(); })
          .withFailureHandler(err => { historyResult = { ok: false, data: { payouts: [] } }; checkAndRenderConfirmed(); })
          .searchPayouts({ staff_id: staffId, status: 'paid', limit: 10 });

        return;
      }

      // 未払の場合は従来通り
      const cachedSummary = getCachedUnpaidPreview(staffId, endDate);
      const cachedHistory = getCachedHistoryForStaff(staffId);
      const summaryComplete = cachedSummary && cachedSummary.isComplete;

      if (cachedSummary) {
        modalUnpaidData = cachedSummary.data;
        modalHistoryData = cachedHistory || [];
        renderPayoutModal(
          cachedSummary.data,
          cachedHistory ? cachedHistory : null,
          { preview: !summaryComplete, status: 'unpaid' }
        );
      } else {
        document.getElementById('payoutModalBody').innerHTML = '<div class="loading">読み込み中...</div>';
      }

      modal.classList.add('active');

      if (summaryComplete) {
        // サマリーが完備している場合は履歴のみ遅延取得
        if (!cachedHistory) {
          google.script.run
            .withSuccessHandler(result => {
              if (modal.dataset.staffId !== staffId) return;
              if (result.ok) {
                modalHistoryData = result.data.payouts || [];
                updateModalHistory(modalHistoryData);
              } else {
                updateModalHistory([]);
              }
            })
            .withFailureHandler(() => {
              if (modal.dataset.staffId !== staffId) return;
              updateModalHistory([]);
            })
            .searchPayouts({ staff_id: staffId, status: 'paid', limit: 10 });
        }
        return;
      }

      // 未払サマリーと支払履歴を並行取得
      let unpaidResult = null;
      let historyResult = null;
      let completed = 0;

      function checkAndRender() {
        completed++;
        if (completed === 2) {
          if (modal.dataset.staffId !== staffId) return;
          if (unpaidResult && unpaidResult.ok) {
            modalUnpaidData = unpaidResult.data;
            modalHistoryData = historyResult?.ok ? historyResult.data.payouts : [];
            renderPayoutModal(unpaidResult.data, modalHistoryData, { status: 'unpaid' });
          } else {
            document.getElementById('payoutModalBody').innerHTML =
              `<div class="empty-state">${unpaidResult?.error || 'エラーが発生しました'}</div>`;
          }
        }
      }

      google.script.run
        .withSuccessHandler(result => { unpaidResult = result; checkAndRender(); })
        .withFailureHandler(err => { unpaidResult = { ok: false, error: err.message }; checkAndRender(); })
        .getUnpaidSummary(staffId, endDate, { include_assignments: false });

      google.script.run
        .withSuccessHandler(result => { historyResult = result; checkAndRender(); })
        .withFailureHandler(err => { historyResult = { ok: false, data: { payouts: [] } }; checkAndRender(); })
        .searchPayouts({ staff_id: staffId, status: 'paid', limit: 10 });
    }

    function buildHistoryListHtml(history) {
      if (history === null) {
        return '<li class="empty">読み込み中...</li>';
      }
      if (history.length > 0) {
        return history.map(p => `
          <li>
            <span class="history-date">${p.paid_date || '-'}</span>
            <span class="history-amount">${formatCurrency(p.total_amount)}</span>
          </li>
        `).join('');
      }
      return '<li class="empty">履歴なし</li>';
    }

    function updateModalHistory(history) {
      const list = document.getElementById('modalHistoryList');
      if (!list) return;
      list.innerHTML = buildHistoryListHtml(history);
    }

    function buildAssignmentTableHtml(assignments) {
      const rows = assignments.map(a => {
        const dateStr = a.work_date ? formatDateShort(a.work_date) : '-';
        const siteName = a.site_name || '(現場名なし)';
        return `<tr><td>${dateStr}</td><td>${siteName}</td></tr>`;
      }).join('');
      return `
        <table class="assignment-list-table">
          <thead><tr><th>日付</th><th>現場名</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      `;
    }

    function renderModalAssignments(assignments) {
      const wrapper = document.getElementById('modalAssignmentWrapper');
      if (!wrapper) return;
      if (!assignments || assignments.length === 0) {
        wrapper.innerHTML = '<div class="empty-state">出勤現場がありません</div>';
        return;
      }
      wrapper.innerHTML = buildAssignmentTableHtml(assignments);
    }

    function loadModalAssignments() {
      const modal = document.getElementById('payoutDetailModal');
      if (!modal) return;
      if (modal.dataset.assignmentsLoaded === 'true' || modal.dataset.assignmentsLoading === 'true') return;

      const staffId = modal.dataset.staffId;
      const endDate = document.getElementById('endDateFilter').value;
      const wrapper = document.getElementById('modalAssignmentWrapper');
      if (!staffId || !wrapper) return;

      modal.dataset.assignmentsLoading = 'true';
      wrapper.innerHTML = '<div class="loading">読み込み中...</div>';

      // 確認済みの場合はgetPayoutDetailsを使用
      if (modalPayoutStatus === 'confirmed' && modalPayoutId) {
        google.script.run
          .withSuccessHandler(result => {
            if (modal.dataset.staffId !== staffId) return;
            modal.dataset.assignmentsLoading = 'false';
            if (result.ok) {
              modal.dataset.assignmentsLoaded = 'true';
              renderModalAssignments(result.data.assignments || []);
            } else {
              wrapper.innerHTML = `<div class="empty-state">${result.error || '取得に失敗しました'}</div>`;
            }
          })
          .withFailureHandler(err => {
            if (modal.dataset.staffId !== staffId) return;
            modal.dataset.assignmentsLoading = 'false';
            wrapper.innerHTML = `<div class="empty-state">エラー: ${err.message}</div>`;
          })
          .getPayoutDetails(modalPayoutId, { include_assignments: true });
        return;
      }

      // 未払の場合は従来通り
      google.script.run
        .withSuccessHandler(result => {
          if (modal.dataset.staffId !== staffId) return;
          modal.dataset.assignmentsLoading = 'false';
          if (result.ok) {
            modal.dataset.assignmentsLoaded = 'true';
            renderModalAssignments(result.data.assignments || []);
          } else {
            wrapper.innerHTML = `<div class="empty-state">${result.error || '取得に失敗しました'}</div>`;
          }
        })
        .withFailureHandler(err => {
          if (modal.dataset.staffId !== staffId) return;
          modal.dataset.assignmentsLoading = 'false';
          wrapper.innerHTML = `<div class="empty-state">エラー: ${err.message}</div>`;
        })
        .getUnpaidAssignments(staffId, endDate);
    }

    function attachModalAssignmentLazyLoad(assignmentsLoaded) {
      const details = document.getElementById('modalAssignmentDetails');
      if (!details || assignmentsLoaded) return;
      details.addEventListener('toggle', () => {
        if (details.open) {
          loadModalAssignments();
        }
      });
    }

    function renderPayoutModal(data, history = [], options = {}) {
      const today = new Date().toISOString().split('T')[0];
      const body = document.getElementById('payoutModalBody');
      const preview = options.preview === true;
      const status = options.status || modalPayoutStatus || 'unpaid';
      const disabledAttr = preview ? 'disabled' : '';
      const baseText = (data.baseAmount === null || data.baseAmount === undefined) ? '-' : formatCurrency(data.baseAmount);
      const transportText = (data.transportAmount === null || data.transportAmount === undefined) ? '-' : formatCurrency(data.transportAmount);
      const totalText = (data.totalAmount === null || data.totalAmount === undefined) ? '-' : formatCurrency(data.totalAmount);

      if (data.assignmentCount === 0) {
        body.innerHTML = '<div class="empty-state">未払の配置はありません</div>';
        const payBtn = document.getElementById('modalPayBtn');
        payBtn.style.display = 'none';
        payBtn.disabled = false;
        return;
      }

      const payBtn = document.getElementById('modalPayBtn');
      payBtn.style.display = '';
      // プレビューモードでも必要データ（staffId, totalAmount, assignmentCount）があればボタンは有効化
      // 確認/支払操作に必要なのはこれらのみ
      payBtn.disabled = false;

      // ステータスに応じたボタンテキストとアクションを設定
      // 確認済みの場合、調整額・備考は既に確定しているので無効化
      const isConfirmed = status === 'confirmed';
      const adjustmentDisabled = isConfirmed ? 'disabled' : disabledAttr;

      if (isConfirmed) {
        payBtn.textContent = '支払済にする';
        payBtn.onclick = markAsPaidFromModal;
      } else {
        payBtn.textContent = '確認済みにする';
        payBtn.onclick = confirmFromModal;
      }

      const historyHtml = buildHistoryListHtml(history);

      // 確認済みの場合、既存の調整額を表示用に準備
      const existingAdjustment = data.adjustmentAmount || 0;
      const adjustmentSign = existingAdjustment < 0 ? '-' : '+';
      const adjustmentValue = Math.abs(existingAdjustment);
      const existingNotes = data.notes || '';

      const assignmentsLoaded = Array.isArray(data.assignments);
      const modal = document.getElementById('payoutDetailModal');
      if (modal) {
        modal.dataset.assignmentsLoaded = assignmentsLoaded ? 'true' : 'false';
        modal.dataset.assignmentsLoading = 'false';
      }

      // 出勤現場一覧HTML
      let assignmentListHtml = '';
      if (data.assignmentCount > 0) {
        const listBody = assignmentsLoaded
          ? buildAssignmentTableHtml(data.assignments || [])
          : '<div class="empty-state">開いて読み込み</div>';
        assignmentListHtml = `
          <div class="assignment-list-section">
            <details id="modalAssignmentDetails">
              <summary style="cursor: pointer; font-weight: 500; margin-bottom: 8px;">出勤現場一覧（${data.assignmentCount}件）</summary>
              <div class="assignment-list-wrapper" id="modalAssignmentWrapper">
                ${listBody}
              </div>
            </details>
          </div>
        `;
      }

      body.innerHTML = `
        <div class="modal-two-col">
          <div class="modal-main">
            <div class="summary-grid" style="margin-bottom: var(--spacing-md);">
              <div class="summary-item">
                <div class="label">配置数</div>
                <div class="value">${data.assignmentCount}件</div>
              </div>
              <div class="summary-item">
                <div class="label">期間</div>
                <div class="value" style="font-size:14px">${data.periodStart || '-'} ~ ${data.periodEnd}</div>
              </div>
              <div class="summary-item">
                <div class="label">基本給与</div>
                <div class="value amount">${baseText}</div>
              </div>
              <div class="summary-item">
                <div class="label">交通費</div>
                <div class="value amount">${transportText}</div>
              </div>
              <div class="summary-item">
                <div class="label">合計</div>
                <div class="value amount" id="modalTotalAmount">${totalText}</div>
              </div>
            </div>
            ${assignmentListHtml}
            <div style="display: flex; flex-wrap: wrap; gap: var(--spacing-md); align-items: center;">
              <div class="filter-group">
                <label>支払日:</label>
                <input type="date" id="modalPaidDate" value="${today}" ${disabledAttr} />
              </div>
              <div class="filter-group">
                <label>調整額:</label>
                <button type="button" class="btn-sign ${adjustmentSign === '-' ? 'negative' : 'positive'}" id="modalSignBtn" onclick="toggleModalSign()" ${adjustmentDisabled}>${adjustmentSign}</button>
                <input type="number" id="modalAdjustment" value="${adjustmentValue}" min="0" style="width: 80px;" onchange="updateModalTotal()" oninput="updateModalTotal()" ${adjustmentDisabled} />
              </div>
              <div class="filter-group" style="flex: 1;">
                <label style="white-space: nowrap;">備考:</label>
                <input type="text" id="modalNotes" placeholder="任意" value="${existingNotes}" style="flex: 1;" ${adjustmentDisabled} />
              </div>
            </div>
          </div>
          <div class="modal-history">
            <h4>支払履歴</h4>
            <ul id="modalHistoryList">${historyHtml}</ul>
          </div>
        </div>
      `;

      attachModalAssignmentLazyLoad(assignmentsLoaded);
    }

    function toggleModalSign() {
      const btn = document.getElementById('modalSignBtn');
      if (btn.textContent === '+') {
        btn.textContent = '-';
        btn.classList.remove('positive');
        btn.classList.add('negative');
      } else {
        btn.textContent = '+';
        btn.classList.remove('negative');
        btn.classList.add('positive');
      }
      updateModalTotal();
    }

    function updateModalTotal() {
      if (!modalUnpaidData) return;

      // 確認済みの場合、totalAmountは既に調整込みなので再計算しない
      if (modalPayoutStatus === 'confirmed') {
        document.getElementById('modalTotalAmount').textContent = formatCurrency(modalUnpaidData.totalAmount);
        return;
      }

      // 未払の場合は入力値から計算
      const signBtn = document.getElementById('modalSignBtn');
      const sign = signBtn && signBtn.textContent === '-' ? -1 : 1;
      const adjustment = (Number(document.getElementById('modalAdjustment').value) || 0) * sign;
      const total = modalUnpaidData.totalAmount + adjustment;
      document.getElementById('modalTotalAmount').textContent = formatCurrency(total);
    }

    function markAsPaidFromModal() {
      const modal = document.getElementById('payoutDetailModal');
      const staffId = modal.dataset.staffId;
      const endDate = document.getElementById('endDateFilter').value;

      if (!staffId || !modalUnpaidData) {
        showToast('error', 'データがありません');
        return;
      }

      const paidDate = document.getElementById('modalPaidDate').value;
      const signBtn = document.getElementById('modalSignBtn');
      const sign = signBtn && signBtn.textContent === '-' ? -1 : 1;
      const adjustmentAmount = (Number(document.getElementById('modalAdjustment').value) || 0) * sign;
      const notes = document.getElementById('modalNotes').value;
      const total = modalUnpaidData.totalAmount + adjustmentAmount;

      // 確認済みからの支払い
      if (modalPayoutStatus === 'confirmed' && modalPayoutId) {
        showConfirmModal(
          '支払済確認',
          `<p><strong>${modalUnpaidData.staffName}</strong> を支払済にします。</p>
           <p>配置数: ${modalUnpaidData.assignmentCount}件</p>
           <p>支払日: ${paidDate}</p>
           <p>合計金額: <strong>${formatCurrency(total)}</strong></p>`,
          '支払済にする',
          'btn-primary',
          () => {
            showLoading('支払処理中...');
            google.script.run
              .withSuccessHandler(result => {
                hideLoading();
                if (result.ok) {
                  showToast('success', '支払済にしました');
                  closePayoutModal();
                  // 確認済み行を削除してサマリー更新
                  removeConfirmedRow(modalPayoutId);
                  // 履歴に追加
                  if (result.data && result.data.payout) {
                    prependHistoryRow(result.data.payout);
                  }
                  updateBulkActionBar();
                  scheduleUnpaidRevalidate('paid');
                } else {
                  showToast('error', result.error);
                }
              })
              .withFailureHandler(err => {
                hideLoading();
                showToast('error', err.message);
              })
              .payConfirmedPayout(modalPayoutId, {
                expectedUpdatedAt: modalPayoutUpdatedAt,
                paid_date: paidDate
              });
          }
        );
        return;
      }

      // 未払から直接支払い（従来の処理、ただし通常はconfirmFromModalが呼ばれるはず）
      showConfirmModal(
        '支払済確認',
        `<p><strong>${modalUnpaidData.staffName}</strong> を支払済にします。</p>
         <p>配置数: ${modalUnpaidData.assignmentCount}件</p>
         <p>支払日: ${paidDate}</p>
         <p>合計金額: <strong>${formatCurrency(total)}</strong></p>`,
        '支払済にする',
        'btn-primary',
        () => {
          showLoading('支払処理中...');
          google.script.run
            .withSuccessHandler(result => {
              hideLoading();
              if (result.ok) {
                showToast('success', '支払済にしました');
                closePayoutModal();
                // 未払リストから該当行を削除
                removeUnpaidStaffRow(staffId);
                // 履歴に追加
                if (result.data && result.data.payout) {
                  prependHistoryRow(result.data.payout);
                }
                updateBulkActionBar();
                scheduleUnpaidRevalidate('paid');
              } else {
                showToast('error', result.error);
              }
            })
            .withFailureHandler(err => {
              hideLoading();
              showToast('error', err.message);
            })
            .markAsPaid(staffId, endDate, {
              paid_date: paidDate,
              adjustment_amount: adjustmentAmount,
              notes: notes
            });
        }
      );
    }

    // 未払モーダルから確認済みにする
    function confirmFromModal() {
      const modal = document.getElementById('payoutDetailModal');
      const staffId = modal.dataset.staffId;
      const endDate = document.getElementById('endDateFilter').value;

      if (!staffId || !modalUnpaidData) {
        showToast('error', 'データがありません');
        return;
      }

      const signBtn = document.getElementById('modalSignBtn');
      const sign = signBtn && signBtn.textContent === '-' ? -1 : 1;
      const adjustmentAmount = (Number(document.getElementById('modalAdjustment').value) || 0) * sign;
      const notes = document.getElementById('modalNotes').value;
      const total = modalUnpaidData.totalAmount + adjustmentAmount;

      showConfirmModal(
        '確認済みにする',
        `<p><strong>${modalUnpaidData.staffName}</strong> を確認済みにします。</p>
         <p>配置数: ${modalUnpaidData.assignmentCount}件</p>
         <p>合計金額: <strong>${formatCurrency(total)}</strong></p>`,
        '確認済みにする',
        'btn-primary',
        () => {
          showLoading('確認処理中...');
          google.script.run
            .withSuccessHandler(result => {
              hideLoading();
              if (result.ok) {
                showToast('success', '確認済みにしました');
                closePayoutModal();
                if (result.data && result.data.payout) {
                  updateRowToConfirmed(staffId, result.data.payout);
                }
                updateBulkActionBar();
                scheduleUnpaidRevalidate('confirm');
              } else {
                showToast('error', result.error);
              }
            })
            .withFailureHandler(err => {
              hideLoading();
              showToast('error', err.message);
            })
            .confirmPayout(staffId, endDate, {
              adjustment_amount: adjustmentAmount,
              notes: notes
            });
        }
      );
    }

    function closePayoutModal() {
      const modal = document.getElementById('payoutDetailModal');
      modal.classList.remove('active');
      modalUnpaidData = null;
      modalPayoutStatus = 'unpaid';
      modalPayoutId = null;
      modalPayoutUpdatedAt = null;
    }

    function handlePayoutModalOverlayClick(event) {
      if (event.target.id === 'payoutDetailModal') {
        closePayoutModal();
      }
    }

    function toggleSign(staffId) {
      const btn = document.querySelector(`.btn-sign[data-staff-id="${staffId}"]`);
      if (btn.textContent === '+') {
        btn.textContent = '-';
        btn.classList.remove('positive');
        btn.classList.add('negative');
      } else {
        btn.textContent = '+';
        btn.classList.remove('negative');
        btn.classList.add('positive');
      }
    }

    function formatCurrency(amount) {
      return new Intl.NumberFormat('ja-JP', {
        style: 'currency',
        currency: 'JPY'
      }).format(amount || 0);
    }

    /**
     * 日付をMM/DD形式に変換（年は不要）
     */
    function formatDateShort(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr);
      if (isNaN(d.getTime())) return dateStr;
      return (d.getMonth() + 1) + '/' + d.getDate();
    }

    function formatNumber(num) {
      return new Intl.NumberFormat('ja-JP').format(num || 0);
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getStatusLabel(status) {
      const labels = { draft: '下書き', confirmed: '確定', paid: '支払済' };
      return labels[status] || status;
    }

    // ========== 差分リロード用ヘルパー関数 ==========

    /**
     * ステータス変更後の未払一覧をバックグラウンド再取得（条件一致時のみ）
     * @param {string} reason - ログ用
     */
    function scheduleUnpaidRevalidate(reason) {
      const currentEndDate = document.getElementById('endDateFilter')?.value;
      if (!currentEndDate) {
        clearSession();
        return;
      }

      if (currentUnpaidQuery && currentUnpaidQuery.endDate === currentEndDate && !currentUnpaidQuery.staffId) {
        console.log(`[SWR] Status changed (${reason}) - scheduling background revalidate`);
        clearSession();
        setTimeout(() => refreshUnpaidListInBackground(currentEndDate), 500);
        return;
      }

      clearSession();
    }

    /**
     * 未払リストから特定スタッフの行を削除
     * @param {string} staffId - スタッフID
     */
    function removeUnpaidStaffRow(staffId) {
      const row = document.querySelector(`tr[data-staff-id="${staffId}"]`);
      if (row) {
        row.remove();
        updateUnpaidListSummary();
      }
    }

    /**
     * 未払リストのサマリー（対象人数・合計金額）を再計算
     */
    function updateUnpaidListSummary() {
      const rows = document.querySelectorAll('#unpaidSummary tbody tr[data-staff-id]');
      let totalCount = rows.length;
      let totalAmount = 0;

      rows.forEach(row => {
        const amountCell = row.querySelector('td.amount');
        if (amountCell) {
          // 半角¥(U+00A5)と全角￥(U+FFE5)の両方を除去
          const amountText = amountCell.textContent.replace(/[¥￥,]/g, '');
          totalAmount += Number(amountText) || 0;
        }
      });

      // サマリーを更新
      const summaryItems = document.querySelectorAll('#unpaidSummary .summary-item .value');
      if (summaryItems.length >= 2) {
        summaryItems[0].textContent = `${totalCount}名`;
        summaryItems[1].textContent = formatCurrency(totalAmount);
      }

      // 全員支払済の場合
      if (totalCount === 0) {
        const summaryDiv = document.getElementById('unpaidSummary');
        summaryDiv.innerHTML = '<div class="empty-state">未払のスタッフはいません</div>';
        clearSession();
      }
    }

    /**
     * 履歴テーブルの先頭に行を追加
     * @param {Object} payout - 支払データ
     */
    function prependHistoryRow(payout) {
      const container = document.getElementById('historyTable');
      let tbody = container.querySelector('tbody');

      // テーブルがない場合は作成
      if (!tbody) {
        container.innerHTML = `
          <table class="data-table">
            <thead>
              <tr>
                <th style="white-space: nowrap;">スタッフ</th>
                <th style="white-space: nowrap;">期間</th>
                <th style="white-space: nowrap;">支払日</th>
                <th style="white-space: nowrap;">配置数</th>
                <th style="white-space: nowrap;">基本金額</th>
                <th style="white-space: nowrap;">調整額</th>
                <th style="white-space: nowrap;">合計金額</th>
                <th style="white-space: nowrap; width: 200px;">備考</th>
                <th style="white-space: nowrap;">操作</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        `;
        tbody = container.querySelector('tbody');
      }

      // 行を作成
      const baseAmount = (payout.base_amount || 0) + (payout.transport_amount || 0);
      const adjustmentAmount = payout.adjustment_amount || 0;
      const tr = document.createElement('tr');
      tr.style.whiteSpace = 'nowrap';
      tr.dataset.payoutId = payout.payout_id;
      tr.innerHTML = `
        <td>${payout.target_name || ''}</td>
        <td style="font-size:12px">${payout.period_start || '-'} ~ ${payout.period_end || '-'}</td>
        <td>${payout.paid_date || '-'}</td>
        <td>${payout.assignment_count}件</td>
        <td class="amount">${formatCurrency(baseAmount)}</td>
        <td class="amount" style="color: ${adjustmentAmount !== 0 ? (adjustmentAmount > 0 ? 'var(--color-success)' : 'var(--color-danger)') : 'inherit'}">${adjustmentAmount !== 0 ? formatCurrency(Math.abs(adjustmentAmount)).replace('¥', '') : '-'}</td>
        <td class="amount">${formatCurrency(payout.total_amount)}</td>
        <td style="white-space: normal; max-width: 200px;">${payout.notes || ''}</td>
        <td>
          <button class="btn btn-danger" onclick="undoPayoutConfirm('${payout.payout_id}', '${payout.updated_at}', '${payout.target_name}')">取消</button>
        </td>
      `;

      // 先頭に挿入
      tbody.insertBefore(tr, tbody.firstChild);

      // Update cache
      updateHistoryCache(payouts => [payout, ...payouts]);
    }

    /**
     * 履歴テーブルから特定の行を削除
     * @param {string} payoutId - 支払ID
     */
    function removeHistoryRow(payoutId) {
      const row = document.querySelector(`tr[data-payout-id="${payoutId}"]`);
      if (row) {
        row.remove();
      }

      // テーブルが空になった場合
      const tbody = document.querySelector('#historyTable tbody');
      if (tbody && tbody.children.length === 0) {
        document.getElementById('historyTable').innerHTML =
          '<div class="empty-state">支払履歴がありません</div>';
      }

      // Update cache
      updateHistoryCache(payouts => payouts.filter(p => p.payout_id !== payoutId));
    }

    /**
     * 単一スタッフの未払サマリーをクリア
     */
    function clearSingleUnpaidSummary() {
      const summaryDiv = document.getElementById('unpaidSummary');
      summaryDiv.innerHTML = '<div class="empty-state">未払の配置はありません</div>';
      currentUnpaid = null;
      clearSession();
    }

    /**
     * 未払行を確認済み行に更新
     * @param {string} staffId - スタッフID
     * @param {Object} payout - 確認済みの支払データ
     */
    function updateRowToConfirmed(staffId, payout) {
      const row = document.querySelector(`tr[data-staff-id="${staffId}"][data-status="unpaid"]`);
      if (!row) return;

      const confirmedRow = {
        staffId: payout.staff_id,
        staffName: payout.target_name,
        unpaidCount: payout.assignment_count,
        periodStart: payout.period_start,
        periodEnd: payout.period_end,
        estimatedAmount: payout.total_amount,
        adjustmentAmount: payout.adjustment_amount || 0,
        notes: payout.notes || '',
        payoutId: payout.payout_id,
        updatedAt: payout.updated_at,
        status: 'confirmed',
        rowId: `confirmed-${payout.payout_id}`
      };

      const newRowHtml = renderConfirmedRow(confirmedRow);
      row.outerHTML = newRowHtml;

      // チェック状態を維持（連続操作を可能にする）
      const newRow = document.querySelector(`tr[data-payout-id="${payout.payout_id}"]`);
      if (newRow) {
        const checkbox = newRow.querySelector('.payout-check');
        if (checkbox) checkbox.checked = true;
      }

      updatePayoutSummary();
    }

    /**
     * 確認済み行を削除
     * @param {string} payoutId - 支払ID
     */
    function removeConfirmedRow(payoutId) {
      const row = document.querySelector(`tr[data-payout-id="${payoutId}"]`);
      if (row) {
        row.remove();
        updatePayoutSummary();
      }
    }

    /**
     * サマリー（未払/確認済み/合計金額）を再計算
     */
    function updatePayoutSummary() {
      const unpaidRows = document.querySelectorAll('#payoutTable tbody tr[data-status="unpaid"]');
      const confirmedRows = document.querySelectorAll('#payoutTable tbody tr[data-status="confirmed"]');

      let unpaidTotal = 0;
      let confirmedTotal = 0;

      unpaidRows.forEach(row => {
        const amountCell = row.querySelector('td.amount');
        if (amountCell) {
          const amountText = amountCell.textContent.replace(/[¥￥,]/g, '');
          unpaidTotal += Number(amountText) || 0;
        }
      });

      confirmedRows.forEach(row => {
        const amountCell = row.querySelector('td.amount');
        if (amountCell) {
          const amountText = amountCell.textContent.replace(/[¥￥,]/g, '');
          confirmedTotal += Number(amountText) || 0;
        }
      });

      // サマリーを更新
      const summaryItems = document.querySelectorAll('#unpaidSummary .summary-item .value');
      if (summaryItems.length >= 3) {
        summaryItems[0].textContent = `${unpaidRows.length}名`;
        summaryItems[1].textContent = `${confirmedRows.length}名`;
        summaryItems[2].textContent = formatCurrency(unpaidTotal + confirmedTotal);
      }

      // 全員処理済みの場合
      if (unpaidRows.length === 0 && confirmedRows.length === 0) {
        const summaryDiv = document.getElementById('unpaidSummary');
        summaryDiv.innerHTML = '<div class="empty-state">対象のスタッフはいません</div>';
        clearSession();
      }
    }

    function showToast(type, message) {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // ========== Bulk Action Bar ==========
    function getSelectedCounts() {
      const unpaidCount = document.querySelectorAll('.staff-check[data-status="unpaid"]:checked').length;
      const confirmedCount = document.querySelectorAll('.payout-check[data-status="confirmed"]:checked').length;
      return { unpaidCount, confirmedCount };
    }

    function updateBulkActionBar() {
      const { unpaidCount, confirmedCount } = getSelectedCounts();
      const bar = document.getElementById('bulkActionBar');
      const countSpan = document.getElementById('selectedCount');
      const statusSelect = document.getElementById('bulkStatusSelect');
      const totalSelected = unpaidCount + confirmedCount;

      if (bar) {
        bar.classList.toggle('visible', totalSelected > 0);
      }

      if (countSpan) {
        countSpan.textContent = totalSelected;
      }

      // 全選択チェックボックスの状態を同期
      const allCheckboxes = document.querySelectorAll('.staff-check, .payout-check');
      const checkedCount = document.querySelectorAll('.staff-check:checked, .payout-check:checked').length;
      const isAllSelected = allCheckboxes.length > 0 && checkedCount === allCheckboxes.length;
      const selectAll = document.getElementById('selectAll');
      const bulkSelectAll = document.getElementById('bulkSelectAll');
      if (selectAll) selectAll.checked = isAllSelected;
      if (bulkSelectAll) bulkSelectAll.checked = isAllSelected;

      // ステータスに応じて選択可能なオプションを調整
      if (statusSelect) {
        const confirmedOption = statusSelect.querySelector('option[value="confirmed"]');
        const paidOption = statusSelect.querySelector('option[value="paid"]');
        const unpaidOption = statusSelect.querySelector('option[value="unpaid"]');

        // 未払選択時のみ「確認済みにする」を有効化
        if (confirmedOption) confirmedOption.disabled = unpaidCount === 0;
        // 確認済み選択時のみ「支払済にする」を有効化
        if (paidOption) paidOption.disabled = confirmedCount === 0;
        // 確認済み選択時のみ「未払に戻す」を有効化
        if (unpaidOption) unpaidOption.disabled = confirmedCount === 0;
      }
    }

    function updateFab() {

    function executeBulkStatusChange() {
      const statusSelect = document.getElementById('bulkStatusSelect');
      const selectedStatus = statusSelect?.value;

      if (!selectedStatus) {
        showToast('error', 'ステータスを選択してください');
        return;
      }

      switch (selectedStatus) {
        case 'confirmed':
          bulkConfirm();
          break;
        case 'paid':
          bulkPayConfirmed();
          break;
        case 'unpaid':
          bulkUndoConfirm();
          break;
        default:
          showToast('error', '不明なステータスです');
      }

      // 選択をリセット
      statusSelect.value = '';
    }

    function clearSelection() {
      document.querySelectorAll('.staff-check:checked, .payout-check:checked').forEach(cb => {
        cb.checked = false;
      });
      const selectAll = document.getElementById('selectAll');
      if (selectAll) selectAll.checked = false;
      updateBulkActionBar();

    // 一括で確認済みを取り消し
    function bulkUndoConfirm() {
      const checkboxes = document.querySelectorAll('.payout-check[data-status="confirmed"]:checked');
      if (checkboxes.length === 0) {
        showToast('error', '確認済みのスタッフを選択してください');
        return;
      }

      const rows = Array.from(checkboxes).map(cb => {
        const row = cb.closest('tr');
        return {
          payoutId: row.dataset.payoutId,
          updatedAt: row.dataset.updatedAt,
          staffName: row.querySelector('td:nth-child(2)')?.textContent || ''
        };
      });

      showConfirmModal(
        '一括取消',
        `<p><strong>${rows.length}件</strong> の確認を取り消しますか？</p>
         <p>取り消すと未払状態に戻ります。</p>`,
        '取り消す',
        'btn-danger',
        () => {
          // 順番に処理（並列だとAPIリミットの問題があるため）
          let processed = 0;
          showLoading(`${rows.length}件を取消中...`);

          function processNext() {
            if (processed >= rows.length) {
              hideLoading();
              showToast('success', `${rows.length}件を取り消しました`);
              clearSession();
              updateBulkActionBar();
              return;
            }

            const { payoutId, updatedAt } = rows[processed];
            google.script.run
              .withSuccessHandler(result => {
                if (result.ok) {
                  const undone = result.data?.undone;
                  if (undone) {
                    convertConfirmedToUnpaid(payoutId, undone);
                  } else {
                    removeConfirmedRow(payoutId);
                  }
                }
                processed++;
                processNext();
              })
              .withFailureHandler(() => {
                processed++;
                processNext();
              })
              .undoPayout(payoutId, updatedAt);
          }

          processNext();
        }
      );
    }

    document.addEventListener('change', (e) => {

      }
    });

    // ========== Export Functions ==========

    function formatDate(date) {
      if (!date) return '-';
      // 文字列の場合はそのまま返す（YYYY-MM-DD形式を想定）
      if (typeof date === 'string') {
        return date.substring(0, 10);
      }
      // Dateオブジェクトの場合
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function showExportModal() {
      // デフォルト: 今月の1日〜今日
      const today = new Date();
      const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);

      document.getElementById('exportFromDate').value = formatDate(firstDay);
      document.getElementById('exportToDate').value = formatDate(today);
      document.getElementById('exportModal').classList.add('active');
    }

    function closeExportModal() {
      document.getElementById('exportModal').classList.remove('active');
    }

    function handleExportModalOverlayClick(event) {
      if (event.target.id === 'exportModal') closeExportModal();
    }

    function handleFileOverwriteModalOverlayClick(event) {
      if (event.target.id === 'fileOverwriteModal') closeFileOverwriteModal();
    }

    // エクスポート待機状態を保持
    let pendingPayoutExport = null;

    function executeExport(options = {}) {
      const fromDate = document.getElementById('exportFromDate').value;
      const toDate = document.getElementById('exportToDate').value;

      if (!fromDate || !toDate) {
        showToast('error', '日付を指定してください');
        return;
      }

      // actionが指定されていれば直接実行（モーダルからの呼び出し時はタブを新規作成）
      if (options.action) {
        doExport(fromDate, toDate, options, null);
        return;
      }

      // ポップアップブロック回避: ユーザーアクション時に先にタブを開く
      const preOpenedTab = window.open('about:blank', '_blank');

      closeExportModal();

      // まず同名ファイルチェック
      showLoading('ファイル確認中...');
      google.script.run
        .withSuccessHandler(result => {
          hideLoading();
          if (result.ok && result.data.exists) {
            // 確認モーダル表示（先に開いたタブは閉じる）
            if (preOpenedTab) preOpenedTab.close();
            pendingPayoutExport = { fromDate, toDate, existingFile: result.data.existingFile };
            showFileOverwriteModal(result.data.existingFile);
          } else {
            // 直接エクスポート実行（先に開いたタブを使用）
            doExport(fromDate, toDate, {}, preOpenedTab);
          }
        })
        .withFailureHandler(err => {
          hideLoading();
          // チェックに失敗しても続行（エクスポート実行）
          console.warn('File check failed, proceeding with export:', err);
          doExport(fromDate, toDate, {}, preOpenedTab);
        })
        .checkPayoutExportFile(fromDate, toDate);
    }

    function doExport(fromDate, toDate, options, preOpenedTab) {
      // 先に開いたタブがあればそれを使用、なければ新規作成（モーダルからの呼び出し時）
      const newTab = preOpenedTab || window.open('about:blank', '_blank');

      // 新しいタブにローディングメッセージを表示
      if (newTab) {
        newTab.document.write(`
          <!DOCTYPE html>
          <html>
          <head>
            <title>ファイル生成中...</title>
            <style>
              body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100vh;
                margin: 0;
                background: #f5f5f5;
                color: #333;
              }
              .spinner {
                width: 40px;
                height: 40px;
                border: 4px solid #e0e0e0;
                border-top-color: #1a73e8;
                border-radius: 50%;
                animation: spin 1s linear infinite;
                margin-bottom: 20px;
              }
              @keyframes spin {
                to { transform: rotate(360deg); }
              }
              .message { font-size: 16px; color: #666; }
            </style>
          </head>
          <body>
            <div class="spinner"></div>
            <div class="message">振込集計ファイルを生成しています...</div>
          </body>
          </html>
        `);
        newTab.document.close();
      }
      showLoading('エクスポート中...');

      google.script.run
        .withSuccessHandler(result => {
          hideLoading();
          if (result.ok) {
            if (result.data.url && newTab) {
              // 正常ケース: 新しいタブでURLを開く
              newTab.location.href = result.data.url;
              showToast('success', `エクスポート完了（${result.data.recordCount}件）`);
            } else if (result.data.url && !newTab) {
              // ポップアップブロック時: リンクを表示してクリックで開けるようにする
              showToast('success', `エクスポート完了（${result.data.recordCount}件）。ポップアップがブロックされた可能性があります。`);
              showFileLink(result.data.url, '振込集計');
            } else {
              if (newTab) newTab.close();
              showToast('success', 'エクスポート完了');
            }
          } else {
            if (newTab) newTab.close();
            showToast('error', result.error || 'エクスポートに失敗しました');
          }
        })
        .withFailureHandler(err => {
          hideLoading();
          if (newTab) newTab.close();
          showToast('error', err.message);
        })
        .exportPayouts(fromDate, toDate, options);
    }

    // ポップアップブロック時のフォールバック: ファイルリンクを表示
    function showFileLink(url, label) {
      // 既存のリンクボックスがあれば削除

    // ========== Subcontractor Payout Functions (P2-8) ==========

    function loadSubcontractorList() {
      // キャッシュを確認
      const cached = PageCache.get('payouts_sub_list');
      if (cached) {
        subcontractorList = cached.data;
        renderSubcontractorFilter(subcontractorList);
        loadSubcontractorHistory();
        restoreSubFromSession();

        // TTL超過ならバックグラウンド更新
        if (cached.age > PageCache.MASTER_TTL) {
          refreshSubcontractorListInBackground();
        }
        return;
      }

      google.script.run
        .withSuccessHandler(function(response) {
          if (response.ok && response.data.subcontractors) {
            subcontractorList = response.data.subcontractors;
            PageCache.set('payouts_sub_list', subcontractorList);
            renderSubcontractorFilter(subcontractorList);
            loadSubcontractorHistory();
            // 外注リストがロードされた後にキャッシュから復元
            restoreSubFromSession();
          }
        })
        .withFailureHandler(function(error) {
          console.error('loadSubcontractorList error:', error);
        })
        .getSubcontractorsForPayouts();
    }

    // 外注先マスターをバックグラウンドで更新
    function refreshSubcontractorListInBackground() {
      google.script.run
        .withSuccessHandler(function(response) {
          if (response.ok && response.data.subcontractors) {
            const newList = response.data.subcontractors;
            PageCache.set('payouts_sub_list', newList);
            // 差分があればUIを更新
            if (JSON.stringify(subcontractorList) !== JSON.stringify(newList)) {
              subcontractorList = newList;
              renderSubcontractorFilter(subcontractorList);
            }
          }
        })
        .withFailureHandler(function() {}) // サイレント
        .getSubcontractorsForPayouts();
    }

    /**
     * 外注タブのデータをキャッシュから復元
     */
    function restoreSubFromSession() {
      const endDate = document.getElementById('subEndDateFilter').value;
      if (!endDate) return;

      const cached = loadSubUnpaidFromSession(endDate);
      if (cached) {
        renderSubcontractorUnpaidList(cached);
      }
    }

    function renderSubcontractorFilter(list) {
      const select = document.getElementById('subcontractorFilter');
      select.innerHTML = '<option value="">全て</option>';
      list.forEach(function(sub) {
        const option = document.createElement('option');
        option.value = sub.subcontractor_id;
        option.textContent = sub.company_name;
        select.appendChild(option);
      });

    // 末締集計: 当月末日を設定して集計
    function loadMonthEndSummary() {
      const today = new Date();
      // 当月末日を計算（翌月1日の前日）
      const lastDay = new Date(today.getFullYear(), today.getMonth() + 1, 0);
      const lastDayStr = lastDay.toISOString().split('T')[0];

      // 終了日を当月末日に設定
      document.getElementById('subEndDateFilter').value = lastDayStr;
      // 外注先フィルタをクリア（全外注先を集計）
      document.getElementById('subcontractorFilter').value = '';

      // キャッシュクリアして集計実行
      clearSubUnpaidSession();
      loadSubcontractorUnpaidList(true);
    }

    function loadSubcontractorUnpaidList(forceRefresh = false) {
      const subId = document.getElementById('subcontractorFilter').value;
      const endDate = document.getElementById('subEndDateFilter').value;

      if (!endDate) {
        showToast('終了日を指定してください', 'error');
        return;
      }

      // 現在のクエリを保存（バックグラウンド更新時に使用）
      currentSubUnpaidQuery = { subId, endDate };

      // Stale-While-Revalidate: キャッシュがあれば即座に表示
      if (!forceRefresh && !subId) {
        const cached = loadSubUnpaidFromSession(endDate);
        if (cached) {
          renderSubcontractorUnpaidList(cached);

          // TTL超過ならバックグラウンド更新
          if (isSubUnpaidSessionStale(endDate)) {
            refreshSubUnpaidInBackground(endDate);
          }
          return;
        }
      }

      if (subId) {
        const cachedPreview = !forceRefresh ? getCachedSubcontractorPreview(subId, endDate) : null;
        let showedLoading = false;
        if (cachedPreview) {
          renderSubcontractorUnpaidDetail(cachedPreview, { preview: true });
        } else {
          showLoading('集計中...');
          showedLoading = true;
        }
        const requestedSubId = subId;
        // 特定の外注先の詳細を取得
        google.script.run
          .withSuccessHandler(function(response) {
            if (showedLoading) hideLoading();
            if (document.getElementById('subcontractorFilter').value !== requestedSubId) return;
            if (response.ok) {
              currentSubUnpaid = response.data;
              renderSubcontractorUnpaidDetail(response.data, { preview: false });
            } else {
              showToast(response.error?.message || '取得に失敗しました', 'error');
            }
          })
          .withFailureHandler(function(error) {
            if (showedLoading) hideLoading();
            if (document.getElementById('subcontractorFilter').value !== requestedSubId) return;
            showToast('エラー: ' + error.message, 'error');
          })
          .getUnpaidSummaryForSubcontractor(subId, endDate);
      } else {
        showLoading('集計中...');
        // 全外注先の未払一覧を取得
        google.script.run
          .withSuccessHandler(function(response) {
            hideLoading();
            if (response.ok) {
              renderSubcontractorUnpaidList(response.data);
              // キャッシュに保存
              saveSubUnpaidToSession(response.data, endDate);
            } else {
              showToast(response.error?.message || '取得に失敗しました', 'error');
            }
          })
          .withFailureHandler(function(error) {
            hideLoading();
            showToast('エラー: ' + error.message, 'error');
          })
          .getUnpaidSubcontractorList(endDate);
      }
    }

    // 外注費未払リストをバックグラウンドで更新
    function refreshSubUnpaidInBackground(endDate) {
      google.script.run
        .withSuccessHandler(function(response) {
          if (response.ok) {
            const newData = response.data;

            // 現在の検索条件と一致する場合のみ更新
            if (currentSubUnpaidQuery && currentSubUnpaidQuery.endDate === endDate && !currentSubUnpaidQuery.subId) {
              const oldData = loadSubUnpaidFromSession(endDate);

              // キャッシュを更新
              saveSubUnpaidToSession(newData, endDate);

              // 差分があればUIを更新
              if (!oldData || JSON.stringify(oldData) !== JSON.stringify(newData)) {
                renderSubcontractorUnpaidList(newData);
                showToast('データを更新しました', 'info');
              }
            }
          }
        })
        .withFailureHandler(function() {}) // サイレント
        .getUnpaidSubcontractorList(endDate);
    }

          </tbody>
        </table>
        <div style="margin-top: var(--spacing-md); text-align: right;">
          <button class="btn btn-success" onclick="markCurrentSubcontractorPaid()" ${payDisabledAttr}>支払済にする</button>
        </div>
      `;

      container.innerHTML = html;
    }

    function showSubcontractorDetail(subId) {
      document.getElementById('subcontractorFilter').value = subId;
      loadSubcontractorUnpaidList();
    }

    // ボタンのdata属性から値を取得して支払済処理を呼び出す（XSS対策）
    function markSubcontractorPaidFromButton(button) {
      const subId = button.dataset.subId;
      const companyName = button.dataset.companyName;
      const amount = parseFloat(button.dataset.amount);
      markSubcontractorPaid(subId, companyName, amount);
    }

    function markSubcontractorPaid(subId, companyName, amount) {
      const endDate = document.getElementById('subEndDateFilter').value;

      showConfirmModal(
        '外注費支払確認',
        `<p><strong>${escapeHtml(companyName)}</strong> を支払済にします。</p>
         <p>締め日: ${endDate}</p>
         <p>金額: <strong>¥${formatNumber(amount)}</strong></p>`,
        '支払済にする',
        'btn-success',
        () => {
          showLoading('処理中...');
          google.script.run
            .withSuccessHandler(function(response) {
              hideLoading();
              if (response.ok) {
                showToast('success', '支払を記録しました');
                clearSubUnpaidSession(); // キャッシュクリア
                loadSubcontractorUnpaidList(true); // 強制リフレッシュ
                loadSubcontractorHistory();
              } else {
                showToast('error', response.error?.message || '処理に失敗しました');
              }
            })
            .withFailureHandler(function(error) {
              hideLoading();
              showToast('error', 'エラー: ' + error.message);
            })
            .markSubcontractorPayoutAsPaid(subId, endDate, {});
        }
      );
    }

    function markCurrentSubcontractorPaid() {
      if (!currentSubUnpaid) return;

      const subId = document.getElementById('subcontractorFilter').value;
      const endDate = document.getElementById('subEndDateFilter').value;
      const companyName = currentSubUnpaid.companyName;
      const amount = currentSubUnpaid.totalAmount;
      const assignmentCount = currentSubUnpaid.assignmentCount;

      showConfirmModal(
        '外注費支払確認',
        `<p><strong>${escapeHtml(companyName)}</strong> を支払済にします。</p>
         <p>配置数: ${assignmentCount}件</p>
         <p>締め日: ${endDate}</p>
         <p>金額: <strong>¥${formatNumber(amount)}</strong></p>`,
        '支払済にする',
        'btn-success',
        () => {
          showLoading('処理中...');
          google.script.run
            .withSuccessHandler(function(response) {
              hideLoading();
              if (response.ok) {
                showToast('success', '支払を記録しました');
                currentSubUnpaid = null;
                document.getElementById('subUnpaidSummary').innerHTML = '外注先を選択して「集計」をクリックしてください';
                clearSubUnpaidSession(); // キャッシュクリア
                loadSubcontractorUnpaidList(true); // 強制リフレッシュ
                loadSubcontractorHistory();
              } else {
                showToast('error', response.error?.message || '処理に失敗しました');
              }
            })
            .withFailureHandler(function(error) {
              hideLoading();
              showToast('error', 'エラー: ' + error.message);
            })
            .markSubcontractorPayoutAsPaid(subId, endDate, {});
        }
      );
    }

    function undoSubcontractorPayoutConfirm(payoutId, updatedAt, companyName) {
      showConfirmModal(
        '外注費支払取消確認',
        `<p><strong>${escapeHtml(companyName)}</strong> の支払を取り消しますか？</p>
         <p>取り消すと未払状態に戻ります。</p>`,
        '取り消す',
        'btn-danger',
        () => {
          showLoading('取消処理中...');
          google.script.run
            .withSuccessHandler(result => {
              hideLoading();
              if (result.ok) {
                showToast('success', '支払を取り消しました');
                // 差分リロード: 履歴から行を削除
                removeSubcontractorHistoryRow(payoutId);
                // キャッシュクリアして未払一覧を再読込
                clearSubUnpaidSession();
                loadSubcontractorUnpaidList(true);
              } else {
                showToast('error', result.error?.message || '取消に失敗しました');
              }
            })
            .withFailureHandler(err => {
              hideLoading();
              showToast('error', err.message);
            })
            .undoPayout(payoutId, updatedAt);
        }
      );
    }

    function removeSubcontractorHistoryRow(payoutId) {
      const row = document.querySelector(`#subHistoryTable tr[data-payout-id="${payoutId}"]`);
      if (row) {
        row.remove();
      }

      // テーブルが空になった場合
      const tbody = document.querySelector('#subHistoryTable tbody');
      if (tbody && tbody.children.length === 0) {
        document.getElementById('subHistoryTable').innerHTML =
          '<div class="empty-state">支払履歴はありません</div>';
      }
    }

    function loadSubcontractorHistory() {
      const container = document.getElementById('subHistoryTable');

      // Stale-While-Revalidate: キャッシュがあれば即座に表示
      const cached = PageCache.get('payouts_sub_history');
      if (cached) {
        renderSubcontractorHistory(cached.data);

        // TTL超過ならバックグラウンド更新
        if (cached.age > PageCache.DEFAULT_TTL) {
          refreshSubHistoryInBackground();
        }
        return;
      }

      container.innerHTML = '<div class="loading">読み込み中...</div>';

      google.script.run
        .withSuccessHandler(function(response) {
          if (response.ok) {
            PageCache.set('payouts_sub_history', response.data.payouts);
            renderSubcontractorHistory(response.data.payouts);
          } else {
            container.innerHTML = '<div class="empty-state">履歴の取得に失敗しました</div>';
          }
        })
        .withFailureHandler(function(error) {
          container.innerHTML = '<div class="empty-state">エラー: ' + error.message + '</div>';
        })
        .searchSubcontractorPayouts({ sort_order: 'desc' });
    }

    // 外注履歴をバックグラウンドで更新
    function refreshSubHistoryInBackground() {
      google.script.run
        .withSuccessHandler(function(response) {
          if (response.ok) {
            const newPayouts = response.data.payouts;
            const oldPayouts = PageCache.get('payouts_sub_history')?.data;

            PageCache.set('payouts_sub_history', newPayouts);

            // 差分があればUIを更新
            if (!oldPayouts || JSON.stringify(oldPayouts) !== JSON.stringify(newPayouts)) {
              renderSubcontractorHistory(newPayouts);
            }
          }
        })
        .withFailureHandler(function() {}) // サイレント
        .searchSubcontractorPayouts({ sort_order: 'desc' });
    }

    function renderSubcontractorHistory(payouts) {
      const container = document.getElementById('subHistoryTable');

      if (!payouts || payouts.length === 0) {
        container.innerHTML = '<div class="empty-state">支払履歴はありません</div>';
        return;
      }

      let html = `
        <table class="data-table">
          <thead>
            <tr>
              <th>外注先</th>
              <th>期間</th>
              <th>件数</th>
              <th style="text-align: right;">金額</th>
              <th>状態</th>
              <th>支払日</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
      `;

      payouts.forEach(function(p) {
        const statusClass = p.status === 'paid' ? 'paid' : (p.status === 'confirmed' ? 'confirmed' : 'draft');
        const statusLabel = p.status === 'paid' ? '支払済' : (p.status === 'confirmed' ? '確認済' : '下書き');

        html += `
          <tr data-payout-id="${p.payout_id}">
            <td>${escapeHtml(p.target_name || '-')}</td>
            <td>${formatDate(p.period_start)} 〜 ${formatDate(p.period_end)}</td>
            <td>${p.assignment_count}件</td>
            <td class="amount">¥${formatNumber(p.total_amount)}</td>
            <td><span class="status-badge ${statusClass}">${statusLabel}</span></td>
            <td>${p.paid_date ? formatDate(p.paid_date) : '-'}</td>
            <td>
              <button class="btn btn-danger btn-undo-sub-payout"
                data-payout-id="${escapeHtml(p.payout_id)}"
                data-updated-at="${escapeHtml(p.updated_at)}"
                data-target-name="${escapeHtml(p.target_name || '')}">取消</button>
            </td>
          </tr>
        `;
      });

      html += '</tbody></table>';
      container.innerHTML = html;
    }
  </script>

</body>
</html>
