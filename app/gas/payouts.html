<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>支払管理</title>
  <style>
    :root {
      --color-primary: #172D90;
      --color-secondary: #139BC4;
      --color-accent: #135DA7;
      --color-success: #28A745;
      --color-warning: #FFC107;
      --color-danger: #DC3545;
      --bg-main: #FFFFFF;
      --bg-card: #F7FAFC;
      --bg-hover: #EEF2F7;
      --text-primary: #1F2937;
      --text-muted: #6B7280;
      --border-color: #E5E7EB;
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 16px;
      --spacing-lg: 24px;
      --radius-sm: 4px;
      --radius-md: 8px;
      --shadow-card: 0 2px 8px rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-main);
      color: var(--text-primary);
      line-height: 1.5;
    }

    <?!= include('nav_styles'); ?>

    /* Toolbar */
    .toolbar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      padding: var(--spacing-md) var(--spacing-lg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--spacing-md);
      flex-wrap: wrap;
    }

    .filter-group {
      display: flex;
      gap: var(--spacing-sm);
      align-items: center;
    }

    .filter-group label {
      font-size: 13px;
      color: var(--text-muted);
    }

    .filter-group select,
    .filter-group input {
      padding: var(--spacing-xs) var(--spacing-sm);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      font-size: 13px;
      background: white;
    }

    .toolbar-actions {
      display: flex;
      gap: var(--spacing-sm);
    }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-xs);
      padding: var(--spacing-sm) var(--spacing-md);
      border: none;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-primary { background: var(--color-primary); color: white; }
    .btn-primary:hover { background: var(--color-accent); }
    .btn-secondary { background: var(--bg-card); color: var(--text-primary); border: 1px solid var(--border-color); }
    .btn-secondary:hover { background: var(--bg-hover); }
    .btn-success { background: var(--color-success); color: white; }
    .btn-danger { background: var(--color-danger); color: white; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Main Content */
    .main-content { padding: var(--spacing-lg); }

    /* Summary Card */
    .summary-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: var(--spacing-lg);
      margin-bottom: var(--spacing-lg);
    }

    .summary-card h3 {
      font-size: 16px;
      margin-bottom: var(--spacing-md);
      color: var(--color-primary);
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: var(--spacing-md);
    }

    .summary-item {
      text-align: center;
      padding: var(--spacing-md);
      background: white;
      border-radius: var(--radius-sm);
    }

    .summary-item .label {
      font-size: 12px;
      color: var(--text-muted);
    }

    .summary-item .value {
      font-size: 24px;
      font-weight: bold;
      color: var(--text-primary);
    }

    .summary-item .value.amount {
      color: var(--color-success);
    }

    /* Table */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }

    .data-table th,
    .data-table td {
      padding: var(--spacing-sm) var(--spacing-md);
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }

    .data-table th {
      background: var(--bg-card);
      font-weight: 600;
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .data-table tr:hover {
      background: var(--bg-hover);
    }

    .data-table td.amount {
      text-align: right;
      font-family: 'Menlo', monospace;
    }

    /* Status Badge */
    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 500;
    }

    .status-badge.draft { background: #E5E7EB; color: #374151; }
    .status-badge.confirmed { background: #DBEAFE; color: #1D4ED8; }
    .status-badge.paid { background: #D1FAE5; color: #047857; }

    /* Loading */
    .loading {
      text-align: center;
      padding: var(--spacing-lg);
      color: var(--text-muted);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 48px;
      color: var(--text-muted);
    }

    /* Section Header */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: var(--spacing-md);
    }

    .section-header h2 {
      font-size: 18px;
      color: var(--text-primary);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      padding: var(--spacing-md);
      border-radius: var(--radius-sm);
      color: white;
      font-size: 14px;
      z-index: 1000;
      animation: slideIn 0.3s ease;
    }

    .toast.success { background: var(--color-success); }
    .toast.error { background: var(--color-danger); }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <?!= include('nav_bar'); ?>

  <div class="toolbar">
    <div class="filter-group">
      <label>スタッフ:</label>
      <select id="staffFilter">
        <option value="">全て</option>
      </select>

      <label>対象日:</label>
      <input type="date" id="endDateFilter" />

      <button class="btn btn-secondary" onclick="loadUnpaidList()">計算</button>
    </div>

    <div class="toolbar-actions">
      <button class="btn btn-primary" onclick="showBulkGenerateModal()">一括支払い生成</button>
    </div>
  </div>

  <div class="main-content">
    <!-- 未払いサマリー -->
    <div id="unpaidSection" class="summary-card">
      <h3>未払いサマリー</h3>
      <div id="unpaidSummary" class="loading">
        スタッフを選択して「計算」をクリックしてください
      </div>
    </div>

    <!-- 下書き管理 -->
    <div id="draftSection" class="summary-card" style="display: none;">
      <h3>下書き（未確定）</h3>
      <div id="draftList">
        <div class="loading">読み込み中...</div>
      </div>
    </div>

    <!-- 振込履歴 -->
    <div class="section-header">
      <h2>振込履歴</h2>
      <div class="filter-group">
        <label>ステータス:</label>
        <select id="statusFilter" onchange="loadHistory()">
          <option value="">確定・支払済</option>
          <option value="confirmed">確定</option>
          <option value="paid">支払済</option>
        </select>
      </div>
    </div>

    <div id="historyTable">
      <div class="loading">読み込み中...</div>
    </div>
  </div>

  <script>
    // State
    let staffList = [];
    let currentUnpaid = null;

    // Initialize
    document.addEventListener('DOMContentLoaded', init);

    function init() {
      // Set default date to today
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('endDateFilter').value = today;

      loadStaffList();
      loadDrafts();
      loadHistory();
    }

    // Load staff list for filter
    function loadStaffList() {
      google.script.run
        .withSuccessHandler(result => {
          if (result.ok) {
            staffList = result.data.staff;
            const select = document.getElementById('staffFilter');
            staffList.forEach(s => {
              const option = document.createElement('option');
              option.value = s.staff_id;
              option.textContent = s.name;
              select.appendChild(option);
            });
          }
        })
        .withFailureHandler(err => showToast('error', err.message))
        .getStaffForPayouts();
    }

    // Load unpaid summary
    function loadUnpaidList() {
      const staffId = document.getElementById('staffFilter').value;
      const endDate = document.getElementById('endDateFilter').value;

      if (!endDate) {
        showToast('error', '対象日を選択してください');
        return;
      }

      const summaryDiv = document.getElementById('unpaidSummary');
      summaryDiv.innerHTML = '<div class="loading">計算中...</div>';

      if (staffId) {
        // 特定スタッフの未払い
        google.script.run
          .withSuccessHandler(result => {
            if (result.ok) {
              renderUnpaidSummary(result.data);
            } else {
              summaryDiv.innerHTML = `<div class="empty-state">${result.error}</div>`;
            }
          })
          .withFailureHandler(err => {
            summaryDiv.innerHTML = `<div class="empty-state">エラー: ${err.message}</div>`;
          })
          .getUnpaidSummary(staffId, endDate);
      } else {
        // 全スタッフの未払い一覧
        google.script.run
          .withSuccessHandler(result => {
            if (result.ok) {
              renderUnpaidStaffList(result.data);
            } else {
              summaryDiv.innerHTML = `<div class="empty-state">${result.error}</div>`;
            }
          })
          .withFailureHandler(err => {
            summaryDiv.innerHTML = `<div class="empty-state">エラー: ${err.message}</div>`;
          })
          .getUnpaidStaffList(endDate);
      }
    }

    // Render unpaid summary for single staff
    function renderUnpaidSummary(data) {
      currentUnpaid = data;
      const summaryDiv = document.getElementById('unpaidSummary');

      if (data.assignmentCount === 0) {
        summaryDiv.innerHTML = '<div class="empty-state">未払いの配置はありません</div>';
        return;
      }

      summaryDiv.innerHTML = `
        <div class="summary-grid">
          <div class="summary-item">
            <div class="label">スタッフ</div>
            <div class="value">${data.staffName || '-'}</div>
          </div>
          <div class="summary-item">
            <div class="label">配置数</div>
            <div class="value">${data.assignmentCount}件</div>
          </div>
          <div class="summary-item">
            <div class="label">基本給与</div>
            <div class="value amount">${formatCurrency(data.baseAmount)}</div>
          </div>
          <div class="summary-item">
            <div class="label">交通費</div>
            <div class="value amount">${formatCurrency(data.transportAmount)}</div>
          </div>
          <div class="summary-item">
            <div class="label">合計</div>
            <div class="value amount">${formatCurrency(data.totalAmount)}</div>
          </div>
          <div class="summary-item">
            <div class="label">期間</div>
            <div class="value" style="font-size:14px">${data.periodStart || '-'} ~ ${data.periodEnd}</div>
          </div>
        </div>
        <div style="margin-top: var(--spacing-md); text-align: right;">
          <button class="btn btn-success" onclick="generatePayout()">支払い生成</button>
        </div>
      `;
    }

    // Render unpaid staff list
    function renderUnpaidStaffList(data) {
      const summaryDiv = document.getElementById('unpaidSummary');

      if (data.staffList.length === 0) {
        summaryDiv.innerHTML = '<div class="empty-state">未払いのスタッフはいません</div>';
        return;
      }

      let html = `
        <div class="summary-grid" style="margin-bottom: var(--spacing-md);">
          <div class="summary-item">
            <div class="label">対象スタッフ</div>
            <div class="value">${data.totalCount}名</div>
          </div>
          <div class="summary-item">
            <div class="label">合計金額</div>
            <div class="value amount">${formatCurrency(data.totalAmount)}</div>
          </div>
        </div>
        <table class="data-table">
          <thead>
            <tr>
              <th><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)"></th>
              <th>スタッフ</th>
              <th>配置数</th>
              <th>期間</th>
              <th>推定金額</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
      `;

      data.staffList.forEach(s => {
        html += `
          <tr>
            <td><input type="checkbox" class="staff-check" value="${s.staffId}"></td>
            <td>${s.staffName}</td>
            <td>${s.unpaidCount}件</td>
            <td>${s.periodStart || '-'} ~ ${s.periodEnd}</td>
            <td class="amount">${formatCurrency(s.estimatedAmount)}</td>
            <td>
              <button class="btn btn-secondary" onclick="selectStaff('${s.staffId}')">詳細</button>
            </td>
          </tr>
        `;
      });

      html += `
          </tbody>
        </table>
        <div style="margin-top: var(--spacing-md); text-align: right;">
          <button class="btn btn-success" onclick="bulkGenerate()">選択したスタッフの支払い生成</button>
        </div>
      `;

      summaryDiv.innerHTML = html;
    }

    // Load drafts separately
    function loadDrafts() {
      const query = { status: 'draft', limit: 50 };

      google.script.run
        .withSuccessHandler(result => {
          if (result.ok) {
            renderDrafts(result.data.payouts);
          }
        })
        .withFailureHandler(err => console.error('Draft load error:', err))
        .searchPayouts(query);
    }

    // Render draft list with edit actions
    function renderDrafts(drafts) {
      const section = document.getElementById('draftSection');
      const container = document.getElementById('draftList');

      if (drafts.length === 0) {
        section.style.display = 'none';
        return;
      }

      section.style.display = 'block';

      let html = `
        <table class="data-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>スタッフ</th>
              <th>期間</th>
              <th>配置数</th>
              <th>合計</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody>
      `;

      drafts.forEach(p => {
        html += `
          <tr>
            <td>${p.payout_id}</td>
            <td>${p.target_name}</td>
            <td>${p.period_start || '-'} ~ ${p.period_end || '-'}</td>
            <td>${p.assignment_count}件</td>
            <td class="amount">${formatCurrency(p.total_amount)}</td>
            <td>
              <button class="btn btn-success" onclick="confirmPayout('${p.payout_id}', '${p.updated_at}')">確定</button>
              <button class="btn btn-danger" onclick="deletePayout('${p.payout_id}', '${p.updated_at}')">削除</button>
            </td>
          </tr>
        `;
      });

      html += '</tbody></table>';
      container.innerHTML = html;
    }

    // Load payment history (confirmed and paid only)
    function loadHistory() {
      const status = document.getElementById('statusFilter').value;
      const staffId = document.getElementById('staffFilter').value;

      const query = {};
      // Default to confirmed+paid, or specific status if selected
      if (status) {
        query.status = status;
      } else {
        query.status_in = ['confirmed', 'paid'];
      }
      if (staffId) query.staff_id = staffId;
      query.limit = 50;

      document.getElementById('historyTable').innerHTML = '<div class="loading">読み込み中...</div>';

      google.script.run
        .withSuccessHandler(result => {
          if (result.ok) {
            renderHistory(result.data.payouts);
          } else {
            document.getElementById('historyTable').innerHTML =
              `<div class="empty-state">${result.error}</div>`;
          }
        })
        .withFailureHandler(err => {
          document.getElementById('historyTable').innerHTML =
            `<div class="empty-state">エラー: ${err.message}</div>`;
        })
        .searchPayouts(query);
    }

    // Render history table (read-only, confirmed/paid only)
    function renderHistory(payouts) {
      const container = document.getElementById('historyTable');

      if (payouts.length === 0) {
        container.innerHTML = '<div class="empty-state">履歴がありません</div>';
        return;
      }

      let html = `
        <table class="data-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>スタッフ</th>
              <th>期間</th>
              <th>配置数</th>
              <th>基本給与</th>
              <th>交通費</th>
              <th>合計</th>
              <th>ステータス</th>
              ${payouts.some(p => p.status === 'confirmed') ? '<th>操作</th>' : ''}
            </tr>
          </thead>
          <tbody>
      `;

      const hasConfirmed = payouts.some(p => p.status === 'confirmed');

      payouts.forEach(p => {
        html += `
          <tr>
            <td>${p.payout_id}</td>
            <td>${p.target_name}</td>
            <td>${p.period_start || '-'} ~ ${p.period_end || '-'}</td>
            <td>${p.assignment_count}件</td>
            <td class="amount">${formatCurrency(p.base_amount)}</td>
            <td class="amount">${formatCurrency(p.transport_amount)}</td>
            <td class="amount">${formatCurrency(p.total_amount)}</td>
            <td><span class="status-badge ${p.status}">${getStatusLabel(p.status)}</span></td>
            ${hasConfirmed ? `
              <td>
                ${p.status === 'confirmed' ? `
                  <button class="btn btn-success" onclick="markAsPaid('${p.payout_id}', '${p.updated_at}')">支払済</button>
                ` : ''}
              </td>
            ` : ''}
          </tr>
        `;
      });

      html += '</tbody></table>';
      container.innerHTML = html;
    }

    // Generate payout for selected staff
    function generatePayout() {
      const staffId = document.getElementById('staffFilter').value;
      const endDate = document.getElementById('endDateFilter').value;

      if (!staffId || !currentUnpaid) {
        showToast('error', 'スタッフを選択してください');
        return;
      }

      if (!confirm(`${currentUnpaid.staffName} の支払い (${formatCurrency(currentUnpaid.totalAmount)}) を生成しますか？`)) {
        return;
      }

      google.script.run
        .withSuccessHandler(result => {
          if (result.ok) {
            showToast('success', '支払いを生成しました');
            loadUnpaidList();
            loadDrafts();
          } else {
            showToast('error', result.error);
          }
        })
        .withFailureHandler(err => showToast('error', err.message))
        .generatePayout(staffId, endDate);
    }

    // Bulk generate
    function bulkGenerate() {
      const checkboxes = document.querySelectorAll('.staff-check:checked');
      const staffIds = Array.from(checkboxes).map(cb => cb.value);
      const endDate = document.getElementById('endDateFilter').value;

      if (staffIds.length === 0) {
        showToast('error', 'スタッフを選択してください');
        return;
      }

      if (!confirm(`${staffIds.length}名の支払いを生成しますか？`)) {
        return;
      }

      google.script.run
        .withSuccessHandler(result => {
          if (result.ok) {
            showToast('success', `${result.data.success}件の支払いを生成しました`);
            loadUnpaidList();
            loadDrafts();
          } else {
            showToast('error', result.error);
          }
        })
        .withFailureHandler(err => showToast('error', err.message))
        .bulkGeneratePayouts(staffIds, endDate);
    }

    // Status updates
    function confirmPayout(payoutId, updatedAt) {
      updateStatus(payoutId, 'confirmed', updatedAt);
    }

    function markAsPaid(payoutId, updatedAt) {
      updateStatus(payoutId, 'paid', updatedAt);
    }

    function updateStatus(payoutId, status, updatedAt) {
      const labels = { confirmed: '確定', paid: '支払済' };
      if (!confirm(`ステータスを「${labels[status]}」に変更しますか？`)) {
        return;
      }

      google.script.run
        .withSuccessHandler(result => {
          if (result.ok) {
            showToast('success', 'ステータスを更新しました');
            loadDrafts();  // 下書きから確定へ移動する可能性
            loadHistory(); // 履歴を更新
          } else {
            showToast('error', result.error);
          }
        })
        .withFailureHandler(err => showToast('error', err.message))
        .updatePayoutStatus(payoutId, status, updatedAt);
    }

    function deletePayout(payoutId, updatedAt) {
      if (!confirm('この支払いを削除しますか？')) {
        return;
      }

      google.script.run
        .withSuccessHandler(result => {
          if (result.ok) {
            showToast('success', '削除しました');
            loadDrafts();  // 下書きのみ削除可能なので下書きリストを更新
          } else {
            showToast('error', result.error);
          }
        })
        .withFailureHandler(err => showToast('error', err.message))
        .deletePayout(payoutId, updatedAt);
    }

    // Helpers
    function selectStaff(staffId) {
      document.getElementById('staffFilter').value = staffId;
      loadUnpaidList();
    }

    function toggleSelectAll(checkbox) {
      document.querySelectorAll('.staff-check').forEach(cb => {
        cb.checked = checkbox.checked;
      });
    }

    function formatCurrency(amount) {
      return new Intl.NumberFormat('ja-JP', {
        style: 'currency',
        currency: 'JPY'
      }).format(amount || 0);
    }

    function getStatusLabel(status) {
      const labels = { draft: '下書き', confirmed: '確定', paid: '支払済' };
      return labels[status] || status;
    }

    function showToast(type, message) {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    function showBulkGenerateModal() {
      // Clear staff selection and load all
      document.getElementById('staffFilter').value = '';
      loadUnpaidList();
    }
  </script>
</body>
</html>
