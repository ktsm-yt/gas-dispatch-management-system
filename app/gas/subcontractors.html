    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;

    }

    <?!= include('confirmation_modal_styles'); ?>
    .empty-state { text-align: center; color: var(--text-muted); padding: 48px; }
    .add-btn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;

      display: none;

    .toast.show { display: block; }
    .toast.error { background: var(--color-danger); }

          <div class="form-group">
            <label>会社名<span class="required">*</span></label>

          <div class="form-group">
            <label>担当者名</label>
            <input type="text" id="contact-name">
          </div>
          <div class="form-group">
            <label>電話番号</label>
            <input type="tel" id="phone">
          </div>
          <div class="form-group">
            <label>備考</label>
            <textarea id="notes" rows="3"></textarea>
          </div>
          <div class="form-row cols-3">
            <div class="form-group">
              <label>基本単価</label>
              <input type="number" id="basic-rate" min="0" step="100" placeholder="円">

            <div class="form-group">
              <label>ハーフ単価</label>

        <div>
          <button type="button" class="btn btn-secondary" onclick="closeModal()">キャンセル</button>
          <button type="button" class="btn btn-primary" id="save-btn" onclick="saveRecord()">保存</button>

  <script>
    <?!= include('confirmation_modal_js'); ?>
  </script>

  <script>
    const SUBCONTRACTOR_CACHE_KEY = 'master_subcontractors';

    const SUBCONTRACTOR_SKELETON_ROWS = [
      ['line-60', 'line-40', 'line-50', 'line-80', 'pill-40'],
      ['line-50', 'line-30', 'line-40', 'line-60', 'pill-40'],
      ['line-70', 'line-40', 'line-50', 'line-70', 'pill-40']
    ];

    let dataList = [];
    let filteredList = [];
    let currentRecord = null;

    document.addEventListener('DOMContentLoaded', () => {
      initNavBar('subcontractors', '外注先');
      loadData();
      setupEventListeners();
    });

    function setupEventListeners() {
      document.getElementById('search-input').addEventListener('input', filterData);
      document.getElementById('add-btn').onclick = () => openModal(null);
      document.getElementById('modal').onclick = (e) => { if (e.target.id === 'modal') closeModal(); };
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
    }

    function loadData() {
      // 1. キャッシュ確認
      const cached = PageCache.get(SUBCONTRACTOR_CACHE_KEY);
      if (cached) {
        dataList = cached.data || [];
        updateStats();
        filterData();

        if (cached.age > PageCache.MASTER_TTL) {
          refreshDataInBackground();
        }
        return;
      }

      // 2. キャッシュなし → スケルトン表示してAPI呼び出し
      setSkeletonTableBody('table-body', SUBCONTRACTOR_SKELETON_ROWS);
      fetchDataFromServer();
    }

    function fetchDataFromServer() {
      google.script.run
        .withSuccessHandler((response) => {
          if (response.ok) {
            dataList = response.data.items || [];
            PageCache.set(SUBCONTRACTOR_CACHE_KEY, dataList);
            updateStats();
            filterData();
          } else {
            showToast(response.error?.message || 'データの取得に失敗', 'error');
          }
        })
        .withFailureHandler((e) => showToast(e.message, 'error'))
        .listSubcontractors({ includeDeleted: false });
    }

    function refreshDataInBackground() {
      google.script.run
        .withSuccessHandler((response) => {
          if (!response || !response.ok) return;
          const newItems = response.data.items || [];
          if (JSON.stringify(newItems) !== JSON.stringify(dataList)) {
            dataList = newItems;
            PageCache.set(SUBCONTRACTOR_CACHE_KEY, dataList);
            updateStats();
            filterData();
          }
        })
        .listSubcontractors({ includeDeleted: false });
    }

    function updateStats() {
      document.getElementById('stats-total').textContent = dataList.filter(d => d.is_active).length;
    }

    function filterData() {
      const term = document.getElementById('search-input').value.toLowerCase();
      filteredList = dataList.filter(d => {
        if (!d.is_active) return false;
        if (!term) return true;
        return [d.company_name, d.contact_name].filter(Boolean).join(' ').toLowerCase().includes(term);
      });
      renderTable();
    }

    function renderTable() {
      const tbody = document.getElementById('table-body');
      if (filteredList.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state">データがありません</div></td></tr>';
        return;
      }
      tbody.innerHTML = filteredList.map(d => `
        <tr class="${d.is_active ? '' : 'inactive'}" onclick="openModal('${d.subcontractor_id}')">
          <td>${escapeHtml(d.company_name)}</td>
          <td>${escapeHtml(d.contact_name) || '-'}</td>
          <td>${escapeHtml(d.phone) || '-'}</td>
          <td>${escapeHtml(d.notes) || '-'}</td>
          <td><span class="status-badge ${d.is_active ? 'status-active' : 'status-inactive'}">${d.is_active ? '有効' : '無効'}</span></td>
        </tr>
      `).join('');
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function openModal(id) {
      const form = document.getElementById('edit-form');
      form.reset();
      document.getElementById('subcontractor-id').value = '';
      document.getElementById('updated-at').value = '';
      const deleteBtn = document.getElementById('delete-btn');

      if (id) {
        document.getElementById('modal-title').textContent = '外注先編集';
        deleteBtn.style.display = 'inline-flex';
        currentRecord = dataList.find(d => d.subcontractor_id === id);
        if (currentRecord) {
          document.getElementById('subcontractor-id').value = currentRecord.subcontractor_id;
          document.getElementById('updated-at').value = currentRecord.updated_at || '';
          document.getElementById('company-name').value = currentRecord.company_name || '';
          document.getElementById('contact-name').value = currentRecord.contact_name || '';
          document.getElementById('phone').value = currentRecord.phone || '';
          document.getElementById('notes').value = currentRecord.notes || '';
          document.getElementById('basic-rate').value = currentRecord.basic_rate ?? '';
          document.getElementById('half-day-rate').value = currentRecord.half_day_rate ?? '';
          document.getElementById('full-day-rate').value = currentRecord.full_day_rate ?? '';
          document.getElementById('is-active').value = currentRecord.is_active ? 'true' : 'false';
        }
      } else {
        document.getElementById('modal-title').textContent = '新規外注先';
        deleteBtn.style.display = 'none';
        currentRecord = null;
        document.getElementById('is-active').value = 'true';
      }
      document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
      currentRecord = null;
    }

    function saveRecord() {
      const form = document.getElementById('edit-form');
      if (!form.checkValidity()) { form.reportValidity(); return; }

      const id = document.getElementById('subcontractor-id').value;
      const updatedAt = document.getElementById('updated-at').value;
      const basicRate = document.getElementById('basic-rate').value;
      const halfDayRate = document.getElementById('half-day-rate').value;
      const fullDayRate = document.getElementById('full-day-rate').value;
      const data = {
        company_name: document.getElementById('company-name').value,
        contact_name: document.getElementById('contact-name').value,
        phone: document.getElementById('phone').value,
        notes: document.getElementById('notes').value,
        basic_rate: basicRate !== '' ? Number(basicRate) : null,
        half_day_rate: halfDayRate !== '' ? Number(halfDayRate) : null,
        full_day_rate: fullDayRate !== '' ? Number(fullDayRate) : null,
        is_active: document.getElementById('is-active').value === 'true'
      };
      if (id) data.subcontractor_id = id;

      const saveBtn = document.getElementById('save-btn');
      saveBtn.disabled = true;
      saveBtn.textContent = '保存中...';
      const isNew = !id;

      google.script.run
        .withSuccessHandler((response) => {
          saveBtn.disabled = false;
          saveBtn.textContent = '保存';
          if (response.ok) {
            if (isNew) {
              dataList.push(response.data);
            } else {
              const idx = dataList.findIndex(d => d.subcontractor_id === response.data.subcontractor_id);
              if (idx !== -1) dataList[idx] = response.data;
            }
            PageCache.set(SUBCONTRACTOR_CACHE_KEY, dataList);
            updateStats();
            filterData();
            showToast('保存しました', 'success');
            closeModal();
            // 他タブ（payouts等）に変更を通知
            var _ch = BroadcastSync.init('payout_sync', function() {});
            BroadcastSync.broadcast(_ch, 'SUBCONTRACTORS_CHANGED', {});
            if (_ch) _ch.close();
          } else {
            showToast(response.error?.message || '保存失敗', 'error');
          }
        })
        .withFailureHandler((e) => {
          saveBtn.disabled = false;
          saveBtn.textContent = '保存';
          showToast(e.message, 'error');
        })
        .saveSubcontractor(data, updatedAt || null);
    }

    function deleteRecord() {
      if (!currentRecord) return;

      ConfirmationModal.show({
        type: 'danger',
        title: '削除の確認',
        message: `「${currentRecord.company_name}」を削除しますか？`,
        confirmText: '削除',
        onConfirm: () => {
          const deleteId = currentRecord.subcontractor_id;
          const deleteName = currentRecord.company_name;
          const updatedAt = document.getElementById('updated-at').value;

          // 楽観的更新: UIを即座に更新
          dataList = dataList.filter(d => d.subcontractor_id !== deleteId);
          PageCache.set(SUBCONTRACTOR_CACHE_KEY, dataList);
          updateStats();
          filterData();
          closeModal();
          showToast(`${deleteName}を削除しました`, 'success');

          // バックグラウンドでAPI呼び出し
          google.script.run
            .withSuccessHandler((response) => {
              if (!response.ok) {
                showToast(response.error?.message || '削除失敗。再読み込みします。', 'error');
                loadData();
              } else {
                // 他タブ（payouts等）に変更を通知（バックエンド確定後）
                var _ch = BroadcastSync.init('payout_sync', function() {});
                BroadcastSync.broadcast(_ch, 'SUBCONTRACTORS_CHANGED', {});
                if (_ch) _ch.close();
              }
            })
            .withFailureHandler((e) => {
              showToast('削除失敗。再読み込みします。', 'error');
              loadData();
            })
            .deleteSubcontractor(deleteId, updatedAt || null);
        }
      });
    }

    function showToast(message, type = '') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show' + (type ? ' ' + type : '');
      setTimeout(() => { toast.className = 'toast'; }, 3000);
    }
  </script>
</body>
