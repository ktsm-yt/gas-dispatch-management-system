  <style>
    :root {
      --color-primary: #172D90;

      --color-danger: #DC3545;

      --shadow-card: 0 1px 4px rgba(0, 0, 0, 0.08);

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;

      color: var(--text-primary);

    <?!= include('nav_styles'); ?>

    .date-nav {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      padding: 6px 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .date-btn {
      background: white;
      border: 1px solid var(--border-color);
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
    }

    .date-btn:hover { background: var(--bg-hover); }

    .current-date {
      font-size: 15px;

    .main-content {

      margin: 0 auto;

    .summary-cards {

      gap: 8px;
      margin-bottom: 10px;

    .summary-card {

      border-radius: var(--radius-md);

      text-align: center;
      min-width: 90px;

      font-size: 11px;

    }

    }

    .summary-card-value.shortage { color: var(--color-danger); }
    .summary-card-value.ok { color: var(--color-success); }

    /* Table Styles */
    .jobs-table-container {
      background: white;
      border-radius: var(--radius-md);

      overflow: hidden;
    }

    }

      font-size: 11px;

    }

    .staff-cell {

    .text-center { text-align: center; }

    .toast {

    /* Modal Styles */

      left: 0;
      right: 0;
      bottom: 0;

      justify-content: center;
      align-items: center;
      z-index: 1000;

    .modal {

    .modal-close {

      line-height: 1;

    .modal-panel {

    .staff-search {

  <script>
    let currentDate = new Date();
    let currentRequestId = 0;  // リクエスト追跡用
    let isLoading = false;

    document.addEventListener('DOMContentLoaded', () => {
      initNavBar('assignments', '配置管理');
      initializeDate();
      setupEventListeners();
      setupModalEventListeners();
    });

    function setupModalEventListeners() {
      // Close modal on overlay click
      document.getElementById('assignment-modal').addEventListener('click', (e) => {
        if (e.target.id === 'assignment-modal') {
          closeAssignmentModal();
        }
      });

      // Close modal on Escape key
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && document.getElementById('assignment-modal').style.display !== 'none') {
          closeAssignmentModal();
        }
      });
    }

    function initializeDate() {
      // URLパラメータから日付を取得
      const urlParams = new URLSearchParams(window.location.search);
      const dateParam = urlParams.get('date');

      if (dateParam && /^\d{4}-\d{2}-\d{2}$/.test(dateParam)) {
        // URLに有効な日付がある場合はそれを使用
        currentDate = new Date(dateParam + 'T00:00:00');
        loadAssignments();
      } else {
        // URLに日付がない場合はサーバー日付を取得
        google.script.run
          .withSuccessHandler(function(serverDate) {
            currentDate = new Date(serverDate + 'T00:00:00');
            updateUrlDate();
            loadAssignments();
          })
          .withFailureHandler(function(error) {
            console.error('getServerDate failed:', error);
            currentDate = new Date();
            updateUrlDate();
            loadAssignments();
          })
          .getServerDate();
      }
    }

    function updateUrlDate() {
      const dateStr = formatDateISO(currentDate);
      const url = new URL(window.location);
      url.searchParams.set('date', dateStr);
      history.replaceState(null, '', url);
    }

    function setupEventListeners() {
      document.getElementById('prev-day').addEventListener('click', () => changeDate(-1));
      document.getElementById('next-day').addEventListener('click', () => changeDate(1));
      document.getElementById('today-btn').addEventListener('click', () => {
        google.script.run
          .withSuccessHandler(function(serverDate) {
            currentDate = new Date(serverDate + 'T00:00:00');
            updateUrlDate();
            loadAssignments();
          })
          .withFailureHandler(function(error) {
            currentDate = new Date();
            updateUrlDate();
            loadAssignments();
          })
          .getServerDate();
      });
    }

    function changeDate(delta) {
      currentDate.setDate(currentDate.getDate() + delta);
      updateUrlDate();
      loadAssignments();
    }

    function loadAssignments() {
      const dateStr = formatDateISO(currentDate);
      const requestId = ++currentRequestId;  // 新しいリクエストID（古いレスポンスは無視される）

      isLoading = true;
      updateDateDisplay();

      document.getElementById('jobs-tbody').innerHTML = '<tr><td colspan="7" class="loading">読み込み中...</td></tr>';

      google.script.run
        .withSuccessHandler((response) => handleData(response, requestId, dateStr))
        .withFailureHandler((error) => handleError(error, requestId))
        .getDashboardAssignments(dateStr);
    }

    function handleData(response, requestId, requestedDate) {
      // 古いリクエストのレスポンスは無視
      if (requestId !== currentRequestId) {
        console.log('Ignoring stale response for request', requestId);
        return;
      }

      isLoading = false;

      if (!response.ok) {
        showToast(response.error?.message || 'データの取得に失敗しました', 'error');
        return;
      }

      // 現在の日付と一致するか確認
      const currentDateStr = formatDateISO(currentDate);
      if (requestedDate !== currentDateStr) {
        console.log('Date mismatch, ignoring response');
        return;
      }

      const { jobs } = response.data;

      // フロントエンドでサマリーを計算（キャンセル済み案件を除外）
      let totalRequired = 0;
      let totalAssigned = 0;

      if (jobs && jobs.length > 0) {
        for (const job of jobs) {
          if (job.status === 'cancelled') continue;
          totalRequired += Number(job.required_count) || 0;
          totalAssigned += Number(job.assigned_count) || 0;
        }
      }

      const totalShortage = totalRequired - totalAssigned;

      // Update summary
      document.getElementById('summary-required').textContent = totalRequired;
      document.getElementById('summary-assigned').textContent = totalAssigned;
      document.getElementById('summary-shortage').textContent = totalShortage;

      const shortageEl = document.getElementById('summary-shortage');
      if (totalShortage <= 0) {
        shortageEl.className = 'summary-card-value ok';
        shortageEl.textContent = totalShortage === 0 ? '0' : '+' + Math.abs(totalShortage);
      } else {
        shortageEl.className = 'summary-card-value shortage';
      }

      // Render jobs
      renderJobs(jobs);
    }

    function handleError(error, requestId) {
      // 古いリクエストのエラーは無視
      if (requestId !== currentRequestId) return;

      isLoading = false;
      showToast('エラー: ' + error.message, 'error');
      document.getElementById('jobs-tbody').innerHTML = '<tr><td colspan="7" class="empty-state">データの読み込みに失敗しました</td></tr>';
    }

    function renderJobs(jobs) {
      const tbody = document.getElementById('jobs-tbody');

      // キャンセル済み案件を除外
      const activeJobs = (jobs || []).filter(job => job.status !== 'cancelled');

      if (activeJobs.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-state">この日の案件はありません</td></tr>';
        return;
      }

      let html = '';
      activeJobs.forEach((job) => {
        const validAssignments = (job.assignments || []).filter(a => a.status !== 'CANCELLED');
        const shortage = (job.required_count || 0) - (job.assigned_count || 0);

        // スタッフ名をカンマ区切りで表示
        const staffNames = validAssignments.length > 0
          ? validAssignments.map(a => escapeHtml(a.staff_name || a.staff_id)).join(', ')
          : '<span class="no-assignments">-</span>';

        html += `
          <tr class="job-row" data-job-id="${job.job_id}" onclick="openJobAssignments('${job.job_id}')">
            <td><span class="job-time-slot">${formatTimeSlot(job.time_slot)}</span></td>
            <td><div class="job-name">${escapeHtml(job.site_name)}</div></td>
            <td><span class="job-customer">${escapeHtml(job.customer_name || '-')}</span></td>
            <td class="staff-cell">${staffNames}</td>
            <td class="text-center">${job.required_count || 0}</td>
            <td class="text-center">${job.assigned_count || 0}</td>
            <td class="text-center">
              ${shortage > 0
                ? `<span class="stat-badge shortage">-${shortage}</span>`
                : shortage < 0
                  ? `<span class="stat-badge ok">+${Math.abs(shortage)}</span>`
                  : '<span class="stat-badge ok">0</span>'
              }
            </td>
          </tr>
        `;
      });

      tbody.innerHTML = html;
    }

    // ========== Modal State ==========
    let modalState = {
      jobId: null,
      job: null,
      assignments: [],
      allStaff: [],
      filteredStaff: [],
      transportAreas: [],
      jobUpdatedAt: null,
      selectedStaffIds: [],  // 選択中のスタッフID
      isSaving: false,  // 保存中フラグ
      deleteQueue: []  // 削除キュー
    };

    // ========== Modal Functions ==========
    function openJobAssignments(jobId) {
      modalState.jobId = jobId;
      modalState.selectedStaffIds = [];

      // Show modal
      document.getElementById('assignment-modal').style.display = 'flex';

      // Reset filters and search
      document.getElementById('staff-search').value = '';
      document.getElementById('staff-skill-filter').value = '';
      document.getElementById('staff-type-filter').value = '';

      // Reset batch button
      updateBatchButton();

      // Load data
      loadModalData(jobId);

      // Load transport areas (cached)
      loadTransportAreas();
    }

    function closeAssignmentModal() {
      const jobId = modalState.jobId;
      const job = modalState.job;
      const assignments = modalState.assignments;

      document.getElementById('assignment-modal').style.display = 'none';

      // 部分更新: 該当行だけ更新
      if (jobId && job) {
        updateJobRow(jobId, job, assignments);
        updateSummaryFromTable();
      }

      modalState = {
        jobId: null,
        job: null,
        assignments: [],
        allStaff: [],
        filteredStaff: [],
        transportAreas: modalState.transportAreas, // Keep cache
        jobUpdatedAt: null,
        selectedStaffIds: [],
        isSaving: false,
        deleteQueue: []
      };
    }

    // 特定の行だけ更新
    function updateJobRow(jobId, job, assignments) {
      const row = document.querySelector(`tr[data-job-id="${jobId}"]`);
      if (!row) return;

      const validAssignments = (assignments || []).filter(a => a.status !== 'CANCELLED');
      const assignedCount = validAssignments.length;
      const requiredCount = Number(job.required_count) || 0;
      const shortage = requiredCount - assignedCount;

      const staffNames = validAssignments.length > 0
        ? validAssignments.map(a => escapeHtml(a.staff_name || a.staff_id)).join(', ')
        : '<span class="no-assignments">-</span>';

      row.innerHTML = `
        <td><span class="job-time-slot">${formatTimeSlot(job.time_slot)}</span></td>
        <td><div class="job-name">${escapeHtml(job.site_name)}</div></td>
        <td><span class="job-customer">${escapeHtml(job.customer_name || '-')}</span></td>
        <td class="staff-cell">${staffNames}</td>
        <td class="text-center">${requiredCount}</td>
        <td class="text-center">${assignedCount}</td>
        <td class="text-center">
          ${shortage > 0
            ? `<span class="stat-badge shortage">-${shortage}</span>`
            : shortage < 0
              ? `<span class="stat-badge ok">+${Math.abs(shortage)}</span>`
              : '<span class="stat-badge ok">0</span>'
          }
        </td>
      `;
    }

    // テーブルからサマリーを再計算
    function updateSummaryFromTable() {
      const rows = document.querySelectorAll('#jobs-tbody tr.job-row');
      let totalRequired = 0;
      let totalAssigned = 0;

      rows.forEach(row => {
        const cells = row.querySelectorAll('td');
        if (cells.length >= 6) {
          totalRequired += parseInt(cells[4].textContent) || 0;
          totalAssigned += parseInt(cells[5].textContent) || 0;
        }
      });

      const totalShortage = totalRequired - totalAssigned;

      document.getElementById('summary-required').textContent = totalRequired;
      document.getElementById('summary-assigned').textContent = totalAssigned;

      const shortageEl = document.getElementById('summary-shortage');
      if (totalShortage <= 0) {
        shortageEl.className = 'summary-card-value ok';
        shortageEl.textContent = totalShortage === 0 ? '0' : '+' + Math.abs(totalShortage);
      } else {
        shortageEl.className = 'summary-card-value shortage';
        shortageEl.textContent = totalShortage;
      }
    }

    function loadModalData(jobId) {
      // Show loading
      document.getElementById('staff-list').innerHTML = '<div class="loading-spinner">読み込み中...</div>';
      document.getElementById('assigned-list').innerHTML = '<div class="loading-spinner">読み込み中...</div>';

      // Load job and assignments
      google.script.run
        .withSuccessHandler(handleAssignmentData)
        .withFailureHandler(handleModalError)
        .getAssignments(jobId);

      // Load available staff
      google.script.run
        .withSuccessHandler(handleStaffData)
        .withFailureHandler(handleModalError)
        .getAvailableStaff({ jobId: jobId, excludeAssigned: false });
    }

    function handleAssignmentData(response) {
      if (!response.ok) {
        showToast(response.error?.message || 'データの取得に失敗しました', 'error');
        return;
      }

      const { job, assignments } = response.data;
      modalState.job = job;
      modalState.assignments = assignments || [];
      modalState.jobUpdatedAt = job.updated_at;

      // Update header
      document.getElementById('modal-job-name').textContent = job.site_name || '-';
      document.getElementById('modal-job-date').textContent = formatModalDate(job.work_date);
      document.getElementById('modal-job-time').textContent = formatTimeSlot(job.time_slot);
      document.getElementById('modal-job-type').textContent = job.job_type || '-';

      // Update stats
      updateModalStats();

      // Render assigned list
      renderAssignedList();

      // Re-render staff list if already loaded (to show assigned status)
      if (modalState.allStaff.length > 0) {
        filterStaffList();
      }
    }

    function handleStaffData(response) {
      if (!response.ok) {
        document.getElementById('staff-list').innerHTML = '<div class="panel-empty">スタッフの取得に失敗しました</div>';
        return;
      }

      modalState.allStaff = response.data.staff || [];
      filterStaffList();
    }

    function handleModalError(error) {
      showToast('エラー: ' + error.message, 'error');
    }

    function updateModalStats() {
      const validAssignments = modalState.assignments.filter(a => a.status !== 'CANCELLED');
      const assigned = validAssignments.length;
      const required = Number(modalState.job?.required_count) || 0;
      const shortage = required - assigned;

      document.getElementById('modal-required').textContent = required;
      document.getElementById('modal-assigned').textContent = assigned;

      const shortageBadge = document.getElementById('modal-shortage-badge');
      const shortageValue = document.getElementById('modal-shortage');

      if (shortage > 0) {
        shortageBadge.style.display = 'inline-flex';
        shortageValue.textContent = shortage;
      } else {
        shortageBadge.style.display = 'none';
      }
    }

    function filterStaffList() {
      const searchQuery = document.getElementById('staff-search').value.toLowerCase();
      const skillFilter = document.getElementById('staff-skill-filter').value;
      const typeFilter = document.getElementById('staff-type-filter').value;

      // Get assigned staff IDs
      const assignedIds = modalState.assignments
        .filter(a => a.status !== 'CANCELLED')
        .map(a => a.staff_id);

      // Filter staff (配置済みも含める)
      let filtered = modalState.allStaff.filter(s => {
        // Name search (漢字・かな両方)
        if (searchQuery) {
          const name = (s.name || '').toLowerCase();
          const kana = (s.name_kana || '').toLowerCase();
          if (!name.includes(searchQuery) && !kana.includes(searchQuery)) return false;
        }

        // Skill filter
        if (skillFilter && s.skills) {
          const skills = s.skills.split(',').map(sk => sk.trim());
          if (!skills.includes(skillFilter)) return false;
        }

        // Type filter
        if (typeFilter && s.staff_type !== typeFilter) {
          return false;
        }

        return true;
      });

      // Sort: 配置済みを先頭に、その後かな順
      filtered.sort((a, b) => {
        const aAssigned = assignedIds.includes(a.staff_id) ? 0 : 1;
        const bAssigned = assignedIds.includes(b.staff_id) ? 0 : 1;
        if (aAssigned !== bAssigned) return aAssigned - bAssigned;
        const nameA = a.name_kana || a.name || '';
        const nameB = b.name_kana || b.name || '';
        return nameA.localeCompare(nameB, 'ja');
      });

      modalState.filteredStaff = filtered;
      renderStaffList();
    }

    function renderStaffList() {
      const container = document.getElementById('staff-list');
      const staff = modalState.filteredStaff;
      const jobType = modalState.job?.job_type;

      // Get assigned staff IDs
      const assignedIds = modalState.assignments
        .filter(a => a.status !== 'CANCELLED')
        .map(a => a.staff_id);

      if (staff.length === 0) {
        container.innerHTML = '<div class="panel-empty">該当するスタッフがいません</div>';
        updateSelectedCount();
        return;
      }

      const typeLabels = {
        'regular': '自社',
        'student': '学生',
        'sole_proprietor': '個人',
        'subcontract': '外注'
      };

      container.innerHTML = staff.map(s => {
        const typeLabel = typeLabels[s.staff_type] || s.staff_type;
        const typeClass = s.staff_type || 'employee';
        const isAssigned = assignedIds.includes(s.staff_id);
        const isSelected = modalState.selectedStaffIds.includes(s.staff_id);

        // Check skill match
        const skills = s.skills ? s.skills.split(',').map(sk => sk.trim()) : [];

        if (isAssigned) {
          // 配置済みスタッフ: 選択可能（一括更新用）
          return `
            <div class="staff-list-item assigned ${isSelected ? 'selected' : ''}" onclick="toggleStaffSelection('${s.staff_id}')">
              <input type="checkbox" class="staff-checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation(); toggleStaffSelection('${s.staff_id}')">
              <div class="staff-list-info">
                <span class="staff-list-name">${escapeHtml(s.name)}</span>
                <span class="staff-type-badge ${typeClass}">${typeLabel}</span>
                ${skills.map(sk => `<span class="skill-badge ${sk === jobType ? 'match' : ''}">${escapeHtml(sk)}</span>`).join('')}
                <span class="assigned-label">配置済</span>
              </div>
            </div>
          `;
        }

        return `
          <div class="staff-list-item ${isSelected ? 'selected' : ''}" onclick="toggleStaffSelection('${s.staff_id}')">
            <input type="checkbox" class="staff-checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation(); toggleStaffSelection('${s.staff_id}')">
            <div class="staff-list-info">
              <span class="staff-list-name">${escapeHtml(s.name)}</span>
              <span class="staff-type-badge ${typeClass}">${typeLabel}</span>
              ${skills.map(sk => `<span class="skill-badge ${sk === jobType ? 'match' : ''}">${escapeHtml(sk)}</span>`).join('')}
            </div>
          </div>
        `;
      }).join('');

      updateSelectedCount();
    }

    function toggleStaffSelection(staffId) {
      const idx = modalState.selectedStaffIds.indexOf(staffId);
      if (idx === -1) {
        modalState.selectedStaffIds.push(staffId);
      } else {
        modalState.selectedStaffIds.splice(idx, 1);
      }
      renderStaffList();
      updateBatchButton();
    }

    function updateSelectedCount() {
      const count = modalState.selectedStaffIds.length;
      const countEl = document.getElementById('selected-count');
      countEl.textContent = count > 0 ? `${count}名選択中` : '';
    }

    function updateBatchButton() {
      const btn = document.getElementById('batch-add-btn');
      const count = modalState.selectedStaffIds.length;
      btn.disabled = count === 0;
      btn.textContent = count > 0 ? `${count}名を保存` : '選択したスタッフを保存';
    }

    function selectAllAssigned() {
      const assignedIds = modalState.assignments
        .filter(a => a.status !== 'CANCELLED')
        .map(a => a.staff_id);

      // 配置済みスタッフを全て選択状態に
      assignedIds.forEach(id => {
        if (!modalState.selectedStaffIds.includes(id)) {
          modalState.selectedStaffIds.push(id);
        }
      });

      renderStaffList();
      updateBatchButton();
    }

    function batchAddStaff() {
      if (modalState.isSaving) return;  // 保存中は無視

      const selectedIds = modalState.selectedStaffIds;
      if (selectedIds.length === 0) return;

      const payUnit = document.getElementById('form-pay-unit').value;
      const invoiceUnit = document.getElementById('form-invoice-unit').value;
      const transportArea = document.getElementById('form-transport-area').value;
      const transportAmount = document.getElementById('form-transport-amount').value;

      // 配置済みスタッフのassignment_idマップ
      const assignmentMap = {};
      modalState.assignments.filter(a => a.status !== 'CANCELLED').forEach(a => {
        assignmentMap[a.staff_id] = a.assignment_id;
      });

      // 選択されたスタッフの情報を取得
      const upserts = selectedIds.map(staffId => {
        const staff = modalState.allStaff.find(s => s.staff_id === staffId);
        const workerType = staff?.staff_type === 'subcontract' ? 'SUBCONTRACT' : 'EMPLOYEE';

        const data = {
          staff_id: staffId,
          worker_type: workerType,
          pay_unit: payUnit,
          invoice_unit: invoiceUnit
        };

        // 既存配置の場合はassignment_idを追加（更新になる）
        if (assignmentMap[staffId]) {
          data.assignment_id = assignmentMap[staffId];
        }

        if (transportArea) {
          data.transport_area = transportArea;
        }
        if (transportAmount) {
          data.transport_amount = Number(transportAmount);
        }

        return data;
      });

      const changes = {
        upserts: upserts,
        deletes: []
      };

      // === 楽観的更新: UIを即座に更新 ===
      const addedCount = selectedIds.length;

      // 新規追加・更新をローカルに反映
      for (const upsert of upserts) {
        const staff = modalState.allStaff.find(s => s.staff_id === upsert.staff_id);

        if (upsert.assignment_id) {
          // 既存配置の更新
          const idx = modalState.assignments.findIndex(a => a.assignment_id === upsert.assignment_id);
          if (idx !== -1) {
            modalState.assignments[idx] = {
              ...modalState.assignments[idx],
              pay_unit: upsert.pay_unit,
              invoice_unit: upsert.invoice_unit,
              transport_area: upsert.transport_area || modalState.assignments[idx].transport_area,
              transport_amount: upsert.transport_amount || modalState.assignments[idx].transport_amount
            };
          }
        } else {
          // 新規配置（仮IDで追加）
          const tempAssignment = {
            assignment_id: 'temp_' + upsert.staff_id,
            job_id: modalState.jobId,
            staff_id: upsert.staff_id,
            staff_name: staff?.name || '',
            worker_type: upsert.worker_type,
            pay_unit: upsert.pay_unit,
            invoice_unit: upsert.invoice_unit,
            transport_area: upsert.transport_area || '',
            transport_amount: upsert.transport_amount || 0,
            status: 'ASSIGNED'
          };
          modalState.assignments.push(tempAssignment);
        }
      }

      // 選択をクリアしてUI更新
      modalState.selectedStaffIds = [];
      updateModalStats();
      renderAssignedList();
      filterStaffList();
      updateBatchButton();

      // === バックグラウンドでAPI呼び出し ===
      modalState.isSaving = true;

      google.script.run
        .withSuccessHandler(function(response) {
          modalState.isSaving = false;

          if (response.ok) {
            showToast(`${addedCount}名を保存しました`, 'success');

            // サーバーからの正式データで差し替え
            modalState.assignments = response.data.assignments || [];
            modalState.jobUpdatedAt = response.data.job?.updated_at;

            // Re-render with real data
            updateModalStats();
            renderAssignedList();
            filterStaffList();
          } else {
            // エラー時はデータ再読み込み
            showToast(response.error?.message || '保存に失敗しました', 'error');
            loadModalData(modalState.jobId);
          }
        })
        .withFailureHandler(function(error) {
          modalState.isSaving = false;
          showToast('エラー: ' + error.message, 'error');
          loadModalData(modalState.jobId);
        })
        .saveAssignments(modalState.jobId, changes, modalState.jobUpdatedAt);
    }

    function renderAssignedList() {
      const container = document.getElementById('assigned-list');
      const assignments = modalState.assignments.filter(a => a.status !== 'CANCELLED');

      if (assignments.length === 0) {
        container.innerHTML = '<div class="panel-empty">配置されたスタッフはいません</div>';
        return;
      }

      container.innerHTML = assignments.map(a => {
        const workerType = a.worker_type === 'SUBCONTRACT' ? '外注' : '自社';
        const payUnit = formatPayUnit(a.pay_unit);
        const transport = a.transport_amount ? a.transport_amount.toLocaleString() + '円' : (a.transport_area || '-');

        return `
          <div class="assignment-list-item">
            <div class="assignment-info">
              <div class="assignment-staff-name">${escapeHtml(a.staff_name || a.staff_id)}</div>
              <div class="assignment-details">
                <span>${workerType}</span>
                <span>${payUnit}</span>
                <span>交通費: ${transport}</span>
              </div>
            </div>
            <div class="assignment-actions">
              <button class="btn-icon" onclick="editAssignment('${a.assignment_id}')" title="編集">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>
              <button class="btn-icon btn-delete" onclick="removeAssignment('${a.assignment_id}')" title="削除">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                </svg>
              </button>
            </div>
          </div>
        `;
      }).join('');
    }

    // ========== Assignment Edit ==========
    let editingAssignment = null;

    function editAssignment(assignmentId) {
      const assignment = modalState.assignments.find(a => a.assignment_id === assignmentId);
      if (!assignment) {
        showToast('配置データが見つかりません', 'error');
        return;
      }

      editingAssignment = assignment;

      // 編集モーダルを表示
      document.getElementById('edit-staff-name').textContent = assignment.staff_name;
      document.getElementById('edit-pay-unit').value = assignment.pay_unit || 'FULLDAY';
      document.getElementById('edit-invoice-unit').value = assignment.invoice_unit || 'FULLDAY';
      document.getElementById('edit-transport-area').value = assignment.transport_area || '';
      document.getElementById('edit-transport-amount').value = assignment.transport_amount || '';

      document.getElementById('edit-modal').style.display = 'flex';
    }

    function closeEditModal() {
      document.getElementById('edit-modal').style.display = 'none';
      editingAssignment = null;
    }

    function saveEditAssignment() {
      if (!editingAssignment) return;

      const changes = {
        upserts: [{
          assignment_id: editingAssignment.assignment_id,
          staff_id: editingAssignment.staff_id,
          pay_unit: document.getElementById('edit-pay-unit').value,
          invoice_unit: document.getElementById('edit-invoice-unit').value,
          transport_area: document.getElementById('edit-transport-area').value,
          transport_amount: Number(document.getElementById('edit-transport-amount').value) || 0,
          transport_is_manual: true
        }],
        deletes: []
      };

      const btn = document.getElementById('edit-save-btn');
      btn.disabled = true;
      btn.textContent = '保存中...';

      google.script.run
        .withSuccessHandler(function(response) {
          btn.disabled = false;
          btn.textContent = '保存';

          if (response.ok) {
            showToast('更新しました', 'success');
            modalState.assignments = response.data.assignments || [];
            modalState.jobUpdatedAt = response.data.job?.updated_at;
            updateModalStats();
            renderAssignedList();
            filterStaffList();
            closeEditModal();
          } else {
            showToast(response.error?.message || '保存に失敗しました', 'error');
          }
        })
        .withFailureHandler(function(error) {
          btn.disabled = false;
          btn.textContent = '保存';
          showToast('エラー: ' + error.message, 'error');
        })
        .saveAssignments(modalState.jobId, changes, modalState.jobUpdatedAt);
    }

    function loadTransportAreas() {
      if (modalState.transportAreas.length > 0) {
        populateTransportAreas();
        return;
      }

      google.script.run
        .withSuccessHandler(function(response) {
          if (response.ok) {
            modalState.transportAreas = response.data.areas || [];
            populateTransportAreas();
          }
        })
        .getTransportFeeAreas();
    }

    function populateTransportAreas() {
      // 一括設定用
      populateTransportAreaSelect('form-transport-area');
      // 編集モーダル用
      populateTransportAreaSelect('edit-transport-area');
    }

    function populateTransportAreaSelect(selectId) {
      const select = document.getElementById(selectId);
      if (!select) return;

      const currentValue = select.value;

      select.innerHTML = '<option value="">選択してください</option>';
      modalState.transportAreas.forEach(area => {
        const option = document.createElement('option');
        option.value = area.area_code;
        option.textContent = area.area_name + ' (' + (area.default_fee || 0).toLocaleString() + '円)';
        option.dataset.fee = area.default_fee || 0;
        select.appendChild(option);
      });

      if (currentValue) {
        select.value = currentValue;
      }
    }

    function onTransportAreaChange() {
      const select = document.getElementById('form-transport-area');
      const amountInput = document.getElementById('form-transport-amount');

      if (select.value) {
        const selectedOption = select.options[select.selectedIndex];
        const fee = selectedOption.dataset.fee || 0;
        amountInput.value = fee;
      }
    }

    function onEditTransportAreaChange() {
      const select = document.getElementById('edit-transport-area');
      const amountInput = document.getElementById('edit-transport-amount');

      if (select.value) {
        const selectedOption = select.options[select.selectedIndex];
        const fee = selectedOption.dataset.fee || 0;
        amountInput.value = fee;
      }
    }

    function removeAssignment(assignmentId) {
      // キューに追加
      if (!modalState.deleteQueue.includes(assignmentId)) {
        modalState.deleteQueue.push(assignmentId);
      }

      // UIから即座に削除（楽観的更新）
      modalState.assignments = modalState.assignments.filter(a => a.assignment_id !== assignmentId);
      renderAssignedList();
      updateModalStats();
      filterStaffList();

      // キュー処理開始
      processDeleteQueue();
    }

    function processDeleteQueue() {
      if (modalState.isSaving || modalState.deleteQueue.length === 0) return;

      modalState.isSaving = true;
      const assignmentId = modalState.deleteQueue.shift();

      const changes = {
        upserts: [],
        deletes: [assignmentId]
      };

      google.script.run
        .withSuccessHandler(function(response) {
          modalState.isSaving = false;

          if (response.ok) {
            modalState.jobUpdatedAt = response.data.job?.updated_at;
            // 次のキューを処理
            processDeleteQueue();
          } else {
            showToast(response.error?.message || '削除に失敗しました', 'error');
            // エラー時はリロード
            loadModalData(modalState.jobId);
          }
        })
        .withFailureHandler(function(error) {
          modalState.isSaving = false;
          showToast('エラー: ' + error.message, 'error');
          loadModalData(modalState.jobId);
        })
        .saveAssignments(modalState.jobId, changes, modalState.jobUpdatedAt);
    }

    function saveAssignmentChanges(changes) {
      if (modalState.isSaving) return;
      modalState.isSaving = true;

      google.script.run
        .withSuccessHandler(function(response) {
          modalState.isSaving = false;

          if (response.ok) {
            showToast('保存しました', 'success');

            // Update state
            modalState.assignments = response.data.assignments || [];
            modalState.jobUpdatedAt = response.data.job?.updated_at;

            // Re-render
            updateModalStats();
            renderAssignedList();
            filterStaffList();
          } else {
            if (response.error?.code === 'CONFLICT_ERROR') {
              showToast('他のユーザーが変更を行いました。画面を更新してください。', 'error');
              loadModalData(modalState.jobId);
            } else {
              showToast(response.error?.message || '保存に失敗しました', 'error');
            }
          }
        })
        .withFailureHandler(function(error) {
          modalState.isSaving = false;
          showToast('エラー: ' + error.message, 'error');
        })
        .saveAssignments(modalState.jobId, changes, modalState.jobUpdatedAt);
    }

    function formatModalDate(dateStr) {
      if (!dateStr) return '-';
      const date = new Date(dateStr + 'T00:00:00');
      return date.toLocaleDateString('ja-JP', { month: 'short', day: 'numeric', weekday: 'short' });
    }

    function formatPayUnit(unit) {
      const units = { 'FULLDAY': '終日', 'HALFDAY': '半日', 'HOURLY': '時給' };
      return units[unit] || unit || '-';
    }

    function updateDateDisplay() {
      const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' };
      document.getElementById('current-date').textContent = currentDate.toLocaleDateString('ja-JP', options);
    }

    function formatDateISO(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function formatTimeSlot(slot) {
      const slots = {
        'jotou': '上棟',
        'shuujitsu': '終日',
        'am': 'AM',
        'pm': 'PM',
        'yakin': '夜勤',
        'mitei': '未定'
      };
      return slots[slot] || slot || '-';
    }

    function formatWorkerType(type) {
      return type === 'SUBCONTRACT' ? '外注' : '自社';
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + type;
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }
  </script>
</body>
</html>
