<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>配置管理</title>
  <style>
    :root {
      --color-primary: #172D90;
      --color-secondary: #139BC4;
      --color-accent: #135DA7;
      --color-success: #28A745;
      --color-warning: #FFC107;
      --color-danger: #DC3545;
      --bg-main: #FFFFFF;
      --bg-card: #F7FAFC;
      --bg-hover: #EEF2F7;
      --text-primary: #1F2937;
      --text-muted: #6B7280;
      --border-color: #E5E7EB;
      --spacing-xs: 2px;
      --spacing-sm: 4px;
      --spacing-md: 8px;
      --spacing-lg: 12px;
      --radius-sm: 3px;
      --radius-md: 6px;
      --shadow-card: 0 1px 4px rgba(0, 0, 0, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg-main);
      color: var(--text-primary);
      line-height: 1.5;
    }

    <?!= include('nav_styles'); ?>
    <?!= include('assignment_modal_styles'); ?>

    .date-nav {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      padding: 6px 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .date-btn {
      background: white;
      border: 1px solid var(--border-color);
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
    }

    .date-btn:hover { background: var(--bg-hover); }

    .current-date {
      font-size: 15px;
      font-weight: 600;
      min-width: 160px;
      text-align: center;
    }

    .main-content {
      padding: 10px 12px;
    }

    .summary-cards {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .summary-card {
      background: white;
      border-radius: var(--radius-md);
      padding: 8px 16px;
      box-shadow: var(--shadow-card);
      text-align: center;
      min-width: 90px;
    }

    .summary-card-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .summary-card-value {
      font-size: 20px;
      font-weight: 700;
    }

    .summary-card-value.shortage { color: var(--color-danger); }
    .summary-card-value.ok { color: var(--color-success); }

    /* Table Styles */
    .jobs-table-container {
      background: white;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }

    .jobs-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      table-layout: fixed;
    }

    .jobs-table th {
      background: var(--bg-card);
      padding: 6px 8px;
      text-align: left;
      font-weight: 600;
      font-size: 11px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-color);
      white-space: nowrap;
    }

    .jobs-table th:nth-child(1) { width: 60px; }  /* 時間 */
    .jobs-table th:nth-child(2) { width: 15%; }   /* 顧客 */
    .jobs-table th:nth-child(3) { width: 20%; }   /* 現場名 */
    .jobs-table th:nth-child(4) { width: 25%; }   /* 住所 */
    .jobs-table th:nth-child(5) { width: auto; }  /* 配置スタッフ */
    .jobs-table th:nth-child(6) { width: 50px; }  /* 必要 */
    .jobs-table th:nth-child(7) { width: 50px; }  /* 配置 */
    .jobs-table th:nth-child(8) { width: 60px; }  /* 過不足 */

    .jobs-table td {
      padding: 6px 8px;
      border-bottom: 1px solid var(--border-color);
      vertical-align: middle;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .jobs-table tbody tr:hover {
      background: var(--bg-hover);
      cursor: pointer;
    }

    .jobs-table tbody tr:last-child td {
      border-bottom: none;
    }

    .job-time-slot {
      background: var(--color-primary);
      color: white;
      padding: 2px 6px;
      border-radius: var(--radius-sm);
      font-size: 10px;
      font-weight: 600;
      display: inline-block;
    }

    .job-name {
      font-weight: 500;
    }

    .job-address {
      color: var(--text-muted);
      font-size: 11px;
    }

    .job-customer {
      color: var(--text-muted);
      font-size: 11px;
    }

    .stat-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-weight: 500;
    }

    .stat-badge.ok { background: #D1FAE5; color: #065F46; }
    .stat-badge.shortage { background: #FEE2E2; color: #991B1B; }

    .btn-action {
      background: var(--color-primary);
      color: white;
      border: none;
      padding: 3px 8px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 10px;
    }

    .btn-action:hover {
      background: var(--color-accent);
    }

    .no-assignments {
      color: var(--text-muted);
      font-size: 11px;
      font-style: italic;
    }

    .staff-cell {
      max-width: 200px;
      font-size: 11px;
      color: var(--text-primary);
    }

    .text-center { text-align: center; }
    .text-right { text-align: right; }

    .empty-state {
      text-align: center;
      padding: 10px;
      color: var(--text-muted);
      font-size: 12px;
    }

    .loading {
      text-align: center;
      padding: 10px;
      color: var(--text-muted);
      font-size: 12px;
    }

    .toast {
      position: fixed;
      bottom: 12px;
      right: 12px;
      padding: 8px 12px;
      border-radius: var(--radius-md);
      background: #333;
      color: white;
      z-index: 1000;
      display: none;
      font-size: 12px;
    }

    .toast.error { background: var(--color-danger); }
    .toast.success { background: var(--color-success); }

    /* Page-specific Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .modal {
      background: white;
      border-radius: var(--radius-md);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-card);
    }

    .modal-header-info {
      flex: 1;
    }

    .modal-title {
      font-size: 14px;
      font-weight: 600;
      margin: 0 0 2px 0;
    }

    .modal-close {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: var(--text-muted);
      line-height: 1;
      padding: 0;
    }

    .modal-close:hover {
      color: var(--text-primary);
    }

    .modal-footer {
      display: flex;
      justify-content: flex-end;
      gap: 4px;
      padding: 6px 10px;
      border-top: 1px solid var(--border-color);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      margin-bottom: 4px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      font-size: 10px;
      font-weight: 500;
      margin-bottom: 1px;
      color: var(--text-muted);
    }

    .form-group select,
    .form-group input {
      padding: 3px 6px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      font-size: 11px;
    }

    .form-group select:focus,
    .form-group input:focus {
      outline: none;
      border-color: var(--color-secondary);
    }

    .btn {
      padding: 3px 8px;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: var(--color-primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--color-accent);
    }

    .btn-secondary {
      background: white;
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .btn-secondary:hover {
      background: var(--bg-hover);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    <?!= include('skeleton_styles'); ?>
  </style>
</head>
<body>
  <?!= include('nav_bar'); ?>

  <div class="date-nav">
    <button class="date-btn" id="prev-day">&lt; 前日</button>
    <span class="current-date" id="current-date">-</span>
    <button class="date-btn" id="next-day">翌日 &gt;</button>
    <button class="date-btn" id="today-btn">今日</button>
  </div>

  <main class="main-content">
    <div class="summary-cards" id="summary-cards">
      <div class="summary-card">
        <div class="summary-card-label">必要人数</div>
        <div class="summary-card-value" id="summary-required">-</div>
      </div>
      <div class="summary-card">
        <div class="summary-card-label">配置済み</div>
        <div class="summary-card-value" id="summary-assigned">-</div>
      </div>
      <div class="summary-card">
        <div class="summary-card-label">不足</div>
        <div class="summary-card-value shortage" id="summary-shortage">-</div>
      </div>
    </div>

    <div class="jobs-table-container" id="jobs-container">
      <table class="jobs-table">
        <thead>
          <tr>
            <th>時間</th>
            <th>顧客</th>
            <th>現場名</th>
            <th>住所</th>
            <th>配置スタッフ</th>
            <th class="text-center">必要</th>
            <th class="text-center">配置</th>
            <th class="text-center">過不足</th>
          </tr>
        </thead>
        <tbody id="jobs-tbody">
        </tbody>
      </table>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <?!= include('assignment_modal'); ?>
  <?!= include('assignment_modal_js'); ?>

  <script>
    <?!= include('skeleton_helpers'); ?>
    const ASSIGNMENTS_SKELETON_ROWS = [
      ['line-30', 'line-50', 'line-60', 'line-80', 'line-70', 'line-20', 'line-20', 'line-20'],
      ['line-40', 'line-40', 'line-70', 'line-60', 'line-60', 'line-20', 'line-20', 'line-20'],
      ['line-30', 'line-30', 'line-50', 'line-70', 'line-50', 'line-20', 'line-20', 'line-20']
    ];

    let currentDate = new Date();
    let currentRequestId = 0;  // リクエスト追跡用
    let isLoading = false;

    document.addEventListener('DOMContentLoaded', () => {
      initNavBar('assignments', '配置管理');
      initializeDate();
      setupEventListeners();
    });

    // Callback: モーダルが閉じられたときに呼ばれる
    function onAssignmentModalClose(jobId, job, assignments) {
      if (jobId && job) {
        updateJobRow(jobId, job, assignments);
        updateSummaryFromTable();
      }
    }

    function initializeDate() {
      // URLパラメータから日付を取得
      const urlParams = new URLSearchParams(window.location.search);
      const dateParam = urlParams.get('date');

      if (dateParam && /^\d{4}-\d{2}-\d{2}$/.test(dateParam)) {
        // URLに有効な日付がある場合はそれを使用
        currentDate = new Date(dateParam + 'T00:00:00');
        loadAssignments();
      } else {
        // URLに日付がない場合はサーバー日付を取得
        google.script.run
          .withSuccessHandler(function(serverDate) {
            currentDate = new Date(serverDate + 'T00:00:00');
            updateUrlDate();
            loadAssignments();
          })
          .withFailureHandler(function(error) {
            console.error('getServerDate failed:', error);
            currentDate = new Date();
            updateUrlDate();
            loadAssignments();
          })
          .getServerDate();
      }
    }

    function updateUrlDate() {
      const dateStr = formatDateISO(currentDate);
      const url = new URL(window.location);
      url.searchParams.set('date', dateStr);
      history.replaceState(null, '', url);
    }

    function setupEventListeners() {
      document.getElementById('prev-day').addEventListener('click', () => changeDate(-1));
      document.getElementById('next-day').addEventListener('click', () => changeDate(1));
      document.getElementById('today-btn').addEventListener('click', () => {
        google.script.run
          .withSuccessHandler(function(serverDate) {
            currentDate = new Date(serverDate + 'T00:00:00');
            updateUrlDate();
            loadAssignments();
          })
          .withFailureHandler(function(error) {
            currentDate = new Date();
            updateUrlDate();
            loadAssignments();
          })
          .getServerDate();
      });
    }

    function changeDate(delta) {
      currentDate.setDate(currentDate.getDate() + delta);
      updateUrlDate();
      loadAssignments();
    }

    function loadAssignments() {
      const dateStr = formatDateISO(currentDate);
      const requestId = ++currentRequestId;  // 新しいリクエストID（古いレスポンスは無視される）

      isLoading = true;
      updateDateDisplay();

      setSkeletonTableBody('jobs-tbody', ASSIGNMENTS_SKELETON_ROWS);

      google.script.run
        .withSuccessHandler((response) => handleData(response, requestId, dateStr))
        .withFailureHandler((error) => handleError(error, requestId))
        .getDashboardAssignments(dateStr);
    }

    function handleData(response, requestId, requestedDate) {
      // 古いリクエストのレスポンスは無視
      if (requestId !== currentRequestId) {
        console.log('Ignoring stale response for request', requestId);
        return;
      }

      isLoading = false;

      if (!response.ok) {
        showToast(response.error?.message || 'データの取得に失敗しました', 'error');
        return;
      }

      // 現在の日付と一致するか確認
      const currentDateStr = formatDateISO(currentDate);
      if (requestedDate !== currentDateStr) {
        console.log('Date mismatch, ignoring response');
        return;
      }

      const { jobs } = response.data;

      // フロントエンドでサマリーを計算（キャンセル済み案件を除外）
      let totalRequired = 0;
      let totalAssigned = 0;

      if (jobs && jobs.length > 0) {
        for (const job of jobs) {
          if (job.status === 'cancelled') continue;
          totalRequired += Number(job.required_count) || 0;
          totalAssigned += Number(job.assigned_count) || 0;
        }
      }

      const totalShortage = totalRequired - totalAssigned;

      // Update summary
      document.getElementById('summary-required').textContent = totalRequired;
      document.getElementById('summary-assigned').textContent = totalAssigned;
      document.getElementById('summary-shortage').textContent = totalShortage;

      const shortageEl = document.getElementById('summary-shortage');
      if (totalShortage <= 0) {
        shortageEl.className = 'summary-card-value ok';
        shortageEl.textContent = totalShortage === 0 ? '0' : '+' + Math.abs(totalShortage);
      } else {
        shortageEl.className = 'summary-card-value shortage';
      }

      // Render jobs
      renderJobs(jobs);
    }

    function handleError(error, requestId) {
      // 古いリクエストのエラーは無視
      if (requestId !== currentRequestId) return;

      isLoading = false;
      showToast('エラー: ' + error.message, 'error');
      document.getElementById('jobs-tbody').innerHTML = '<tr><td colspan="7" class="empty-state">データの読み込みに失敗しました</td></tr>';
    }

    function renderJobs(jobs) {
      const tbody = document.getElementById('jobs-tbody');

      // キャンセル済み案件を除外
      const activeJobs = (jobs || []).filter(job => job.status !== 'cancelled');

      if (activeJobs.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="empty-state">この日の案件はありません</td></tr>';
        return;
      }

      let html = '';
      activeJobs.forEach((job) => {
        const validAssignments = (job.assignments || []).filter(a => a.status !== 'CANCELLED');
        const shortage = (job.required_count || 0) - (job.assigned_count || 0);

        // スタッフ名をカンマ区切りで表示
        const staffNames = validAssignments.length > 0
          ? validAssignments.map(a => escapeHtml(a.staff_name || a.staff_id)).join(', ')
          : '<span class="no-assignments">-</span>';

        html += `
          <tr class="job-row" data-job-id="${job.job_id}" onclick="openJobAssignments('${job.job_id}')">
            <td><span class="job-time-slot">${formatTimeSlot(job.time_slot)}</span></td>
            <td><span class="job-customer">${escapeHtml(job.customer_name || '-')}</span></td>
            <td><div class="job-name">${escapeHtml(job.site_name)}</div></td>
            <td><div class="job-address">${escapeHtml(job.site_address || '')}</div></td>
            <td class="staff-cell">${staffNames}</td>
            <td class="text-center">${job.required_count || 0}</td>
            <td class="text-center">${job.assigned_count || 0}</td>
            <td class="text-center">
              ${shortage > 0
                ? `<span class="stat-badge shortage">-${shortage}</span>`
                : shortage < 0
                  ? `<span class="stat-badge ok">+${Math.abs(shortage)}</span>`
                  : '<span class="stat-badge ok">0</span>'
              }
            </td>
          </tr>
        `;
      });

      tbody.innerHTML = html;
    }

    // 特定の行だけ更新
    function updateJobRow(jobId, job, assignments) {
      const row = document.querySelector(`tr[data-job-id="${jobId}"]`);
      if (!row) return;

      const validAssignments = (assignments || []).filter(a => a.status !== 'CANCELLED');
      const assignedCount = validAssignments.length;
      const requiredCount = Number(job.required_count) || 0;
      const shortage = requiredCount - assignedCount;

      const staffNames = validAssignments.length > 0
        ? validAssignments.map(a => escapeHtml(a.staff_name || a.staff_id)).join(', ')
        : '<span class="no-assignments">-</span>';

      row.innerHTML = `
        <td><span class="job-time-slot">${formatTimeSlot(job.time_slot)}</span></td>
        <td><span class="job-customer">${escapeHtml(job.customer_name || '-')}</span></td>
        <td><div class="job-name">${escapeHtml(job.site_name)}</div></td>
        <td><div class="job-address">${escapeHtml(job.site_address || '')}</div></td>
        <td class="staff-cell">${staffNames}</td>
        <td class="text-center">${requiredCount}</td>
        <td class="text-center">${assignedCount}</td>
        <td class="text-center">
          ${shortage > 0
            ? `<span class="stat-badge shortage">-${shortage}</span>`
            : shortage < 0
              ? `<span class="stat-badge ok">+${Math.abs(shortage)}</span>`
              : '<span class="stat-badge ok">0</span>'
          }
        </td>
      `;
    }

    // テーブルからサマリーを再計算
    function updateSummaryFromTable() {
      const rows = document.querySelectorAll('#jobs-tbody tr.job-row');
      let totalRequired = 0;
      let totalAssigned = 0;

      rows.forEach(row => {
        const cells = row.querySelectorAll('td');
        if (cells.length >= 6) {
          totalRequired += parseInt(cells[4].textContent) || 0;
          totalAssigned += parseInt(cells[5].textContent) || 0;
        }
      });

      const totalShortage = totalRequired - totalAssigned;

      document.getElementById('summary-required').textContent = totalRequired;
      document.getElementById('summary-assigned').textContent = totalAssigned;

      const shortageEl = document.getElementById('summary-shortage');
      if (totalShortage <= 0) {
        shortageEl.className = 'summary-card-value ok';
        shortageEl.textContent = totalShortage === 0 ? '0' : '+' + Math.abs(totalShortage);
      } else {
        shortageEl.className = 'summary-card-value shortage';
        shortageEl.textContent = totalShortage;
      }
    }

    function updateDateDisplay() {
      const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' };
      document.getElementById('current-date').textContent = currentDate.toLocaleDateString('ja-JP', options);
    }

    function formatDateISO(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function formatTimeSlot(slot) {
      const slots = {
        'jotou': '上棟',
        'shuujitsu': '終日',
        'am': 'AM',
        'pm': 'PM',
        'yakin': '夜勤',
        'mitei': '未定'
      };
      return slots[slot] || slot || '-';
    }

    function formatWorkerType(type) {
      return type === 'SUBCONTRACT' ? '外注' : '自社';
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + type;
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }
  </script>
</body>
</html>
