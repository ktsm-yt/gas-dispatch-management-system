  <script>
    const ASSIGNMENTS_SKELETON_ROWS = [
      ['line-30', 'line-50', 'line-60', 'line-80', 'line-70', 'line-20', 'line-20', 'line-20'],
      ['line-40', 'line-40', 'line-70', 'line-60', 'line-60', 'line-20', 'line-20', 'line-20'],
      ['line-30', 'line-30', 'line-50', 'line-70', 'line-50', 'line-20', 'line-20', 'line-20']
    ];

    let currentDate = new Date();
    let currentRequestId = 0;  // リクエスト追跡用
    let isLoading = false;
    let timeSlotSortOrder = 'asc';  // 時間区分ソート順
    let currentJobs = [];  // 現在の案件データを保持
    const assignmentsMemoryCache = new Map();  // メモリキャッシュ

    // 時間区分の順序定義
    const TIME_SLOT_ORDER = {
      'jotou': 0,      // 上棟
      'shuujitsu': 1,  // 終日
      'am': 2,         // AM
      'pm': 3,         // PM
      'yakin': 4,      // 夜勤
      'mitei': 5       // 未定
    };

    document.addEventListener('DOMContentLoaded', () => {
      initNavBar('assignments', '配置管理');
      initializeDate();
      setupEventListeners();
    });

    // Callback: モーダルが閉じられたときに呼ばれる
    function onAssignmentModalClose(jobId, job, assignments) {
      if (jobId && job) {
        updateJobRow(jobId, job, assignments);
        updateSummaryFromTable();
        // キャッシュを無効化（他の日付のキャッシュに古いデータが残るのを防ぐ）
        invalidateAssignmentsCache();
      }
    }

    /**
     * 配置関連のすべてのキャッシュを無効化
     */
    function invalidateAssignmentsCache() {
      assignmentsMemoryCache.clear();
      PageCache.clearByPrefix('assignments');
    }

    function initializeDate() {
      // URLパラメータ → 埋め込み日付 → フォールバック の優先順位で日付を取得（RPC不要）
      const urlParams = new URLSearchParams(window.location.search);
      const dateParam = urlParams.get('date');

      if (dateParam && /^\d{4}-\d{2}-\d{2}$/.test(dateParam)) {
        // URLに有効な日付がある場合はそれを使用
        currentDate = new Date(dateParam + 'T00:00:00');
      } else if (window.__SERVER_DATE__) {
        // テンプレート埋め込みの日付を使用
        currentDate = new Date(window.__SERVER_DATE__ + 'T00:00:00');
        updateUrlDate();
      } else {
        // フォールバック: クライアント時間
        console.warn('Server date not available, using client time');
        currentDate = new Date();
        updateUrlDate();
      }
      loadAssignments();
    }

    function updateUrlDate() {
      const dateStr = formatDateISO(currentDate);
      const url = new URL(window.location);
      url.searchParams.set('date', dateStr);
      history.replaceState(null, '', url);
    }

    function setupEventListeners() {
      document.getElementById('prev-day').addEventListener('click', () => changeDate(-1));
      document.getElementById('next-day').addEventListener('click', () => changeDate(1));
      document.getElementById('date-picker').addEventListener('change', (e) => {
        if (e.target.value) {
          currentDate = new Date(e.target.value + 'T00:00:00');
          updateUrlDate();
          loadAssignments();
        }
      });
      document.getElementById('today-btn').addEventListener('click', () => {
        // クライアント側でAsia/Tokyo日付を取得（深夜跨ぎ対応、RPC不要）
        const todayStr = new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Tokyo' });
        currentDate = new Date(todayStr + 'T00:00:00');
        updateUrlDate();
        loadAssignments();
      });
    }

    function changeDate(delta) {
      currentDate.setDate(currentDate.getDate() + delta);
      updateUrlDate();
      loadAssignments();
    }

    function getAssignmentsCacheKey(dateStr) {
      return PageCache.makeKey('assignments', dateStr);
    }

    function loadAssignments() {
      const dateStr = formatDateISO(currentDate);
      const requestId = ++currentRequestId;
      const cacheKey = getAssignmentsCacheKey(dateStr);

      updateDateDisplay();

      // 1. メモリキャッシュ確認
      if (assignmentsMemoryCache.has(cacheKey)) {
        const cachedData = assignmentsMemoryCache.get(cacheKey);
        handleData(cachedData, requestId, dateStr);
        // TTL超過ならバックグラウンド更新
        const cached = PageCache.get(cacheKey);
        if (!cached || cached.age > PageCache.DEFAULT_TTL) {
          refreshAssignmentsInBackground(dateStr, requestId);
        }
        return;
      }

      // 2. sessionStorageキャッシュ確認（Stale-While-Revalidate: 常に即表示）
      const cached = PageCache.get(cacheKey);
      if (cached) {
        assignmentsMemoryCache.set(cacheKey, cached.data);
        handleData(cached.data, requestId, dateStr);
        // TTL超過ならバックグラウンド更新
        if (cached.age > PageCache.DEFAULT_TTL) {
          refreshAssignmentsInBackground(dateStr, requestId);
        }
        return;
      }

      // 3. キャッシュなし → スケルトン表示してAPI呼び出し（初回のみ）
      isLoading = true;
      setSkeletonTableBody('jobs-tbody', ASSIGNMENTS_SKELETON_ROWS);
      fetchAssignmentsFromServer(dateStr, requestId);
    }

    function fetchAssignmentsFromServer(dateStr, requestId) {
      const cacheKey = getAssignmentsCacheKey(dateStr);

      google.script.run
        .withSuccessHandler((response) => {
          if (response && response.ok) {
            assignmentsMemoryCache.set(cacheKey, response);
            PageCache.set(cacheKey, response);
          }
          handleData(response, requestId, dateStr);
        })
        .withFailureHandler((error) => handleError(error, requestId))
        .getDashboardAssignments(dateStr);
    }

    function refreshAssignmentsInBackground(dateStr, requestId) {
      const cacheKey = getAssignmentsCacheKey(dateStr);

      google.script.run
        .withSuccessHandler((response) => {
          // 古いリクエストのレスポンスは無視
          if (requestId !== currentRequestId) return;
          if (!response || !response.ok) return;

          const oldData = assignmentsMemoryCache.get(cacheKey);
          const newJobs = response.data?.jobs || [];
          const oldJobs = oldData?.data?.jobs || [];

          // 差分があれば更新
          if (JSON.stringify(newJobs) !== JSON.stringify(oldJobs)) {
            assignmentsMemoryCache.set(cacheKey, response);
            PageCache.set(cacheKey, response);
            handleData(response, requestId, dateStr);
          }
        })
        .getDashboardAssignments(dateStr);
    }

    function handleData(response, requestId, requestedDate) {
      // 古いリクエストのレスポンスは無視
      if (requestId !== currentRequestId) {
        console.log('Ignoring stale response for request', requestId);
        return;
      }

      isLoading = false;

      if (!response.ok) {
        showToast(response.error?.message || 'データの取得に失敗しました', 'error');
        return;
      }

      // 現在の日付と一致するか確認
      const currentDateStr = formatDateISO(currentDate);
      if (requestedDate !== currentDateStr) {
        console.log('Date mismatch, ignoring response');
        return;
      }

      const { jobs } = response.data;

      // フロントエンドでサマリーを計算（キャンセル済み案件を除外）
      let totalRequired = 0;
      let totalAssigned = 0;

      if (jobs && jobs.length > 0) {
        for (const job of jobs) {
          if (job.status === 'cancelled') continue;
          totalRequired += Number(job.required_count) || 0;
          totalAssigned += Number(job.assigned_count) || 0;
        }
      }

      const totalShortage = totalRequired - totalAssigned;

      // Update summary
      document.getElementById('summary-required').textContent = totalRequired;
      document.getElementById('summary-assigned').textContent = totalAssigned;
      document.getElementById('summary-shortage').textContent = totalShortage;

      const shortageEl = document.getElementById('summary-shortage');
      if (totalShortage <= 0) {
        shortageEl.className = 'summary-card-value ok';
        shortageEl.textContent = totalShortage === 0 ? '0' : '+' + Math.abs(totalShortage);
      } else {
        shortageEl.className = 'summary-card-value shortage';
      }

      // Render jobs
      renderJobs(jobs);
    }

    function handleError(error, requestId) {
      // 古いリクエストのエラーは無視
      if (requestId !== currentRequestId) return;

      isLoading = false;
      showToast('エラー: ' + error.message, 'error');
      document.getElementById('jobs-tbody').innerHTML = '<tr><td colspan="7" class="empty-state">データの読み込みに失敗しました</td></tr>';
    }

    function renderJobs(jobs) {
      const tbody = document.getElementById('jobs-tbody');

      // 現在のデータを保持（フィルタ・ソート切り替え用）
      currentJobs = jobs;

      // キャンセル済み案件を除外
      const activeJobs = (jobs || []).filter(job => job.status !== 'cancelled');

      // フィルタを適用
      const filteredJobs = filterJobs(activeJobs);

      if (filteredJobs.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="empty-state">該当する案件はありません</td></tr>';
        return;
      }

      // 時間区分でソート
      const sortedJobs = sortJobsByTimeSlot(filteredJobs);

      let html = '';
      sortedJobs.forEach((job) => {
        const validAssignments = (job.assignments || []).filter(a => a.status !== 'CANCELLED');
        const shortage = (job.required_count || 0) - (job.assigned_count || 0);

        // スタッフ名をカンマ区切りで表示
        const staffNames = validAssignments.length > 0
          ? validAssignments.map(a => escapeHtml(a.staff_name || a.staff_id)).join(', ')
          : '<span class="no-assignments">-</span>';

        html += `
          <tr class="job-row" data-job-id="${job.job_id}" onclick="openJobAssignmentsWithCache('${job.job_id}')">
            <td><span class="job-time-slot">${formatTimeSlot(job.time_slot)}</span></td>
            <td><span class="job-customer">${escapeHtml(job.customer_name || '-')}</span></td>
            <td><div class="job-name">${escapeHtml(job.site_name)}</div></td>
            <td><div class="job-address">${escapeHtml(job.site_address || '')}</div></td>
            <td class="staff-cell">${staffNames}</td>
            <td class="text-center">${job.required_count || 0}</td>
            <td class="text-center">${job.assigned_count || 0}</td>
            <td class="text-center">
              ${shortage > 0
                ? `<span class="stat-badge shortage">-${shortage}</span>`
                : shortage < 0
                  ? `<span class="stat-badge ok">+${Math.abs(shortage)}</span>`
                  : '<span class="stat-badge ok">0</span>'
              }
            </td>
          </tr>
        `;
      });

      tbody.innerHTML = html;
    }

    // 特定の行だけ更新
    function updateJobRow(jobId, job, assignments) {
      const row = document.querySelector(`tr[data-job-id="${jobId}"]`);
      if (!row) return;

      const validAssignments = (assignments || []).filter(a => a.status !== 'CANCELLED');
      const assignedCount = validAssignments.length;
      const requiredCount = Number(job.required_count) || 0;
      const shortage = requiredCount - assignedCount;

      const staffNames = validAssignments.length > 0
        ? validAssignments.map(a => escapeHtml(a.staff_name || a.staff_id)).join(', ')
        : '<span class="no-assignments">-</span>';

      row.innerHTML = `
        <td><span class="job-time-slot">${formatTimeSlot(job.time_slot)}</span></td>
        <td><span class="job-customer">${escapeHtml(job.customer_name || '-')}</span></td>
        <td><div class="job-name">${escapeHtml(job.site_name)}</div></td>
        <td><div class="job-address">${escapeHtml(job.site_address || '')}</div></td>
        <td class="staff-cell">${staffNames}</td>
        <td class="text-center">${requiredCount}</td>
        <td class="text-center">${assignedCount}</td>
        <td class="text-center">
          ${shortage > 0
            ? `<span class="stat-badge shortage">-${shortage}</span>`
            : shortage < 0
              ? `<span class="stat-badge ok">+${Math.abs(shortage)}</span>`
              : '<span class="stat-badge ok">0</span>'
          }
        </td>
      `;
    }

    /**
     * 配置一覧用のopenJobAssignments wrapper
     * キャッシュデータを渡して配置モーダルを即座表示
     */
    function openJobAssignmentsWithCache(jobId) {
      // キャッシュから案件データを取得
      const jobData = jobId && currentJobs
        ? currentJobs.find(j => j.job_id === jobId)
        : null;

      // fillAssignmentModalFromCacheが期待する構造に変換
      const cachedJob = jobData ? {
        job: jobData,
        assignments: jobData.assignments || [],
        slots: jobData.slots || [],
        slotStatus: null,
        allStaff: []
      } : null;

      openJobAssignments(jobId, {
        cachedJob: cachedJob  // キャッシュデータを渡す（即座表示）
      });
    }

    // テーブルからサマリーを再計算
    function updateSummaryFromTable() {
      const rows = document.querySelectorAll('#jobs-tbody tr.job-row');
      let totalRequired = 0;
      let totalAssigned = 0;

      rows.forEach(row => {
        const cells = row.querySelectorAll('td');
        if (cells.length >= 6) {
          totalRequired += parseInt(cells[4].textContent) || 0;
          totalAssigned += parseInt(cells[5].textContent) || 0;
        }
      });

      const totalShortage = totalRequired - totalAssigned;

      document.getElementById('summary-required').textContent = totalRequired;
      document.getElementById('summary-assigned').textContent = totalAssigned;

      const shortageEl = document.getElementById('summary-shortage');
      if (totalShortage <= 0) {
        shortageEl.className = 'summary-card-value ok';
        shortageEl.textContent = totalShortage === 0 ? '0' : '+' + Math.abs(totalShortage);
      } else {
        shortageEl.className = 'summary-card-value shortage';
        shortageEl.textContent = totalShortage;
      }
    }

    function updateDateDisplay() {
      const days = ['日', '月', '火', '水', '木', '金', '土'];
      const y = currentDate.getFullYear();
      const m = currentDate.getMonth() + 1;
      const d = currentDate.getDate();
      const w = days[currentDate.getDay()];
      document.getElementById('current-date').textContent = `${y}年${m}月${d}日(${w})`;
    }

    function formatDateISO(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function formatTimeSlot(slot) {
      const slots = {
        'jotou': '上棟',
        'shuujitsu': '終日',
        'am': 'AM',
        'pm': 'PM',
        'yakin': '夜勤',
        'mitei': '未定'
      };
      return slots[slot] || slot || '-';
    }

    function formatWorkerType(type) {
      return type === 'SUBCONTRACT' ? '外注' : '自社';
    }

    function escapeHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast ' + type;
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    function toggleTimeSlotSort() {
      timeSlotSortOrder = timeSlotSortOrder === 'asc' ? 'desc' : 'asc';
      document.getElementById('time-slot-sort-indicator').textContent =
        timeSlotSortOrder === 'asc' ? '▲' : '▼';
      renderJobs(currentJobs);
    }

    function sortJobsByTimeSlot(jobs) {
      const multiplier = timeSlotSortOrder === 'asc' ? 1 : -1;
      return [...jobs].sort((a, b) => {
        const orderA = TIME_SLOT_ORDER[a.time_slot] ?? 99;
        const orderB = TIME_SLOT_ORDER[b.time_slot] ?? 99;
        return (orderA - orderB) * multiplier;
      });
    }

    function applyFilters() {
      renderJobs(currentJobs);
    }

    function filterJobs(jobs) {
      const timeSlotFilter = document.getElementById('time-slot-filter').value;
      const statusFilter = document.getElementById('status-filter').value;

      return jobs.filter(job => {
        // 時間区分フィルタ
        if (timeSlotFilter && job.time_slot !== timeSlotFilter) {
          return false;
        }
        // ステータスフィルタ
        if (statusFilter && job.status !== statusFilter) {
          return false;
        }
        return true;
      });
    }
  </script>
</body>
</html>
