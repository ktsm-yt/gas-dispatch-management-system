<!-- Assignment Modal - Shared Component -->
<!-- Usage: <?!= include('assignment_modal'); ?> -->

<!-- Edit Assignment Modal -->
<div class="modal-overlay" id="edit-modal" style="display: none; z-index: 1100;">
  <div class="modal" style="max-width: 400px;">
    <div class="modal-header">
      <div class="modal-header-info">
        <h2 class="modal-title"><span id="edit-staff-name">-</span> の編集</h2>
      </div>
      <button class="modal-close" onclick="closeEditModal()">&times;</button>
    </div>
    <div class="modal-body" style="display: block; padding: 12px;">
      <div class="form-row">
        <div class="form-group">
          <label>給与区分</label>
          <select id="edit-pay-unit">
            <option value="FULLDAY">終日</option>
            <option value="HALFDAY">半日</option>
          </select>
        </div>
        <div class="form-group">
          <label>請求区分</label>
          <select id="edit-invoice-unit">
            <option value="FULLDAY">終日</option>
            <option value="HALFDAY">半日</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>交通費エリア</label>
          <select id="edit-transport-area" onchange="onEditTransportAreaChange()">
            <option value="">選択してください</option>
          </select>
        </div>
        <div class="form-group">
          <label>交通費（円）</label>
          <input type="number" id="edit-transport-amount" min="0" step="100">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeEditModal()">キャンセル</button>
      <button class="btn btn-primary" id="edit-save-btn" onclick="saveEditAssignment()">保存</button>
    </div>
  </div>
</div>

<!-- Assignment Modal -->
<div class="modal-overlay" id="assignment-modal" style="display: none;">
  <div class="modal assignment-modal-content">
    <div class="modal-header">
      <div class="modal-header-info">
        <h2 class="modal-title" id="modal-job-name">-</h2>
        <div class="modal-subtitle">
          <span id="modal-job-date">-</span>
          <span id="modal-job-time">-</span>
          <span id="modal-job-type">-</span>
          <div class="modal-stats">
            <span class="stat-badge required">必要: <span id="modal-required">0</span></span>
            <span class="stat-badge assigned">配置: <span id="modal-assigned">0</span></span>
            <span class="stat-badge shortage" id="modal-shortage-badge" style="display: none;">不足: <span id="modal-shortage">0</span></span>
          </div>
        </div>
      </div>
      <button class="modal-close" onclick="closeAssignmentModal()">&times;</button>
    </div>
    <div class="modal-body assignment-modal-body">
      <!-- Left Panel: Staff Selector -->
      <div class="modal-panel">
        <div class="panel-header">
          <span>スタッフ選択</span>
          <span class="selected-count" id="selected-count"></span>
          <button class="btn-link" onclick="selectAllAssigned()">配置済を選択</button>
        </div>
        <div class="staff-filter">
          <input type="text" class="staff-search" id="staff-search" placeholder="名前で検索..." oninput="filterStaffList()">
          <select id="staff-skill-filter" onchange="filterStaffList()">
            <option value="">全スキル</option>
            <option value="鳶">鳶</option>
            <option value="揚げ">揚げ</option>
            <option value="鳶揚げ">鳶揚げ</option>
          </select>
          <select id="staff-type-filter" onchange="filterStaffList()">
            <option value="">全タイプ</option>
            <option value="regular">自社</option>
            <option value="student">学生</option>
            <option value="sole_proprietor">個人事業主</option>
            <option value="subcontract">外注</option>
          </select>
        </div>
        <div class="panel-content" id="staff-list">
          <div class="loading-spinner">読み込み中...</div>
        </div>
      </div>

      <!-- Right Panel: Assigned Staff -->
      <div class="modal-panel">
        <div class="panel-header">
          <span>配置済みスタッフ</span>
        </div>
        <div class="panel-content" id="assigned-list">
          <div class="panel-empty">配置されたスタッフはいません</div>
        </div>
        <!-- Batch Add Form -->
        <div class="assignment-form-container" id="batch-form-container">
          <div class="assignment-form-title">一括配置設定</div>
          <div class="form-row">
            <div class="form-group">
              <label>給与区分</label>
              <select id="form-pay-unit">
                <option value="FULLDAY">終日</option>
                <option value="HALFDAY">半日</option>
              </select>
            </div>
            <div class="form-group">
              <label>請求区分</label>
              <select id="form-invoice-unit">
                <option value="FULLDAY">終日</option>
                <option value="HALFDAY">半日</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>交通費エリア</label>
              <select id="form-transport-area" onchange="onTransportAreaChange()">
                <option value="">選択してください</option>
              </select>
            </div>
            <div class="form-group">
              <label>交通費（円）</label>
              <input type="number" id="form-transport-amount" min="0" step="100">
            </div>
          </div>
          <div class="form-actions">
            <button type="button" class="btn btn-primary" id="batch-add-btn" onclick="batchAddStaff()" disabled>
              選択したスタッフを保存
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-line" onclick="copyLineTemplate()">LINEテンプレをコピー</button>
      <button class="btn btn-secondary" onclick="closeAssignmentModal()">閉じる</button>
    </div>
  </div>
</div>
