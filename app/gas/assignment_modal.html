<!-- Assignment Modal - Shared Component -->
<!-- Usage: <?!= include('assignment_modal'); ?> -->

<!-- Assignment Modal -->
<div class="modal-overlay" id="assignment-modal" style="display: none;">
  <div class="modal modal-xl assignment-modal-layout">
    <div class="modal-header">
      <div class="modal-header-info">
        <div class="modal-title-group">
          <span class="modal-customer-name" id="modal-customer-name">-</span>
          <div class="modal-title-row">
            <h2 class="modal-title" id="modal-job-name">-</h2>
            <span id="modal-site-address" class="modal-site-address"></span>
          </div>
        </div>
        <div class="modal-subtitle">
          <span id="modal-job-type-tag" class="work-category-tag" style="display: none;"></span>
          <span id="modal-work-content" class="modal-work-content"></span>
          <span id="modal-job-date">-</span>
          <span id="modal-job-time">-</span>
          <span id="modal-job-start-time" class="start-time-badge"></span>
          <div class="modal-stats">
            <span class="stat-badge required">必要: <span id="modal-required">0</span></span>
            <span class="stat-badge assigned">配置: <span id="modal-assigned">0</span></span>
            <span class="stat-badge shortage" id="modal-shortage-badge" style="display: none;">不足: <span
                id="modal-shortage">0</span></span>
          </div>
        </div>
      </div>
      <button class="modal-close" onclick="closeAssignmentModal()">&times;</button>
    </div>
    <!-- 請求書生成済み警告バナー -->
    <div id="invoice-exists-banner" class="invoice-warning-banner" style="display: none;">
      <span class="banner-icon">⚠️</span>
      <span id="invoice-exists-message">この案件の請求書は生成済みです。</span>
      <button class="banner-close" onclick="hideInvoiceExistsBanner()">&times;</button>
    </div>
    <div class="modal-body assignment-modal-body">
      <!-- Left Panel: Staff Selector -->
      <div class="modal-panel">
        <div class="panel-header">
          <span>スタッフ一覧</span>
          <span class="selected-count" id="selected-count"></span>
        </div>
        <div class="staff-filter">
          <input type="text" class="staff-search" id="staff-search" placeholder="名前で検索..." oninput="filterStaffList()">
          <select id="staff-skill-filter" onchange="filterStaffList()">
            <option value="">全スキル</option>
            <!-- スキル選択肢はJSで動的に生成 -->
          </select>
          <select id="staff-type-filter" onchange="filterStaffList()">
            <option value="">全タイプ</option>
            <option value="regular">自社</option>
            <option value="student">学生</option>
            <option value="sole_proprietor">個人事業主</option>
            <option value="subcontract">外注</option>
          </select>
        </div>
        <div class="panel-content" id="staff-list">
          <div class="loading-spinner">読み込み中...</div>
        </div>
      </div>

      <!-- Right Panel: Assignment Form -->
      <div class="modal-panel form-panel">
        <div class="assignment-form-container" id="batch-form-container">
          <div class="assignment-form-title">一括配置設定</div>

          <!-- 枠選択（枠が設定されている場合のみ表示） -->
          <div class="form-row" id="slot-select-row" style="display: none;">
            <div class="form-group" style="flex: 1;">
              <label>配置枠</label>
              <select id="form-slot-id" onchange="onSlotChange()">
                <option value="">（枠を選択）</option>
              </select>
              <small class="form-hint" id="slot-status-hint"></small>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>単価区分</label>
              <select id="form-invoice-unit">
                <option value="basic">基本</option>
                <option value="halfday">ハーフ</option>
                <option value="fullday">終日</option>
                <option value="night">夜間</option>
                <option value="tobi">鳶</option>
                <option value="tobiage">鳶揚げ</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>交通費エリア</label>
              <select id="form-transport-area" onchange="onTransportAreaChange()">
                <option value="">選択してください</option>
              </select>
            </div>
            <div class="form-group">
              <label>交通費（円）</label>
              <input type="number" id="form-transport-amount" min="0" step="100">
            </div>
          </div>
          <!-- P2-8: 諸経費備考（駅名＋バス利用） -->
          <div class="form-row">
            <div class="form-group" style="flex: 2">
              <label>諸経費備考（駅名）</label>
              <input type="text" id="form-transport-station" placeholder="例: 町田駅、YRP野比駅">
            </div>
            <div class="form-group" style="flex: 1">
              <label>&nbsp;</label>
              <div style="display: flex; align-items: center; height: 38px;">
                <input type="checkbox" id="form-transport-has-bus" style="width: auto; margin-right: 8px;">
                <span style="font-size: 14px;">バス利用</span>
              </div>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>役割</label>
              <select id="form-assignment-role">
                <option value="">選択してください</option>
                <option value="鳶">鳶</option>
                <option value="鳶補助">鳶補助</option>
                <option value="荷揚げ">荷揚げ</option>
                <option value="鳶揚げ">鳶揚げ</option>
              </select>
            </div>
            <div class="form-group">
              <label>リーダー</label>
              <label class="checkbox-label">
                <input type="checkbox" id="form-is-leader">
                <span>リーダーに指定</span>
              </label>
            </div>
          </div>
          <div class="form-row" style="margin-top: var(--spacing-sm);">
            <button type="button" class="btn btn-primary" id="batch-add-btn" onclick="batchAddStaff()" disabled style="width: 100%;">
              変更を登録
            </button>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-line" onclick="openLineTemplateModal()">LINEテンプレ</button>
      <button class="btn btn-secondary" onclick="closeAssignmentModal()">閉じる</button>
    </div>
  </div>
</div>

<!-- LINE Template Edit Modal -->
<div class="modal-overlay" id="line-template-modal" style="display: none; z-index: 10000;">
  <div class="modal" style="width: 600px;">
    <div class="modal-header">
      <h2 class="modal-title">LINEテンプレート編集</h2>
      <button class="modal-close" onclick="closeLineTemplateModal()">&times;</button>
    </div>
    <div class="modal-body">
      <textarea id="line-template-textarea"
        style="width: 100%; height: 450px; font-size: 14px; font-family: inherit; padding: var(--spacing-md); border: 1px solid var(--border-color); border-radius: var(--radius-sm); resize: vertical; line-height: 1.6;"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-line" onclick="copyLineTemplateFromModal()">コピー</button>
      <button class="btn btn-secondary" onclick="closeLineTemplateModal()">閉じる</button>
    </div>
  </div>
</div>
