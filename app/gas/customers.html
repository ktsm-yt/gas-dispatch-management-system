    /* Toolbar */
    .toolbar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      padding: var(--spacing-md) var(--spacing-lg);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--spacing-md);
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      flex: 1;
      max-width: 400px;
    }

    .search-box input {
      flex: 1;
      padding: var(--spacing-sm) var(--spacing-md);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      font-size: 14px;
    }

      border-color: var(--color-secondary);

    }

    .toolbar-actions {

    }

    .filter-toggle {

      gap: var(--spacing-xs);

      color: var(--text-muted);
      cursor: pointer;
    }

    }

    .price-type-select {

      border-radius: var(--radius-sm);
      font-size: 13px;
      background: white;
      cursor: pointer;
    }

      border-color: var(--color-secondary);
    }

    /* Main Content */

      padding: var(--spacing-lg);
    }

    /* Table */
    .table-container {
      background: white;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }

    .data-table {

      font-size: 13px;

      white-space: nowrap;

  <script>
    const CUSTOMER_SKELETON_ROWS = [
      ['line-60', 'line-40', 'line-30', 'line-50', 'line-80', 'line-30', 'line-20', 'pill-40'],
      ['line-50', 'line-30', 'line-40', 'line-40', 'line-70', 'line-30', 'line-20', 'pill-40'],
      ['line-70', 'line-40', 'line-30', 'line-50', 'line-60', 'line-30', 'line-20', 'pill-40']
    ];

    // State
    let customers = [];
    let filteredCustomers = [];
    let currentCustomer = null;

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      initNavBar('customers', '顧客');
      loadCustomers();
      setupEventListeners();
    });

    function setupEventListeners() {
      // Search
      document.getElementById('search-input').addEventListener('input', debounce(filterCustomers, 300));

      // Show inactive toggle
      document.getElementById('show-inactive').addEventListener('change', filterCustomers);

      // Price type selector
      document.getElementById('price-type').addEventListener('change', () => {
        updatePriceHeader();
        renderTable();
      });

      // Add button
      document.getElementById('add-customer-btn').addEventListener('click', () => openModal(null));

      // Modal close on overlay click
      document.getElementById('customer-modal').addEventListener('click', (e) => {
        if (e.target.id === 'customer-modal') {
          closeModal();
        }
      });

      // Modal close on Escape key
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          closeModal();
        }
      });
    }

    function debounce(func, wait) {
      let timeout;
      return function executedFunction(...args) {
        const later = () => {
          clearTimeout(timeout);
          func(...args);
        };
        clearTimeout(timeout);
        timeout = setTimeout(later, wait);
      };
    }

    function loadCustomers() {
      showTableLoading();

      google.script.run
        .withSuccessHandler(handleCustomersData)
        .withFailureHandler(handleError)
        .listCustomers({ includeDeleted: false });
    }

    function handleCustomersData(response) {
      if (!response.ok) {
        showToast(response.error?.message || 'データの取得に失敗しました', 'error');
        return;
      }

      customers = response.data.items || [];
      updateStats();
      filterCustomers();
    }

    function updateStats() {
      const total = customers.length;
      const active = customers.filter(c => c.is_active).length;
      document.getElementById('stats-total').textContent = total;
      document.getElementById('stats-active').textContent = active;
    }

    function filterCustomers() {
      const searchTerm = document.getElementById('search-input').value.toLowerCase();
      const showInactive = document.getElementById('show-inactive').checked;

      filteredCustomers = customers.filter(customer => {
        // Filter by active status
        if (!showInactive && !customer.is_active) {
          return false;
        }

        // Filter by search term
        if (searchTerm) {
          const searchFields = [
            customer.company_name,
            customer.branch_name,
            customer.department_name,
            customer.contact_name,
            customer.phone,
            customer.address
          ].filter(Boolean).join(' ').toLowerCase();

          if (!searchFields.includes(searchTerm)) {
            return false;
          }
        }

        return true;
      });

      renderTable();
    }

    function renderTable() {
      const tbody = document.getElementById('customer-table-body');

      if (filteredCustomers.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="8">
              <div class="empty-state">顧客データがありません</div>
            </td>
          </tr>
        `;
        return;
      }

      const priceType = document.getElementById('price-type').value;

      tbody.innerHTML = filteredCustomers.map(customer => {
        const branchDept = [customer.branch_name, customer.department_name].filter(Boolean).join(' / ');
        const price = getPriceByType(customer, priceType);

        return `
          <tr class="${customer.is_active ? '' : 'inactive'}" onclick="openModal('${customer.customer_id}')">
            <td class="cell-company">${escapeHtml(customer.company_name)}</td>
            <td>${escapeHtml(branchDept) || '-'}</td>
            <td class="cell-contact">${escapeHtml(customer.contact_name) || '-'}</td>
            <td>${escapeHtml(customer.phone) || '-'}</td>
            <td>${escapeHtml(customer.address) || '-'}</td>
            <td class="cell-price">${formatPrice(price)}</td>
            <td>${formatClosingDay(customer.closing_day)}</td>
            <td class="cell-status">
              <span class="status-badge ${customer.is_active ? 'status-active' : 'status-inactive'}">
                ${customer.is_active ? '有効' : '無効'}
              </span>
            </td>
          </tr>
        `;
      }).join('');
    }

    function showTableLoading() {
      setSkeletonTableBody('customer-table-body', CUSTOMER_SKELETON_ROWS);
    }

    function formatPrice(price) {
      if (price === null || price === undefined || price === '') {
        return '-';
      }
      return Number(price).toLocaleString() + '円';
    }

    function getPriceByType(customer, priceType) {
      switch (priceType) {
        case 'basic': return customer.unit_price_basic;
        case 'tobi': return customer.unit_price_tobi;
        case 'age': return customer.unit_price_age;
        case 'tobiage': return customer.unit_price_tobiage;
        case 'half': return customer.unit_price_half;
        case 'fullday': return customer.unit_price_fullday;
        case 'night': return customer.unit_price_night;
        default: return customer.unit_price_basic || customer.unit_price_tobi;
      }
    }

    function updatePriceHeader() {
      const priceType = document.getElementById('price-type').value;
      const labels = { basic: '基本単価', tobi: '鳶単価', age: '揚げ単価', tobiage: '鳶揚げ単価', half: 'ハーフ単価', fullday: '終日単価', night: '夜間単価' };
      document.getElementById('price-header').textContent = labels[priceType] || '単価';
    }

    function formatClosingDay(day) {
      if (!day) return '-';
      return day === 31 ? '末日' : day + '日';
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function openModal(customerId) {
      const modal = document.getElementById('customer-modal');
      const form = document.getElementById('customer-form');
      const deleteBtn = document.getElementById('delete-btn');

      // Reset form
      form.reset();
      document.getElementById('customer-id').value = '';
      document.getElementById('customer-updated-at').value = '';

      if (customerId) {
        // Edit mode
        document.getElementById('modal-title').textContent = '顧客編集';
        deleteBtn.style.display = 'inline-flex';
        currentCustomer = customers.find(c => c.customer_id === customerId);

        if (currentCustomer) {
          populateForm(currentCustomer);
        }
      } else {
        // Create mode
        document.getElementById('modal-title').textContent = '新規顧客';
        deleteBtn.style.display = 'none';
        currentCustomer = null;

        // Set defaults
        document.getElementById('is-active').value = 'true';
        document.getElementById('tax-rate').value = '10';
        document.getElementById('honorific').value = '様';
        document.getElementById('invoice-format').value = 'format1';
        document.getElementById('include-cover-page').checked = false;
        document.getElementById('has-transport-fee').checked = false;
        document.getElementById('payment-month-offset').value = '1';

        // フォルダUI初期化（新規作成モード）
        updateFolderUI(null, null);
      }

      modal.style.display = 'flex';
    }

    function populateForm(customer) {
      document.getElementById('customer-id').value = customer.customer_id || '';
      document.getElementById('customer-updated-at').value = customer.updated_at || '';
      document.getElementById('company-name').value = customer.company_name || '';
      document.getElementById('branch-name').value = customer.branch_name || '';
      document.getElementById('department-name').value = customer.department_name || '';
      document.getElementById('contact-name').value = customer.contact_name || '';
      document.getElementById('honorific').value = customer.honorific || '様';
      document.getElementById('postal-code').value = customer.postal_code || '';
      document.getElementById('address').value = customer.address || '';
      document.getElementById('phone').value = customer.phone || '';
      document.getElementById('fax').value = customer.fax || '';
      document.getElementById('email').value = customer.email || '';
      document.getElementById('unit-price-basic').value = customer.unit_price_basic || '';
      document.getElementById('unit-price-tobi').value = customer.unit_price_tobi || '';
      document.getElementById('unit-price-age').value = customer.unit_price_age || '';
      document.getElementById('unit-price-tobiage').value = customer.unit_price_tobiage || '';
      document.getElementById('unit-price-half').value = customer.unit_price_half || '';
      document.getElementById('unit-price-fullday').value = customer.unit_price_fullday || '';
      document.getElementById('unit-price-night').value = customer.unit_price_night || '';
      document.getElementById('closing-day').value = customer.closing_day || '';
      document.getElementById('payment-month-offset').value = customer.payment_month_offset ?? '1';
      document.getElementById('payment-day').value = customer.payment_day || '';
      document.getElementById('invoice-format').value = customer.invoice_format || 'format1';
      document.getElementById('include-cover-page').checked = customer.include_cover_page === true || customer.include_cover_page === 'true';
      document.getElementById('has-transport-fee').checked = customer.has_transport_fee === true || customer.has_transport_fee === 'true';
      document.getElementById('tax-rate').value = customer.tax_rate ?? 10;
      document.getElementById('expense-rate').value = customer.expense_rate || '';
      document.getElementById('shipper-name').value = customer.shipper_name || '';
      document.getElementById('customer-code').value = customer.customer_code || '';
      document.getElementById('invoice-registration-number').value = customer.invoice_registration_number || '';
      document.getElementById('folder-id').value = customer.folder_id || '';
      document.getElementById('notes').value = customer.notes || '';
      document.getElementById('is-active').value = customer.is_active ? 'true' : 'false';

      // フォルダUI更新
      updateFolderUI(customer.folder_id, customer.customer_id);
    }

    // フォルダ関連UIを更新
    function updateFolderUI(folderId, customerId) {
      const openLink = document.getElementById('open-folder-link');
      const notSetText = document.getElementById('folder-not-set');
      const createBtn = document.getElementById('create-folder-btn');

      if (folderId) {
        // フォルダがある場合: リンクを表示
        openLink.href = `https://drive.google.com/drive/folders/${folderId}`;
        openLink.style.display = 'inline-block';
        notSetText.style.display = 'none';
        createBtn.style.display = 'none';
      } else if (customerId) {
        // 既存顧客でフォルダがない場合: 作成ボタンを表示
        openLink.style.display = 'none';
        notSetText.style.display = 'none';
        createBtn.style.display = 'inline-block';
      } else {
        // 新規顧客: 「未設定」を表示
        openLink.style.display = 'none';
        notSetText.style.display = 'inline';
        createBtn.style.display = 'none';
      }
    }

    // 個別フォルダ作成
    function createFolder() {
      const customerId = document.getElementById('customer-id').value;

      if (!customerId) {
        showToast('顧客を保存してからフォルダを作成してください', 'error');
        return;
      }

      const btn = document.getElementById('create-folder-btn');
      btn.disabled = true;
      btn.textContent = '作成中...';

      google.script.run
        .withSuccessHandler((response) => {
          btn.disabled = false;
          btn.textContent = 'フォルダ作成';

          if (response.ok) {
            document.getElementById('folder-id').value = response.data.folderId;
            updateFolderUI(response.data.folderId, customerId);
            showToast('フォルダを作成しました', 'success');

            // ローカルデータも更新
            if (currentCustomer) {
              currentCustomer.folder_id = response.data.folderId;
            }

            // 楽観ロック用のupdated_atを更新（保存時の衝突を防止）
            if (response.data.updated_at) {
              document.getElementById('customer-updated-at').value = response.data.updated_at;
              if (currentCustomer) {
                currentCustomer.updated_at = response.data.updated_at;
              }
            }
          } else {
            showToast(response.error?.message || 'フォルダ作成に失敗しました', 'error');
          }
        })
        .withFailureHandler((error) => {
          btn.disabled = false;
          btn.textContent = 'フォルダ作成';
          showToast(error.message, 'error');
        })
        .createCustomerFolder(customerId);
    }


    function closeModal() {
      document.getElementById('customer-modal').style.display = 'none';
      currentCustomer = null;
    }

    function saveCustomer() {
      const form = document.getElementById('customer-form');

      // Basic validation
      if (!form.checkValidity()) {
        form.reportValidity();
        return;
      }

      const formData = new FormData(form);
      const customer = {};

      formData.forEach((value, key) => {
        if (value !== '') {
          // Convert numeric fields
          if (['unit_price_basic', 'unit_price_tobi', 'unit_price_age', 'unit_price_tobiage', 'unit_price_half', 'unit_price_fullday', 'unit_price_night',
               'closing_day', 'payment_day', 'payment_month_offset', 'tax_rate', 'expense_rate'].includes(key)) {
            customer[key] = value ? Number(value) : null;
          } else if (key === 'is_active') {
            customer[key] = value === 'true';
          } else {
            customer[key] = value;
          }
        }
      });

      // Handle checkbox (FormData only includes checked checkboxes)
      customer.include_cover_page = document.getElementById('include-cover-page').checked;
      customer.has_transport_fee = document.getElementById('has-transport-fee').checked;

      const customerId = document.getElementById('customer-id').value;
      const updatedAt = document.getElementById('customer-updated-at').value;

      if (customerId) {
        customer.customer_id = customerId;
      }

      // Disable button while saving
      const saveBtn = document.getElementById('save-btn');
      saveBtn.disabled = true;
      saveBtn.textContent = '保存中...';

      const isNew = !customerId;

      google.script.run
        .withSuccessHandler((response) => {
          saveBtn.disabled = false;
          saveBtn.textContent = '保存';

          if (response.ok) {
            // 差分更新（全件再取得せずローカル更新）
            if (isNew) {
              customers.push(response.data);
            } else {
              const idx = customers.findIndex(c => c.customer_id === response.data.customer_id);
              if (idx !== -1) customers[idx] = response.data;
            }
            updateStats();
            filterCustomers();
            showToast('保存しました', 'success');
            closeModal();
          } else {
            if (response.error?.code === 'CONFLICT_ERROR') {
              showToast('他のユーザーによって更新されています。画面を再読み込みしてください。', 'error');
            } else {
              showToast(response.error?.message || '保存に失敗しました', 'error');
            }
          }
        })
        .withFailureHandler((error) => {
          saveBtn.disabled = false;
          saveBtn.textContent = '保存';
          showToast(error.message, 'error');
        })
        .saveCustomer(customer, updatedAt || null);
    }

    function deleteCustomer() {
      if (!currentCustomer) return;

      ConfirmationModal.show({
        type: 'danger',
        title: '削除の確認',
        message: `「${currentCustomer.company_name}」を削除しますか？\n\n※この操作は取り消せません。`,
        confirmText: '削除',
        onConfirm: () => {
          const updatedAt = document.getElementById('customer-updated-at').value;
          const deleteId = currentCustomer.customer_id;
          const deleteName = currentCustomer.company_name;

          // 楽観的更新: UIを即座に更新
          customers = customers.filter(c => c.customer_id !== deleteId);
          updateStats();
          filterCustomers();
          closeModal();
          showToast(`${deleteName}を削除しました`, 'success');

          // バックグラウンドでAPI呼び出し
          google.script.run
            .withSuccessHandler((response) => {
              if (!response.ok) {
                // 失敗時はデータ再読み込み
                if (response.error?.code === 'CONFLICT_ERROR') {
                  showToast('他のユーザーによって更新されています。再読み込みします。', 'error');
                } else {
                  showToast(response.error?.message || '削除に失敗しました。再読み込みします。', 'error');
                }
                loadCustomers();
              }
            })
            .withFailureHandler((error) => {
              showToast('削除に失敗しました。再読み込みします。', 'error');
              loadCustomers();
            })
            .deleteCustomer(deleteId, updatedAt || null);
        }
      });
    }

    function handleError(error) {
      console.error('Error:', error);
      showToast(error.message || 'エラーが発生しました', 'error');
    }

    function showToast(message, type = '') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show' + (type ? ' ' + type : '');
      setTimeout(() => {
        toast.className = 'toast';
      }, 3000);
    }
  </script>
</body>
</html>
