name: CI

on:
  push:
    branches: [main]
    paths:
      - 'app/gas/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    branches: [main]
    paths:
      - 'app/gas/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Build (tsc + dist)
        run: npm run build

      - name: ESLint
        run: npm run lint
