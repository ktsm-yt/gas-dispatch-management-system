name: CI

on:
  push:
    branches: [main]
    paths:
      - 'app/gas/**'
      - 'scripts/**'
      - 'tests/**'
      - 'vitest.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/gas/**'
      - 'scripts/**'
      - 'tests/**'
      - 'vitest.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/ci.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'package.json'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Vitest with coverage
        run: npm run test:coverage

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const c = require('./coverage/coverage-summary.json').total;
              const rows = ['lines','statements','functions','branches']
                .map(k => '| ' + k + ' | ' + c[k].pct + '% |').join('\n');
              const md = '## Coverage Summary\n| Metric | % |\n|--------|---|\n' + rows;
              require('fs').appendFileSync(process.env.GITHUB_STEP_SUMMARY, md);
            "
          fi

      - name: TypeScript type check
        run: npm run typecheck

      - name: Build (tsc + dist)
        run: npm run build

      - name: ESLint
        run: npm run lint
